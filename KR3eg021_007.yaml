body:
  text: 卷七陳平伯外感溫病篇蓋聞外感不外六淫而民病當分四氣治傷寒家徒守發表攻裡之成方不計辛熱苦寒之貽害遂使溫熱之旨矇昧不明醫門缺典莫此甚焉祖恭不敏博覽群書廣搜載籍而恍然於溫熱病之不可不講也內經云冬不藏精春必病溫蓋謂冬令嚴寒陽氣內斂人能順天時而固密則腎氣內充命門為三焦之別使亦得固腠理而護皮毛雖當春令升泄之時而我身之真氣則內外彌綸不隨升令之泄而告匱縱有客邪安能內侵是內經所以明致病之原也然但云冬不藏精而不及他時者以冬為水旺之時屬北方寒水之化於時為冬於人為腎井水溫而堅冰至陰外陽內有習坎之義故立言歸重於冬非謂冬宜藏而他時可不藏精也雄按喻氏云春夏之病皆起於冬至秋冬二時之病皆起於夏夏月藏精則熱邪不能侵與冬月之藏精而寒邪不能入者無異也故丹溪謂夏月必獨宿淡味保養金水二藏尤為攝生之儀式焉即春必溫病之語亦是就近指點總是裡虛者表不固一切時邪皆易感受學者可因此而悟及四時六氣之為病矣雄按此論冬不藏精春易病溫之理甚通惟不知有伏氣為病之溫是其蔽也陳氏此篇與鞠通條辨皆葉氏之功臣然幼科要略明言有伏氣之溫熱二家竟未細繹毋乃疏乎二家且然下此者更無論矣難經云傷寒有五有傷寒雄按麻黃湯證是也有中風雄按桂枝湯證是也有風溫雄按冬溫春溫之外受者有熱病雄按即暑病也又謂之暍有濕溫雄按即暑兼濕為病也亦曰濕熱夫統此風寒濕熱之邪而皆名之曰傷寒者亦早鑑於寒臟受傷外邪得入故探其本而皆謂之傷寒也雄按仲景本論治法原有區別界畫甚嚴後人不察罔知所措多致誤人茲余輯此專論以期瞭然於學者心目也獨是西北風高土燥風寒之為病居多雄按亦不盡然東南地界水濕濕熱之傷人獨甚從來風寒傷形傷形者定從表入濕熱傷氣傷氣者不盡從表入故治傷寒之法不可用以治溫熱也夫溫者暖也熱也非寒之可比也風邪外束則曰風溫濕邪內侵則曰濕溫縱有微寒之兼襲不同慄冽之嚴寒是以發表宜辛涼不宜辛熱清裡宜泄熱不宜逐熱雄按亦有宜逐者總須辨證耳蓋風不兼寒即為風火濕雖化熱終屬陰邪雄按濕固陰邪其兼感熱者則又不可同謂之陰矣自昔仲景著書不詳溫熱遂使後人各呈家技漫無成章而凡大江以南病溫多而病寒少雄按北省溫病亦多於傷寒投以發表不遠熱攻裡不遠寒諸法以致死亡接踵也悲夫雄按篇中非伏氣之說皆為節取棄瑕錄瑜皆後仿此風溫為病春月與冬季居多或惡風或不惡風必身熱咳嗽煩渴此風溫證之提綱也自注春月風邪用事冬初氣暖多風雄按冬暖不藏不必定在冬初也故風溫之病多見於此但風邪屬陽陽邪從陽必傷衛氣人身之中肺主衛又胃為衛之本是以風溫外薄肺胃內應風溫內襲肺胃受病其溫邪之內外有異形而肺胃之專司無二致故惡風為或有之症而熱渴咳嗽為必有之症也三複仲景書言溫病者再一則曰太陽病發熱而渴不惡寒者為溫病此不過以不惡寒而渴之症辨傷寒與溫病之異而非專為風溫敘症也雄按此言伏氣發為春溫非冬春所感之風溫故曰太陽病以太陽為少陰之表也再則曰發汗已身灼熱者名曰風溫夫灼熱因於發汗其誤用辛熱發汗可知仲景復申之曰風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出凡此皆誤汗劫液後變見之症非溫病固有之症也續云若被下者直視失溲若被火者發黃色劇則如驚癇狀時瘛瘲若火熏之一逆尚引日再逆促命期亦止詳用下用火之變證而未言風溫之本來見症也雄按此言溫病誤汗熱極生風故曰風溫乃內風也非冬春外感之風溫陳氏不知有伏氣春溫之病強為引證原可刪也然病之內外雖殊證之屬溫則一姑存之以為後學比例然從此細參則知風溫為燥熱之邪燥令從金化燥熱歸陽明故肺冒為溫邪必犯之地且可悟風溫為燥熱之病燥則傷陰熱則傷津泄熱和陰又為風溫病一定之治法也反此即為逆矣用是不辭僭越而於仲景之無文處求文無治處索治敘證施治列為條例知我罪我其在斯乎雄按外感溫病仲聖雖未言而葉氏已詳論矣璜按時行感冒有氣管枝性神經性胃腸性三種此所謂熱渴咳嗽即氣管枝性也引動內風而驚癇瘛瘲即神經性也誤汗而致熱極生風乃因表藥多上升致引熱以上衝腦髓耳然春溫冬溫濕溫伏暑不因誤汗而發現神經症者往往而有蓋由病毒菌傳入延髓患感之後神氣遂不清明近世此證甚多醫者無不誤治風溫證身熱畏風頭痛咳嗽口渴脈浮數舌苔白者邪在表也當用薄荷前胡杏仁桔梗桑葉川貝之屬涼解表邪楊云前胡桔梗一降一升以泄肺邪誠善然桔梗宜少用評風溫表證自注風屬陽邪不挾寒者為風溫陽邪必傷陽絡是以頭痛畏風邪郁肌表肺胃內應故咳嗽口渴苔白邪留於表故脈浮數表未解者當先解表但不同於傷寒之用麻桂耳王士雄曰何西池云辨痰之法古人以黃稠者為熱稀白者為寒此特言其大概而不可泥也以外感言之傷寒咳嗽痰隨嗽出頻數而多色皆稀白誤作寒治多致困頓蓋火盛壅逼頻咳頻出停留不久故未至於黃稠耳迨火衰氣平咳嗽漸息痰之出者半日一口反黃而稠緣火不上壅痰得久留受其煎煉使然耳故黃稠之痰火氣尚緩而微稀白之痰火氣反急而盛也此皆當用辛涼解散而不宜於溫熱者推之內傷亦然孰謂稀白之痰必屬於寒哉總須臨證細審更參以脈自可見也璜按辨痰之寒熱理解極清然亦有淡黃堅實水濯不開而屬於寒者予曾患嗽得此痰服蔗漿少許而嗽甚後服六君子湯二劑痊愈故知治病當隨機應變不易拘執成法也風溫證身熱咳嗽自汗口渴煩悶脈數舌苔微黃者熱在肺胃也當用川貝牛蒡桑皮連翹橘皮竹葉之屬涼泄裡熱評風溫里證此溫邪之內襲者肺熱則咳嗽汗泄胃熱則口渴煩悶苔白轉黃風從火化故以清泄肺胃為主王士雄曰苔黃不甚燥者楊云故條中言微黃亦具見斟酌治當如是若黃而已干則桑皮橘皮皆嫌其燥須易瓜蔞黃芩庶不轉傷其液也璜按議藥取用滑降於溫咳殊有神效此與江筆花醫鏡貝母瓜蔞散同義風溫證身灼熱口大渴咳嗽煩悶譫語如夢語脈弦數乾嘔者此熱灼肺胃風火內旋當用羚羊角川貝連翹麥冬石斛青蒿知母花粉之屬以泄熱和陰評風溫變熱侵襲肺胃此溫邪襲入肺胃之絡灼爍陰津引動木火故有煩渴嘔逆等症急宜泄去絡中之熱庶無風火相煽走竄包絡之虞評走竄包絡即西醫說所謂熱傷腦髓也若燥咳麥冬即不忌王士雄曰嗽且悶麥冬未可即授嫌其滋也汪按徐洄溪謂麥冬能滿肺氣非實嗽所宜是也以為大渴耶已有知母花粉足勝其任矣木火上衝而乾嘔則青蒿雖清少陽而嫌乎升矣宜去此二味加以梔子竹茹枇杷葉則妙矣楊云議藥細極微芒讀者不可草草讀過璜按此風溫引動木火比前二證較重開降泄絡引使下行俾熱不上擾神經實治此證之妙訣評用藥未當擬方用銀花黃連瓜蔞知母桑葉杏仁花粉旋覆清熱止利兼除胸痞較為面面俱到風溫證身熱咳嗽口渴下利苔黃譫語胸痞脈數此溫邪由肺胃下注大腸當用黃芩桔梗煨葛豆卷甘草橘皮之屬以升泄溫邪大腸與胃相連屬與肺相表裡溫邪內逼下注大腸則下利治之者宜清泄溫邪不必專於治利按傷寒論下利譫語者有燥矢也宜大承氣湯六是實熱內結逼液下趨必有舌燥苔黃刺及腹滿痛症兼見故可下以逐熱若溫邪下利是風熱內迫雖有譫語一症仍是無形之熱蘊蓄於中而非實滿之邪盤結於內故用葛根之升提不任硝黃之下逐也汪按升提亦所不任王士雄曰傷寒為陰邪未曾傳腑化熱最慮邪氣下陷治必升提溫散而有早下之戒溫熱為陽邪火必剋金故先犯肺火性炎上難得下行若肺氣肅降有權移其邪由腑出正是病之去路升提胡可妄提楊云小兒患疹必下利與此正同故溫病多有發疹者誤升則邪入肺絡必喘吼而死既云宜清泄其邪不必專於治利矣況有咳嗽胸痞之兼症豈葛根豆卷桔梗之所宜乎當易以黃連桑葉銀花須知利不因寒潤藥亦多可用仲聖以豬膚白蜜治溫病下利寓意草論肺熱下利最詳學者宜究心焉且傷寒與溫熱邪雖不同皆屬無形之氣傷寒之有燥矢並非是氣結乃寒邪化熱津液耗傷糟粕煉成燥矢耳溫熱病之大便不閉為易治者以臟熱移腑邪有下行之路所謂腑氣通則臟氣安也設大便閉者熱灼胃津日久亦何嘗無燥矢宜下之證哉惟傷寒之大便不宜早解故必邪入於腑始可下其燥矢溫熱由肺及胃雖不比疫證之下不嫌早而喜其便通宜用清涼故結成燥矢者較少耳憶嘉慶己卯春先君子病溫而大便自利彼時吾杭諸名醫咸宗陶節庵書以治傷寒不知所謂溫證也見其下利悉用柴葛升提提而不應或云是漏底證漸投溫補病日以劇將治木矣父執翁七丈忘其字矣似是立賢二字薦浦上林先生來視浦年甚少診畢即曰是溫證也殆誤作傷寒治而多服溫燥之藥乎幸而自利不止熱勢尚有宣泄否則早成灰燼奚待今日耶即用大劑犀角石膏銀花花粉鮮生地麥冬等藥囑煎三大碗置於榻前頻頻灌之藥未煎成之際先榨蔗漿恣飲之諸戚長見方相顧莫決賴金履思丈力持煎其藥至一周時服竣病有起色遂以漸愈時雄年甫十二聆其言而心識之逾二年先君捐館雄餬口遠遊聞浦先生以善用清涼為眾口所爍乃從事於景岳而以溫補稱枉道徇人惜哉然雄之究心於溫熱實浦先生有以啟之也浦今尚在因其遠徙於鄉竟未遑往質疑義為恨附記於此聊志感仰之意云而評傷寒若大解照常亦佳但不宜早用下法若急下證則不在此例璜按此所謂氣管枝性胃腸性之時行感冒也肺胃鬱熱自當以下利為熱邪出路用清泄溫熱並佐苦藥堅陰病無不愈萬無用升泄之理夢隱改用黃連桑葉銀花清靈切病泄熱治利兩擅其長風溫證熱久不愈咳嗽唇腫口渴胸悶不知飢身發白疹如寒慄狀自汗脈數者此風邪挾太陰脾濕發為風疹楊云白疹乃肺胃濕熱也與脾無涉亦與風無涉用牛蒡荊芥防風連翹橘皮甘草之屬涼解之評肺胃濕熱嗽汗白疹宜於泄濕方中佐以清宣化毒風溫本留肺胃若太陰舊有伏濕者風熱之邪與濕熱相合流連不解日數雖多仍留氣分由肌肉而外達皮毛發為白疹蓋風邪與陽明營熱相併則發斑與太陰濕邪相合則發疹也又有病久中虛氣分大虧而發白疹者必脈微弱而氣倦怯多成死候不可不知汪按前說即白如水晶色之白㾦後說即白如枯骨之白㾦也王士雄曰白疹即白㾦也雖挾濕邪久不愈而從熱化且汗渴脈數似非荊防之可再表楊云此濕亦不必用橘皮之燥宜易滑石葦莖通草楊雲精當斯合涼解之法矣若有虛象當與甘藥以滋氣液風溫證身熱咳嗽口渴胸痞頭目脹大面發疱瘡者風毒上壅陽絡當用荊芥薄荷連翹元參牛蒡馬勃青黛銀花之屬以清熱散邪此即世俗所謂之大頭病也古人用三黃湯九十四主治然風熱壅遏致絡氣不宣頭腫如斗終不若仿普濟消毒飲之宣絡滌熱為佳汪按方附見九十五璜按大頭病每隨時疫而發此證西人謂之血蛇東醫謂之耳下腺炎若於頭面腫處發白疱者尤為危險風溫證身大熱口大渴目赤唇腫氣粗煩躁舌絳齒板痰咳甚至神昏譫語下利黃水者風溫熱毒深入陽明營分最為危候用犀角連翹葛根元參赤芍丹皮麥冬紫草川貝人中黃解毒提斑間有生者楊云葛根麥冬俱與證不甚登對評此證非大清溫熱兼養營陰不效此風溫熱毒內壅肺胃侵入營分上下內外充斥肆逆若其毒不甚重或氣體壯實者猶可挽回否則必壞璜按此即溫邪銷鑠營陰沖擾腦髓之重熱症須大劑清營救津若神犀紫雪清降腦熱引使下行又須頻頻灌之方足奏效緩則胃津枯槁熱勢披猖馴至不救風溫毒邪始得之便身熱口渴目赤咽痛臥起不安手足厥冷泄瀉脈伏者熱毒內壅絡氣阻遏當用升麻楊云凡涉咽痛者一用升麻則邪人肺絡必喘吼而聲如曳鋸陳氏想未之見耳黃芩犀角銀花甘草豆卷之屬升散熱毒評熱深厥深兼之咽痛仍須泄熱通絡清降為宜此風溫毒之壅於陽明氣分者楊云仍是肺病即仲景所云陽毒病是也五日可治七日不可治乘其邪犯氣分未入營陰故可升散而愈璜按前條有營分之重病此條為氣分之重病然既厥冷脈伏則已阻塞脈道傷及血分矣血氣均病心肺行血機關被其阻礙傷人最速此證宜兼用手術以通脈道須防心停至要至要風溫證身熱自汗面赤神迷身重難轉側多眠睡鼻鼾語難出脈數者溫邪內逼陽明精液劫奪神機不運用石膏知母麥冬半夏竹葉甘草之屬泄熱救津評此陽明熱盛神氣昏迷之證鼻鼾面赤胃熱極盛人之陰氣依胃為養熱邪內灼胃液乾枯陰氣復有何資而能滲諸陽灌諸絡是以筋骨懈怠機關失運急用甘涼之品以清熱濡津或有濟也雄按宜加西洋參百合竹瀝璜按熱邪內遏陽明上擾神經精液劫奪宗筋失潤致身重難於轉側此證已病及腦脊髓矣此方多服必津回熱退而神清然到病轉身體仍支持不住亦重症也風溫證身熱痰咳口渴神迷手足瘛瘲狀若驚癇脈弦數者此熱劫津液金囚木旺當用羚羊川貝青蒿連翹知母麥冬鉤藤之屬以息風清熱評此即西醫所謂熱沖腦也初病發痙愈者甚多若病後則多危肺屬金而畏火賴胃津之濡養以肅降令而溉百脈者也熱邪內盛胃津被劫肺失所資木為火之母子能令母實火旺金囚木無所畏反侮所不勝是以筋脈失養風火內旋瘛瘲驚癇在所不免即俗云發痙是也故以息風清熱為主治王士雄曰可加元參梔子絲瓜絡璜按此證我國醫者每謂熱盛生內風其實亦腦髓病也安腦提神退熱仍不可少風溫證熱渴煩悶昏憒不知人不語如屍厥脈數者此熱邪內蘊走竄心包絡當用犀角連翹焦遠志鮮石菖蒲麥冬川貝牛黃至寶之屬泄熱通絡評熱入心包症甚危急須防內閉前五條均風溫中之重症照法施治愈者固多而變壞者亦不少醫者對於此證切勿輕言易治熱邪極盛與三焦相火相煽最易內竄心包逼亂神明閉塞絡脈以致昏迷不語其狀如屍俗謂發厥是也閉者宜開故以香開辛散為務熱邪極盛三焦相火相煽最易內竄心包逼亂神明閉塞絡脈雖是喻氏之言而法以香開辛散然熱極似水一派煙霧塵天矇住心胸不知不識如人行煙塵中口鼻皆燥非兩解不能散其勢再入溫熱之處則人當燥悶死矣且溫熱多燥辛香之品盡是燥燥與熱鬥立見其敗且心神為熱邪蒸圍非閉塞也有形無形治法大異遇此每在敗時故前人不能探其情今補薛生白先生一法於後汪按此乃駁香開辛散之法而別立一法與本書異趣蓋此條當是他人附贅之評語非本書也極明雄黃一兩研極細入銅勺內又研提淨牙硝六錢微火熔化拔勻如水時楊云雄黃多而牙硝少何能勻拔如水兩字錢字必有一誤急濾清者於碗粗渣不用凝定此丹灶家秘製也凡遇前證先用陳雨水十碗內取出一碗煎木通一錢通草三錢傾入九碗冷水內又取犀角磨入三錢或旋磨旋與亦可每碗約二三分再將制雄挑二三釐入碗冷與服時時進之能於三日內進之盡必有清痰吐出數碗而愈楊云據此用法當是黃一分硝六分也十救七八蓋此證死期最緩而醫人無他法每每付之天命牛黃清心而已可勝長嘆雄按煉雄黃法昉於遊宦紀聞見知不足齋叢書璜按此毒入延髓化熱之證特前條瘛瘲此條昏瞶耳此證用金石通靈及芳香提神諸品愈者甚多倘熱閉不開神昏不醒一二日而斃死期何嘗緩耶薛生白濕熱病篇雄按江本吳本俱作濕溫璜按濕為夭之六氣感濕化熱即六淫皆從火化之義我國醫學必講六氣乃岐黃仲景不易之心法也近世學西醫者每以我國此學說為籠統之談必推究病原菌方為細切立論未嘗不精確不思我國學說亦確有體驗今試以五日一候三候一氣六氣一時與淮南子之月令推勘之動物若蟲魚鳥獸植物若蔬菜葭葦果實莫不隨時令而發生爵化蛤鼠化鴽須天時至方能感化即至一日一夜一時干支時刻亦確乎其不可易觀於貓眼子午卯酉為一變寅申己亥為一變辰戌丑未為一變絲毫不爽則天時氣候為病原所自出非泛論也病原蟲亦必隨時令而生故我國按六氣檢治均能有效古云濕勝則重著故患濕者無不身重濕為有形之物每流關節故患濕者無不身重嗚乎豈籠統之談哉一溫熱證雄按既受濕又感暑也即是濕溫亦有濕邪久伏而化熱者喻氏以為三氣者謂夏令地氣已熱而又加以天上之暑也始惡寒後但熱不寒汗出胸痞舌白吳本下有或黃二字口渴不引飲雄按甘露消毒丹九十五最妙吳本雖出江本之後無甚異同所附酒客一案云是其師治似較江本為可信也故引證但據吳本而江本從略自注此條乃濕熱證之提綱也濕熱病屬陽明太陰經者居多章虛谷云胃為戊土屬陽脾為己土屬陰濕土之氣同類相召故濕熱之邪始雖外受終歸脾胃也評黃坤載注傷寒亦同此說中氣實則病在陽明中氣虛則病在太陰外邪傷人必隨人身之氣而變如風寒在太陽則惡寒傳陽明則變為熱而不惡寒今以暑濕所合之邪故人身陽氣旺即隨火化而歸陽明陽氣虛則隨濕化而歸太陰也病在二經之表者多兼少陽三焦雄按此二句從吳本補入病在二經之裡者每兼厥陰風木以肝脾胃所居相近也以少陽厥陰同司相火少陽之氣由肝膽而升流行三焦即名相火陽明太陰濕熱內郁郁甚則少火皆成壯火而表裡上下充斥肆逆經曰少火生氣壯火食氣少火者陽和之生氣即元氣也壯火為亢陽之暴氣故反食其元氣食猶蝕也外邪郁甚使陽和之氣悉變為亢暴之氣而充斥一身也故是證最易耳聾乾嘔發痙發厥暑濕之邪蒙敝清陽則耳聾內擾肝脾胃則乾嘔而痙厥也而提綱中不言及者因以上諸症皆濕熱病兼見之變局而非濕熱病必見之正局也必見之症標於提綱使人辨識不至與他病混亂其兼見之變症或有或無皆不可定若標之反使人迷惑也始惡寒者陽為濕遏而惡寒終非若寒傷於表之惡寒濕為陰邪始遏其陽而惡寒既與暑合則兼有陽邪終非如寒邪之純陰而惡寒甚也後但熱不寒則鬱而成熱反惡熱矣雄按後則濕鬱成熱故反惡熱所謂六氣皆從火化也況與暑合則化熱尤易也熱盛陽明則汗出章云熱在濕中蒸濕為汗濕蔽清陽則胸痞濕邪內盛則舌白濕熱交蒸則舌黃雄按觀此句則提綱中舌白下應有或黃二字評胸痞舌白為濕熱握要之認病法若濕熱交蒸而舌黃者其苔必膩熱則液不升而口渴濕則飲內留而不引飲章云以上皆明提綱所標為必有之症也然所云表者乃太陰陽明之表而非太陽之表濕熱邪歸脾胃非同風寒之在太陽也雄按據此則前病在太陰下必有脫簡應從吳本補入太陰之表四肢也陽明也陽明之表肌肉也胸中也四肢稟氣於脾胃而肌肉脾胃所主若以脾胃分之則胃為脾之表胸為胃之表也故胸痞為濕熱必有之症四肢倦怠肌肉煩疼亦必並見此濕熱在脾胃之表症也其所以不幹太陽者以太陽為寒水之腑主一身之表雄按肺為天天包地外而處於上膀胱為水水環地極而處於下故皆為一身之表而風為陽邪首及肺經寒為陰邪先犯膀胱惟濕為中土之氣胃為中土之腑故胃受之楊云此注奇情至理所謂語必驚人總近情也風寒必自表入故屬太陽雄按陳亮師云風邪上受肺合皮毛故桂枝證有鼻鳴乾嘔也濕熱之邪從表傷者十之一二章云是濕隨風寒而傷表郁其陽氣而變熱如仲景條內麻黃赤小豆湯十五證是也由口鼻入者十之八九暑熱熏蒸之氣必由口鼻而入陽明為水穀之海太陰為濕土之臟故多陽明太陰受病濕輕暑重則歸陽明暑少濕多則歸太陰評濕溫必由陽明太陰受病乃同氣相求之義以其一陰一陽均屬濕土也膜原者外通肌肉內近胃腑即三焦之門戶實一身之半表半裡也雄按此與葉氏溫病篇第三章之論合邪由上受直趨中道故病多歸膜原章云外經絡內臟腑膜原居其中為內外交界之地凡口鼻肌肉所受之邪皆歸於此也其為三焦之門戶而近胃口故膜原之邪必由三焦而入脾胃也楊云細繹此言則膜原乃人脂之膜也然邪之由鼻入者必先至肺由口入者必先至胃何以云必歸膜原此不可解者也若云在內之邪必由膜原達外在外之邪必由膜原入內則似矣要之濕熱之病不獨與傷寒不同且與溫病大異溫病乃少陰太陽同病此仲景所論伏氣之春溫若葉氏所論外感之風溫則又不同者矣雄按此注知有少陰太陽之溫病則與前篇風溫條例力非伏氣之論者斷非一人之筆即按文義亦彼遜於此吳氏何以併為一家江本必欲相合強為刪改豈非自呈為妄耶汪按前篇自序自稱其名曰祖恭未言又有此篇此篇又無自序其非出一人手明甚夢隱辯之是也濕熱乃陽明太陰同病也始受於膜原終歸於脾胃而提綱中不言及脈者以濕熱之證脈無定體或洪或緩或伏或細名隨證見不拘一格故難以一定之脈拘定後人眼目也陽明熱盛見陽脈太陰濕盛見陰脈故名隨證見也璜按溫病由肺胃包絡及延髓神經發者居多邪伏厥陰寒熱吐蛔亦間有之此據仲景風溫例謂溫病乃少陰太陽同病似未完善濕熱之證陽明必兼太陰者徒知臟腑相連濕土同氣而不知當與溫病之必兼少陰比例少陰不藏木火內燔風邪外襲表裡相應故為溫病此即經言冬不藏精春發溫病先由內傷而後外感膏粱中人多有之其冬傷於寒由少陰伏邪至春發出於太陽之溫病藜藿中人多有之皆必兼少陰者也若外感風溫邪由上受者又當別論矣太陰內傷濕飲停聚客邪再至內外相引故病濕熱脾主為胃行津液者也脾傷而不健運則濕飲停聚故曰脾虛生內濕也雄按此言內濕素盛者暑邪入之易於留著而成濕溫病也此皆先有內傷再感客邪非由腑及臟之謂若濕熱之證不挾內傷中氣實者其病必微雄按內濕下盛者暑邪無所依傍雖患濕溫治之易愈或有先因於濕再因飢勞而病者亦屬內傷挾濕標本同病然勞倦傷脾為不足濕飲停聚為有餘雄按脾傷濕聚曷云有餘蓋太飽則脾困過逸則脾滯脾氣困滯而少健運則飲停濕聚矣較之飢傷而脾餒勞傷而脾乏者則彼尤不足而此尚有餘也後人改飢飽勞逸為飢飽勞役不但辨證不明於字義亦不協矣所以內傷外感孰多孰少孰實孰虛又在臨證時權衡矣二濕熱證惡寒無汗身重頭痛雄按吳本下有胸痞腰疼四字濕在表分宜藿香香薷羌活蒼朮皮薄荷牛蒡子等味頭不痛者去羌活雄按吳本無藿香香薷薄荷牛蒡子有葛根神麯廣皮枳殼評濕熱在表用開透法卻自不錯但藥大升燥尚未合度自注下仿此身重惡寒濕遏衛陽之表證頭痛必挾風邪故加羌活不獨勝濕且以祛風楊云濕宜淡滲不宜專用燥藥頭痛屬熱不必牽涉及風此條乃陰濕傷表之候章云惡寒而不發熱故為陰濕雄按陰濕故可用薷朮羌活以發其表設暑勝者三味皆為禁藥章氏既知陰濕因見其用香薷一味遂以此條為暑證之實據總由誤以濕熱為暑也故其論暑連篇累牘皆是影響之談夫七政運行有形可據尚難臆斷況太極無形空談無謂道邇求遠反誤後人茲概從刪免滋眩惑三濕熱證雄按吳本下有汗出二字惡寒發熱身重關節疼雄按吳本下有胸痞腰三字痛濕在肌肉不為雄按吳本作可汗解宜滑石大豆黃卷茯苓皮藿香葉鮮荷葉白通草桔梗等味不惡寒者去蒼朮皮雄按吳本此句作汗少惡寒者加葛根條內無荷葉藿香通草桔梗有神麯廣皮評濕在肌肉仍屬表證此條外候與上條同惟汗出獨異更加關節疼痛乃濕邪初犯陽明之表而即清胃脘之熱者不欲濕邪之鬱熱上蒸而欲濕邪之淡滲下走耳乃陽濕傷表之候以其惡寒少而發熱多故為陽濕也雄按吳本下有然藥用滲利其小便之不利可知矣二句汪按此二句乃他人所附評語璜按此急性之關節炎亦時感也西醫以為原因未詳總之病在軀殼外治法尤益佳良此證病在臂膊夜間臥後慎弗外露病在腰部勿前屈勿負重病在膝足肘手脘各關節臥時宜以鹽水布包纏患部翌晨再換效驗異常四濕熱證三四日即口噤四肢牽引拘急甚則角弓反張此濕熱侵入經絡脈隧中宜鮮地龍秦艽威靈仙滑石蒼耳子絲瓜藤海風藤酒炒黃連等味雄按吳本無此條此條乃濕邪挾風者風為木之氣風動則木張乘入陽明之絡則口噤走竄太陰之經則拘攣故藥不獨勝濕重用息風一則風藥能勝濕一則風藥能疏肝也選用地龍諸藤者欲其宣通脈絡耳十二經絡皆有筋相連繫邪由經絡傷乃於筋貝瘛瘲拘攣角弓反張筋由肝所主故筋病必當舒肝雄按地龍殊可不用加以羚羊竹茹桑枝等亦可篪伯云地龍靈仙蒼耳海風藤似嫌過於走竄不如羚羊竹茹桑枝等較妥或加鉤藤可乎璜按此節所謂腦髓病也每隨諸熱性病而發其為狀也頭痛嘔氣嘔吐眼火閉發耳鳴知覺鈍麻知覺異常脫失痙攣搐搦譫妄瞳孔散大或縮小視野狹小黑內障便秘嗜睡昏睡嚥下障礙人事不省運動麻痹偏癱性發熱或局癱發熱眩暈一切之運動障礙及失語等又按我國此等證謂之濕熱引動肝風熱病用升提藥尤易致此地龍秦艽既有未合凡甘菊羚羊竹茹桑枝菖蒲川貝銀花天竹連翹均可加入或問仲景治痙原有桂枝加瓜蔞根及葛根湯兩方豈宜於古而不宜於今耶今之痙者與厥相連仲景不言及厥豈金匱有遺文耶余曰非也藥因病用病源既異治法自殊汪按不但此也洄溪已云金匱治痙諸方見效絕少矣傷寒之痙自外來謂由外風證屬太陽口噤即屬陽明義詳本論治以散外邪為主濕熱之痙自內出謂由內風波及太陽治以息內風為主蓋三焦與肝膽同司相火少陽生氣生於肝膽流行三焦名相火也中焦濕熱不解則熱盛於裡而少火悉成壯火火動則風生而筋攣脈急風煽則火熾而識亂神迷雄按設再投桂葛以助其風則燎原莫救矣身中之氣隨風火上炎而有升無降雄按治溫熱諸病者不可不知此理常度盡失由是而形若屍厥正內經所謂血之與氣並走於上則為暴厥者是也外竄經脈則成痙內侵膻中則為厥痙厥並見正氣猶存一線則氣復返而生胃津不克支持則厥不回而死矣雄按喻氏云人生天真之氣即胃中之津液是也故治溫熱諸病首宜瞻顧及此董廢翁云胃中津液不竭其人必不即死皆見到之言也奈世人既不知溫熱為何病更不知胃液為何物溫散燥烈之藥漫無顧忌誠不知其何心也所以痙之與厥往往相連傷寒之痙自外來者安有是哉雄按此痙即瘛瘲也吳鞠通辨之甚詳確評此篇精微透徹一字一珠璜按有濕邪者熱邪不易外泄上熾則遏亂神明凡遇此等證宜清降透毒淡滲宣濕俾濕熱有出路方能透解暑月痙證與霍亂同出一源風自人生火隨風轉乘入陽明則嘔賊及太陰則瀉是名霍亂竄入經中則攣急流入脈絡則反張是名痙但痙證多厥霍亂少厥蓋痙證風火閉郁鬱則邪勢愈甚不免逼亂神明故多厥霍亂風火外泄泄則邪勢外解雄按宜作越不至循徑而走故少厥此痙與霍亂之分別也然痙證邪滯三焦三焦乃火化風得風而愈煽則逼入膻中而暴厥霍亂邪走脾胃脾胃乃濕化邪由濕而停留則淫及諸經而拘攣火鬱則厥火竄則攣又痙與厥之遺禍也痙之攣結乃濕熱生風霍亂之轉筋乃風來勝濕雄按木剋土也評痙證與霍亂多由暑邪擾亂神明經絡閉塞而成特霍亂由傷暑夾食而發痙則邪氣穿經入絡津液被劫肝風徒動故變成昏迷不醒和角弓反張諸症耳芳香逐穢開泄均不可少此外再隨其寒熱而施治痙則由經及臟而厥霍亂則由臟及經而攣總有濕熱與風淆亂清濁升降失常之故夫濕多熱少則風入土中而霍亂雄按霍亂濕多熱少道其常也余自髫年即見此證流行死亡接踵然聞諸父老云向來此證甚稀而近則常有因於道光戊戌輯一專論問世嗣後此證屢行然必在夏熟亢旱酷暑之年則其證乃據自夏末秋初而起直至立冬後始息夫彤彤徂暑濕自何來只緣今人蘊濕者多暑邪易於深伏迨一朝猝發遂至闔戶沿村風行似疫醫者未知原委理中四逆隨手亂投殊可嘆也余每治愈此證必問其人曰病未猝發之先豈竟毫無所苦耶或曰病前數日手足心先覺熱或曰未病前睹物皆紅如火噫豈非暑熱內伏欲發而先露其機耶咸豐紀元此證盛行經余治者無一不活而世人不察輒以薑附殺之不已傎乎楊云道光元年直省此證大作一覺轉筋即死京師至棺木買盡以席裹身而葬卒未有識為何證者俗傳食西瓜者即死故西瓜賤甚余時年十一輒與同學者日日飽啖之卒無恙今讀此論則醫學之陋不獨今日為然也熱多濕少則風乘三焦而痙厥厥而不返者死胃液乾枯火邪盤踞也轉筋入腹者死胃液內涸風邪獨勁也然則胃中之津液所關顧不鉅哉雄按此理喻氏發之葉氏暢之實諸病之生死關鍵也在溫熱等病尤為扼要然明明言之而鞠通虛谷之論霍亂也猶未知之況他人乎厥證用辛開泄胸中無形之邪也乾霍亂用探吐泄胃中有形之滯也然泄邪而胃液不上升者熱邪愈熾探吐而胃液不四布者風邪更張終成死候不可不知雄按此條自注明以濕熱二氣分疏章氏妄逞己見謂濕熱即暑也強合二氣為一氣且並難經濕溫熱病為一證矣蓋由未讀越人之書耳茲於原釋中悉為訂正而附記於此以質宗工璜按痙謂肢體拘急腦病脊髓病均有之霍亂由點狀菌觸接傳染暑熱盛行時多有之第霍亂糞如米泔汁狀全失臭氣四肢冰冷聲音嘶嘎下肢痙攣眼眶深陷其體溫降之三十五度以下者往往虛脫而死此即我國所謂寒證也其有體溫升騰呈反應熱馴至就治者亦恆有之此即我國所謂熱霍亂也治法麼啡一釐分作六份每次用六分之一了刀邊一釐分七十二份每次用七十二分之一開水和勻射入皮應效如響未效越一句鍾再射此藥功力甚大不可一點兩次射之服方淡磺強酸五滴鴉片酒五滴樟腦水四滴每半點鐘或一點鐘服一次身體厥冷欲催血進行者芥子洗腳最效欲鎮制嘔吐者則用冰片有大效五濕熱證壯熱口渴舌黃或焦紅發痙神昏譫語或笑邪灼心包營血已耗宜犀角羚羊角連翹生地元參鉤藤銀花露鮮菖蒲至寶丹四十一等味雄按吳本無銀花露汪按宜從吳本蓋花露清靈芳潤用治熱病殊佳然中有蘊濕者終覺非宜也上條言痙此條言厥溫暑之邪本傷陽氣雄按此謂邪之初感必先於陽分而傷氣也及至熱極逼入營陰雄按雖挾濕邪日久已從熱化在氣不能清解必至逼營則津液耗而陰亦病心包受灼神識昏亂用藥以清熱救陰泄邪平肝為務雄按昏譫乃將厥之兆也璜按此證在西醫謂神經症在我國謂熱灼營陰照此方治法真能起死回生余驗之屢矣六濕熱證發痙神昏笑妄脈洪數有力開泄不效者濕熱蘊結胸膈宜仿涼隔散四十二若大便數日不通者熱邪閉結腸胃宜仿承氣微下之例章云宜仿曰微下教人細審詳慎不可孟浪攻瀉蓋暑濕黏膩須化氣緩攻不同傷寒化熱而燥結須鹹苦峻下以行之也雄按吳本無此條評此證用大黃煎湯泡紫雪丹或泡安宮牛黃丸均極神效此條乃陽明實熱或上結胸膈或下結胃腸清熱泄邪止能散絡中流走之熱而不能除腸中蘊結之邪故陽明之邪仍假陽明為出路也陽明實熱舌苔必老黃色或兼燥若猶帶白色而滑者乃濕重為夾陰之邪或脹滿不得不下須佐二術健脾燥濕否則脾傷氣陷下利不止即變危證蓋濕熱重屬太陰證必當扶脾也雄按苔色白滑不渴腹雖脹滿是太陰寒濕豈可議下但宜厚朴枳術等溫中代濕為治若陽明之邪假陽明為出路一言真治溫熱病之金針也蓋陽明以下行為順邪既犯之雖不可孟浪攻瀉斷不宜截其出路故溫熱自利者皆不可妄行提澀也楊云注語極鄭重孟英辨駁尤精二說皆宜參究汪按凡率投補澀者皆不知邪必有出路之意者也評溫邪蒙敝大便不下非溫通不可但術樸方中宜加皂莢子較速七濕熱證壯熱煩渴舌焦紅或縮斑疹胸痞自利神昏痙厥熱邪充斥表裡三焦宜大劑犀角羚羊角生地元參銀花露紫草方諸水金汁鮮菖蒲等味雄按吳本無銀花露方諸水金汁有丹皮連翹此條乃痙厥中之最重者上為胸悶下挾熱利斑疹痙厥陰陽告困獨清陽明之熱救陽明之液為急務者恐胃液不存其人自焚而死也雄按此治溫熱諸病之真詮也醫者宜切記之方諸水俗以蚌水代之腥濁已甚宜用竹瀝為妙此證紫雪六十一神犀丹九十六皆可用也璜按此猩紅熱之發於神經者紫雪神犀極箸偉效八濕熱證寒熱如瘧雄按吳本下有活苔滑白口不知味八字濕熱阻遏膜原宜柴胡厚朴檳榔草果藿香蒼朮半夏干菖蒲六一散五十九等味雄按吳本無柴胡檳榔藿香菖蒲有神麯評諸藥必寒熱有定期又兼口不渴者方可取用否則變成單熱無寒坐臥不安或至成痙瘧由暑熱內伏秋涼外束而成若夏月腠理大開毛竅疏通安得成瘧而寒熱有定期如瘧證發作者以膜原為陽明之半表半裡濕熱阻遏則營衛氣爭證雖如瘧不得與瘧同治故仿又可達原飲之例蓋一由外涼束一由內濕阻也膜原在半表半裡如少陽之在陰陽交界處而營衛之氣內出於脾胃脾胃邪阻則營衛不知而發寒熱似瘧之證矣九濕熱證數日後脘中微悶知飢不食濕邪蒙繞三雄按宜作上焦宜藿香葉薄荷葉鮮荷葉枇杷葉佩蘭葉雄按離騷紉秋蘭以為佩故稱秋蘭為佩蘭若藥肆中所售之佩蘭乃妳甜草之類不可入藥也汪按蘭即省頭草離騷之蘭即本草之蘭皆非今之蘭花前人辨之已極明確不必致疑矣蓋古人所謂香草皆取葉香非指花香而今之蘭花葉實不香明非古之蘭也醫者疑古藥品之蘭蕙正如儒者之疑古食品之蚳螷皆不通古今之變者也蘆尖雄按即蘆根也用尖取其宣暢冬瓜仁等味雄按吳本無此條評此辛香涼潤透濕之良法亦開泄上焦濕熱之方此濕熱已解餘邪矇蔽清陽胃氣不舒宜用極輕清之品以宣上焦陽氣若投味重之劑是與病情不相涉矣雄按章氏謂輕劑專為吳人體弱而設是未察病情之言也或問濕熱盛時疫氣流行當服何藥預為消弭余為葉訥人醫案存真載其高祖天士先生案云天氣鬱勃泛潮常以枇杷葉拭去毛淨鍋炒香泡湯飲之取芳香不燥不為穢濁所侵可免夏秋時令之病余則建蘭葉竹葉冬瓜蘆根皆主清肅肺氣故為溫熱暑濕之要藥肺胃清降邪自不容矣若別藥恐滋流弊方名雖美不可試也而薄滋味遠酒色尤為要務此條須與第三十一條參看彼初起之實邪故宜湧泄投此輕劑不相合矣又須與後條參看治法有上中之分臨證審之解後餘邪為虛初發者為實上焦近心故有懊惱譫語中焦離心遠故無如其舌黃邪盛亦有發譫語者十濕熱證初起發熱汗出胸痞口渴舌白濕伏中焦宜藿梗蔻仁杏仁枳殼桔梗鬱金蒼朮厚朴草果半夏干菖蒲佩蘭葉六一散五十九楊云俱可用但須擇一二味對證者用之不必並用等味雄按吳本胸痞下曰不知飢口渴下曰不喜飲舌白作舌苔滑白無杏仁蒼朮厚朴草果半夏評此溫運中焦濕熱之方此等藥治此等病未盡得當臨證時尚須有去取濁邪上干則胸悶胃液不升則口渴病在中焦氣分故多開中焦氣分之藥雄按亦太多頗不似薛氏手筆此條多有挾食者其舌根見黃色宜加瓜蔞楂肉萊服子汪按此疑亦後人所附評語評胸悶口渴舌苔白厚而黃亦有挾痰者十一濕熱證數日後雄按吳本下有胸痞二字自利溺赤雄按吳本作澀口渴雄按吳本上有身熱二字濕流下焦宜滑石豬苓茯苓澤瀉萆薢通草等味雄按吳本無澤瀉通草有神麯廣皮評此分利下焦濕熱之法下焦屬陰太陰所司陰道虛故自利化源滯則溺赤脾不轉津則口渴總由太陰濕勝故也濕滯下焦故獨以分利為治然兼證口渴胸痞須佐入桔梗杏仁大豆卷開泄中上源清則流自潔不可不知雄按據此則本條胸痞二字當從吳本增入為是至源清流潔云云則又非自注之文法殊可疑也汪按此篇多有後人評語傳寫羼入自注之處此數語亦後人所附評語也以上三條俱濕重於熱之候評治濕熱寒吐下俱能變證但當分上中下焦透發開泄以輕減其勢濕熱誤汗固死誤補氣機不宣亦成重症濕熱之邪不自表而入故無表裡可分謂由膜原中道而入也雖無表裡之分亦有淺深當別而未嘗無三焦可辨猶之河間治消渴亦分三焦者是也夫熱為天之氣雄按此明熱即暑之謂也章氏何以曲為改釋濕為地之氣熱得濕而愈熾濕得熱而愈橫雄按熱得濕則鬱遏而不宣故愈熾濕得熱則蒸騰而上熏故愈橫兩邪相合為病最多丹溪有云濕熱為病十居八九故病之繁且苛者莫如夏月為最以無形之熱蒸動有形之濕素有濕熱之人易患濕溫誤發其汗則濕熱混合為一而成死證名曰重暍也濕熱兩分其病輕而緩濕熱兩合其病重而速章云故當開泄以分其熱若誤作虛而用補法則閉塞氣道而死矣濕多熱少則蒙上流下當三焦分治調三焦之氣分利其濕也濕熱俱多則下閉上壅而三焦俱困矣當開泄清熱兩法兼用猶之傷寒門二陽合病三陰合病也蓋太陰濕化三焦火化有濕無熱止能蒙敝清陽或阻於上或阻於中或阻於下若濕熱一合則身中少火悉化為壯火而三焦相火有不起而為瘧者哉雄按濕熱一合業以陰從陽化如此披猖況熱多濕少乎故不言熱多濕少者非闕文也蓋急宜清熱有不待言矣所以上下充斥內外煎熬最為酷烈雄按曰酷曰烈皆暑之威名兼之木火同氣表裡分司再引肝風痙厥之至雄按津虛之體夏月每有肝風徙動煎厥一證言其不耐暑氣煎熬可謂形容逼肖評痙厥多由津虛故溫熱病汗多者即能發痙雷少逸治溫病無汗者主透汗有汗者主養津的是妙法胃中津液幾何其能供此交徵乎雄按不辨暑證之夾溫與否而輒投溫燥以劫津液者宜鑑斯言至其所以必屬陽明者以陽明為水穀之海鼻食氣口食味悉歸陽明邪從口鼻而入則陽明為必由之路雄按脾胃大腸一氣相通溫熱究三焦以此一臟二腑為最要肺開竅於鼻吸入之邪先犯於肺肺經不解則傳於胃謂之順傳不但臟病傳腑為順而自上及中順流而下其順也有不侍言者故溫熱以大便不閉者易治為邪有出路也若不下傳於胃而內陷於心包絡不但以臟傳臟其邪由氣分入營更進一層矣故曰逆傳也因葉氏未曾明說順傳之經世多誤解逆傳之理余已僭注於本條之後讀此可證管窺之非妄汪按鼻為肺竅所受之氣必先入肺此云悉歸陽明不免語病夢隱以肺經不解乃傳入胃釋之意始圓愜評此注於病源極精不磨之論其始也邪入陽明早已先傷其胃液其繼邪盛三焦更欲資取於胃液司命者可不為陽明顧慮哉雄按此不獨為濕熱病說法也風寒化熱之後亦須顧此況溫熱乎或問木火同氣熱盛生風以致痙厥理固然矣然有濕熱之證表裡極熱不痙不厥者何也余曰風木為火熱引動者原因木氣素旺木旺由於水虧故得引火生風反焚其木以致痙厥若水旺足以制火而生木即無痙厥者也肝陰先虧內外相引兩陽相煽因而動雄按吳本作勁張若肝腎素優並無裡熱者火熱安能招引肝風也雄按喻氏云遇暄氣而不覺其熱者乃為平人蓋陰不虛者不畏暑而暑不易侵雖侵之亦不致劇猶之乎水田不懼旱也陰虛者見日即畏雖處深宮之內而無形之暑氣偏易侵之更有不待暑侵而自成為厥者矣楊云虛損之原一語揭出試觀產婦及小兒一經壯熱便成瘛瘲者以失血之後與純陽之體陰氣未充故肝風易動也雄按原本未及產婦今從吳本與小兒並論尤為周密然婦科不知血脫易痙往往稱為產後驚風喻氏僻之韙矣幼科一見發熱即以柴葛解肌為家常便飯初不究其因何而發熱也表熱不清柴葛不撤雖肝風已動瘛瘲已形猶以風藥助虐不亦傎乎此葉氏所以有劫肝陰竭胃汁之切戒也楊云痙厥之證舉世不知其因今經此詳明剖析昭如白日矣評切中時弊此等庸醫處處皆然天枉人命不可勝數或問曰亦有陰氣素虧之人病患濕熱甚至斑疹外見入暮譫語昏迷而不痙不厥者何也答曰病邪自盛於陽明之營分故由上脘而薰胸中則入暮譫妄邪不在三焦氣分則金不受囚木有所畏未敢起而用事至於斑屬陽明疹屬太陰亦二經營分熱極不與三焦相干即不與風木相引也此而痙厥必胃中津液盡涸耗及心營則肝風亦起而其人已早無生理矣雄按此從吳本採補觀此則粗工之治溫熱妄用柴葛竭力以耗胃汁而鼓其肝風者真殺人不以刃也惟稍佐於涼潤方中或不致為大害十二溫熱證舌扁體白口渴濕滯陽明宜用辛開如厚朴草果半夏干菖蒲等味舌白者言其苔若苔滑而口不渴者即屬太陰證宜溫之雄按苔白不渴須詢其便溺不熱者始為宜溫之的證也又按此與第十條證相似吳本無此條楊云濕勝熱微之證初起原可暫用此等藥開之一見開濕化熱便即轉手清熱若執此為常用之法則誤矣注內補出審便溺一層尤為周到此濕邪極盛之候口渴乃液不上升非有熱也辛泄太過即可變而為熱以其屬陽明濕邪開泄則陽氣升而熱透而此時濕邪尚未蘊熱故重用辛開使上焦得通津液得下也陽氣升則津液化而得上輸下布也璜按宣透濕邪後其熱每熾所謂宣之不愈必待其熱而後清清而後愈也若察其溺有熱為熱重於濕於宣透中必兼清解十三濕熱證舌根白舌尖紅濕漸化熱余濕猶滯宜辛泄佐清熱如蔻仁半夏干菖蒲大豆黃卷連翹綠豆衣六一散五十九等味雄按吳本無此條此濕熱參半之證而燥濕之中即佐清熱者亦所以存陽明之液也上二條憑驗舌以投劑為臨證時要訣蓋舌為心之外候濁邪上熏心肺舌苔因而轉移葉氏溫熱論辨舌最精詳宜合觀之雄按更宜參之準繩評濕熱證參半者宜透濕清熱合用十四濕熱證初起即胸悶不知人瞀亂大叫痛濕熱阻閉中上二焦宜草果檳榔鮮菖蒲芫荽六一散五十九各重用或加皂角地漿水煎雄按吳本無此條淦按此條頗似痧證宜用靈驗痧丸為妙六一散有甘草須慎用此條乃濕熱俱盛之候而去濕藥多而清熱藥少者以病邪初起即閉不得不以辛通開閉為急務不欲以寒涼凝滯氣機也雄按芫荽不如用薤白或可配瓜蔞梔豉者則配之璜按此證別有開泄驗方非煎劑所能奏效也靈驗痧丸及紫金錠並藥中含有樟腦質鴉片質者均效徒用煎劑必誤事十五濕熱證四五日口大渴胸悶欲絕乾嘔不止脈細數舌光如鏡胃液受劫膽火上衝宜西瓜汁金汁鮮生地汁甘蔗汁磨服鬱金木香香附烏藥等味雄按吳本作西瓜白汁謂不取瓤中汁而以瓜肉搗汁也並無金汁蔗汁此營陰素虧木火素旺者木乘陽明耗其津液幸無飲邪故一清陽明之熱一散少陽之邪不用煎者取其氣全耳舌光無苔津枯而非濁壅反胸悶欲絕者肝膽氣上逆也故以諸汁滋胃液辛香散逆氣雄按凡治陰虛氣滯者可以仿此用藥楊云此例精當能如此旁通方為善讀書人雄又按治飲痛一案宜參俞惺庵云嘉善一人胸脹脘悶諸治不效一瓢用續隨子煎湯磨沉香木香檀香降香丁香服一月瀉盡水飲而痊汪按續隨子去油務盡否則誤人去油法木狀用椹榨後更宜紙隔重壓換紙多次方能去淨璜按以胸悶乾嘔知其氣滯以脈細數舌光如鏡知其陰虧看他用藥養陰而不滯邪調氣又不枯陰斯為靈妙十六濕熱證雄按吳本下有身熱口苦四字嘔吐清水或痰多濕熱內留木火上逆宜溫膽湯九十七加瓜蔞雄按吳本作黃連碧玉散五十九等味評溫膽湯嫌其大溫以有吐水痰多故可用此素有痰飲而陽明少陽同病故一以滌飲一以降逆與上條嘔同而治異正當合參碧玉散即六一加青黛以清肝膽之熱上條液枯以動肝膽之火故乾嘔此條痰飲郁其肝膽之火故嘔水十七濕熱證嘔惡不止晝夜不差欲死者肺胃不和胃熱移肺肺不受邪也宜用川連三四分蘇葉二三分兩味煎湯呷下即止評用輕藥以治重病立法頗奇又確能有效真良方也肺胃不和最易致嘔蓋胃熱移肺肺不受邪還歸於胃必用川連以清濕熱蘇葉以通肺胃投之立愈者以肺胃之氣非蘇葉不能通也分數輕者以輕劑恰治上焦之病耳雄按此方藥止二味分不及錢不但治上焦宜小劑而輕藥竟可以愈重病所謂輕可以去實也合後條觀之蓋氣貴流通而邪氣撓之則周行窒滯失其清虛靈動之機反覺實矣惟劑以輕清則正氣宣布邪氣潛消而窒滯者自通設投重藥不但已過病所病不能去而無病之地反先遭其克伐章氏謂輕劑為吳人質薄而設殆未明治病之理也川連不但治濕熱乃苦以降胃火之上衝蘇葉味甘辛而氣芳香通降順氣獨擅其長然性溫散故雖與黃連並駕尚減用分許而節制之可謂方成知約矣世人不知諸逆上衝上皆屬於火之理治嘔輒以薑萸丁桂從事者皆粗工也余用以治胎前惡阻甚妙十八濕熱證咳嗽晝夜不安甚至喘不得眠者暑邪入於肺絡宜葶藶枇杷葉六一散五十九等味雄按吳本咳嗽下有喘逆面赤氣粗六字而無甚至句評病較輕者用千金葦莖湯加滑石杏仁亦效人但知暑傷肺則肺虛而不知暑滯肺絡則肺實葶藶引滑石直瀉肺邪則病自除吳子音曰業師張友樵治一酒客夏月痰嗽氣喘夜不得臥服涼藥及開氣藥不效有議用人參麥冬等藥者師診其脈右寸數實此肺實而非肺虛也投以人參則立弊矣遂與此方煎服立愈明年復感客邪壅遏肺氣喘咳復作醫有以葶藶進者服之不效反煩悶汗泄師脈其右寸浮數口渴惡熱冷汗自出喘急煩悶曰熱邪內壅肺氣鬱極是以逼汗外出非氣虛自汗也服葶藶而反煩悶者肺熱極盛與苦寒相格拒也夫肺若氣上逆本宜苦以泄之而肺欲散又當兼食辛以散之與麻杏甘石湯九十八一劑肺氣得通而喘止汗斂諸症悉平矣楊云余曾治一酒客大喘用金鑑蘇葶丸而愈亦與此同此蓋濕熱上壅之證也至案內所云服此益甚則外感束其肺熱用此降之則外感反內陷而病益甚麻杏甘石正怯外感而清內熱之方故速愈張君用藥則是而立論高而不切非垂教後學之法也十九濕熱證十餘曰大勢已退惟口渴汗出骨節雄按吳本有隱字痛雄按吳本下有不舒小便赤澀不利八字餘邪留滯經絡宜元米即糯米湯泡於朮隔一宿去朮煎飲評用元米泡於朮毫無助熱之弊以之養陰化濕頗見靈巧病後濕邪未盡陰液先傷故口渴身痛此時救液則助濕治濕則劫陰宗仲景麻沸湯之法取氣不取味走陽不走陰佐以元米湯養陰逐濕兩擅其長楊云煎法精妙注亦明晰汪按此身痛一症乃濕滯之的驗則口渴未必非濕淫於內而引飲也然津液亦必須顧慮以術治濕不用煎而用泡巧妙亦周致雄按用沙參麥冬石斛枇杷葉等味冬瓜湯煎服亦可汪按用冬瓜靈妙宜加絲瓜絡璜按王氏用清潤之藥以解病後濕熱餘邪亦妥但尚宜加萆薢薏仁以治骨節痛似覺周到二十濕熱證數日後汗出熱不除或痙忽頭痛不止者營液大虧厥陰風火上升宜羚羊角蔓荊子鉤藤元參生地女貞子等味雄按吳本無女貞子有白芍楊云白芍不如女貞濕熱傷營肝風上逆血不榮筋而痙上升顛頂則頭痛熱氣已退木氣獨張故痙而不厥投劑以息風為標養陰為本雄按蔓荊不若以菊花桑葉易之楊云蔓荊最無謂所易甚佳汪按枸杞子亦可用不嫌其膩璜按汗出熱留營液受傷則肝風徙動上攻腦髓而頭痛發痙因熱尚輕故不昏厥也潤肝息風如玉竹參葉桑枝連翹甘菊穭豆衣均能奏效西洋醫用鉀溴東醫名臭剝以二分合白糖和水服之有偉效二十一濕熱證胸痞發熱肌肉發疼始終無汗者腠理暑邪內閉雄按吳本無此四字作氣機拂鬱濕熱不能達外楊云吳本勝於原本宜六一散五十九一兩薄荷葉三四分雄按吳本作三四十片泡湯調下即汗解濕病發汗昔賢有禁此不微汗之病必不除蓋既有不可汗之大戒復有得汗始解之治法臨證者當知所變通矣吳云此濕邪蘊遏氣鬱不宣故宜辛涼解散汗出灌浴之輩最多此患若加頭痛惡寒便宜用香薷溫散矣章云濕病固非一概禁汗者故仲景有麻黃加朮湯等法但寒濕在表法當汗解濕熱在裡必當清利今以暑濕閉於腠理故以滑石利毛竅若閉於經者又當通其經絡可知矣汪按吳本薄荷較多則非微汗矣璜按用泡湯取其輕揚透汗如用煎劑則蘆根豆豉竹葉杏仁綠豆衣均輕清開泄以取微汗亦佳二十二濕熱證按法治之數日後或吐下一時並至者中氣虧損升降悖逆宜生穀芽蓮心雄按當是蓮子扁豆米仁半夏甘草茯苓等味甚者用理中法四十五雄按吳本無此條若可用理中法者必是過服寒涼所致評此病後和平養胃之法以治吐下輕病則可耳升降悖逆法當和中猶之霍亂之用六和湯也若太陰憊甚中氣不支非理中不可忽然吐下更當細審脈症有無重感別邪或傷飲食雄按亦有因忿怒而致者須和肝胃二十三濕熱證十餘日後左關弦數腹時痛時圊血肛門熱痛血液內燥熱邪傳入厥陰之證宜仿白頭翁法九十九評此西醫所謂腸炎也用黃芩湯加銀花元明粉可以治之熱入厥陰而下利即不圊血亦當宗仲景治熱利法若竟逼入營陰安得不用白頭翁湯涼血而散邪乎設熱入陽明而下利即不圊血又宜師仲景下利譫語用小承湯三十九之法矣雄按章氏謂小承氣湯乃治厥陰熱利若熱入陽明而下利當用黃芩湯此不知傷寒論有簡誤之文也本文云下利譫語者有燥矢也宜小承氣湯既有燥矢則為太陰轉入陽明之證與厥陰無涉矣濕熱入陽明而下利原宜宗黃芩湯為法其有燥矢而譫語者未嘗無其候也則小承氣亦可援例引用焉二十四濕氣證十餘日後尺脈數下利或咽痛口渴心煩下泉不足熱邪直犯少陰之證宜仿豬膚湯三涼潤法同一下利有厥少之分則藥有寒涼之異謂厥陰宜寒少陰宜涼也然少陰有便膿之候不可不細審也二十五濕熱證身冷脈細汗泄胸痞口渴舌白濕中少陰之陽宜人參白朮附子茯苓益智等味雄按吳本無此條楊云此等證固有之然本論濕熱卻夾入寒濕又不提明藥誤豈不自亂其例評此注辨證最精此條濕邪傷陽理合扶陽逐濕口渴為少陰證烏得妄用寒涼耶津液出於舌下少陰經之廉泉穴故凡少陰受邪津液不升則渴也然胸痞舌白當加厚朴半夏或乾薑恐參術太壅氣也渴者濕遏陽氣不代津液以上升非熱也雄按此濕熱病之類證乃寒濕也故傷人之陽氣或濕熱病證治不如法但與清熱失於化濕亦有此變但口渴而兼身冷脈細汗泄舌白諸症者固屬陰證宜溫還須察其二便如溲赤且短便熱極臭者仍是濕熱蘊伏之陽證雖露虛寒之假象不可輕投溫補也章氏所云濕遏陽氣不化津液之曷又為太陰還而非少陰證矣璜按此節乃濕寒證非濕熱證也若濕熱有虛寒之假象因熱為濕遏仍當開濕清熱此中具有手法多讀王氏醫案及名醫類案寒熱篇自別有一番見解二十六暑月病初起但惡寒面黃口不渴神倦四肢懶脈沉弱腹痛不利濕困太陰之陽宜仿縮脾飲一百甚則大順散六十來復丹八十四等法雄按吳本無此條暑月為陽氣外泄陰氣內耗之時故熱邪傷陰陽明消爍宜清宜涼雄按此治暑之正法眼藏太陰告困濕濁瀰漫宜溫宜散雄按凡寒濕為病雖在暑月忌用涼藥宜舍時從證也昔賢雖知分別論治惜不能界畫清釐而創陰暑等名貽誤後學不少徐洄溪云天有陰暑人間有陰熱矣一語破的汪按知夏日有陰暑冬日當有陽寒乎倘冬日感病而醫者云此為陽寒治宜涼藥未有不嗤其妄者而陰暑之名乃相沿數百年積非勝是不可解也古法最詳醫者鑑諸仲景謂自利不渴者屬太陰以其贓有寒故也今濕重惡寒不發熱即為太陰證之寒濕也如或肢冷脈細必須姜附理中法四十五璜按此必其人平素氣血俱虧故初病而即見此等症也氣虛則惡寒血虛則面黃氣血俱衰故神倦四肢懶脈沉弱而腹痛下利乃濕寒之病也此證四時俱有非徒暑月為然二十七濕熱證按法治之諸症皆退惟目瞑則驚悸夢惕餘邪內留膽氣未舒宜酒浸郁李仁薑汁炒棗仁豬膽皮等味雄按吳本無此條滑可去著郁李仁性最滑脫古人治驚後肝系滯而不下始終目不瞑者用之以下肝系而去滯此證借用良由濕熱之邪留於膽中膽為清虛之府藏而不瀉是以病去而內留之邪不去寐則陽氣行於陰膽熱內擾肝魂不安用郁李仁以泄邪而以酒行之酒氣獨歸膽也棗仁之酸入肝安神而以薑汁製安神而又兼散邪也肝性喜涼散棗仁薑汁太溫似宜酌加涼品雄按此釋甚是如黃連山梔竹茹桑葉皆可佐也璜按熱病後心血略虛餘邪煩擾以致腦筋不寧故見目瞑則驚悸夢惕等症擬方用生地潤血黃連山梔以清餘熱整塊硃砂白茯神首烏藤以寧睡止悸而鎮驚惕足可取效二十八濕熱證曾開泄下奪惡候皆平獨神思不清倦語不思食溺數唇齒乾胃氣不輸肺氣不布元神大虧宜人參麥冬石斛木瓜生甘草生穀芽鮮蓮子等味雄按吳本無此條汪按百合似亦可用評此善後之妙方開泄下奪惡候皆平正亦大傷故見證多氣虛之象理合清補元氣若用膩滯陰藥去生便遠雄按此肺胃氣液兩虛之證故宜清補不但陰膩不可用且與脾虛之宜於守補溫運者亦異楊云分別極清二十九濕熱證四五日忽大汗出手足冷脈細如絲或絕口渴莖痛而起坐自如神清語亮乃汗出過多衛外之陽暫亡濕熱之邪仍結一時表裡不通脈故伏非真陽外脫也宜五苓散二十一去朮加滑石酒炒川連生地耆皮等味雄按吳本無川連生地評此證若遇庸手必誤認為亡陽以有口渴莖痛故知乃屬熱證也倘誤服姜附必死此條脈症全似亡陽之候獨於舉動神氣得其真情噫此醫之所以貴識見也以口渴莖痛知其邪結以神清語亮知非脫證雄按此條原注全似評贊章氏以為自注究可疑也至衛陽暫亡必由誤表所致濕熱仍結陰液已傷故以四苓加滑石導濕下行川連生地清火救陰耆皮固其衛氣用法頗及周密楊云發明方意精當汪按此注當亦後人所附評語且此證世所罕見況亡陽脫證起坐自如神清語亮者亦不少據以辨證似不甚明確惟口渴莖痛為亡陽所無耳璜按大汗傷其心液故手足冷脈細如絲熱邪仍結故口渴莖痛元氣猶得保持故起坐自如神清語亮汗出過多固見此症而誤服寒涼冰閉者亦有此候觀王孟英治潘翼廷案用六一散攪淡鹽湯澄去滓調下紫雪丹以解其冰閉之邪是何等手法三十濕熱證發痙神昏獨足冷陰縮下體外受客寒仍宜從濕熱治只用辛溫之品煎湯熏洗楊云仍從濕熱治是矣辛溫熏洗不愈益其濕乎不惟治下而遺上也汪按熏洗似無大礙但未必有益陰縮為厥陰之外候合之足冷全似虛寒乃諦觀本證無一屬虛始知寒客下體一時營氣不達不但證非虛寒並非上熱下寒之可擬也仍從濕熱治之又何疑耶發痙神昏邪犯肝心若邪重內閉厥陰將絕必囊縮足冷而舌亦卷是邪深垂死之證本非虛寒今云由外受客寒臨證更當詳細審問為要雄按此條本文頗有語病恐非生白手筆璜按發痙神昏足冷陰縮熱病有神經性者每見此候用樟腦劑必效以樟腦能興奮神經而漸達於生殖器也樟腦用量每次可服一釐七白糖加水和服原文不出方茲特補之此藥向西藥房買中藥鋪不可用三十一濕熱證初起壯熱口渴脘悶懊憹眼欲閉時譫語濁邪蒙敝上焦宜湧泄用枳殼桔梗淡豆豉生山梔無汗者加葛根此與第九條宜參看彼屬餘邪法當輕散餘邪不淨者自無壯熱譫語等症必與初起邪勢重者形狀不同此則濁邪蒙閉上焦故懊憹脘悶眼欲閉者肺氣不舒也時譫語者邪郁心包也若投輕劑病必不除經曰高者越之用梔豉湯十一湧泄之劑引胃脘之陽而開心胸之表邪從吐散若舌苔薄而清者邪未膠結可吐散如舌苔厚而有根濁邪瘀結須重用辛開苦降如吐之邪結不得出反使氣逆而變他證矣雄按此釋甚是病在上焦濁邪未結故可越之若已結在中焦豈可引吐不但濕熱證吐法宜慎也即痰飲證之宜於取吐者亦有辨別要訣趙恕軒串雅云宜吐之證必須看痰色吐在壁上須其痰干之後有光亮如蝸牛之涎者無論痰在何經皆可吐也若痰干之後無光亮之色者切忌用吐彼驗痰漬此驗舌苔用吐者識之又按何報之云子和治病不論何證皆以汗吐下三法取效此有至理存焉蓋萬病非熱則寒寒者氣不運而滯熱者氣亦壅而下運氣不運則熱鬱痰生血停食積種種阻塞於中矣人身氣血貴通而不貴塞非三法何由通乎又去邪即所以補正邪去則正自復但以平淡之飲食調之不數日而精神勃發矣故婦人不孕者此法行後即孕陰陽和暢也男子陽道驟興非其明驗乎後人不明此理而不敢用但以補溫為穩殺人如麻可嘆也汪按何說乃據倒倉法言之璜按以葛根桔梗治濕熱脘悶眼閉譫語未合如欲透汗蘆根滑石杏仁薄荷為穩三十二濕熱證經水適來壯熱口渴譫語神昏胸腹痛或舌無苔脈滑數邪陷營分宜大劑犀角紫草茜根貫眾連翹鮮菖蒲銀花露等味雄按世人但知小柴胡湯一法而不分傷寒溫暑之病何也淦按茜根不若以丹皮赤芍易之評此方清營解熱開竅提神具見靈妙熱入血室不獨婦女男子亦有之不第涼血並須解毒然必重劑乃可奏功仲景謂陽明病下血譫語者此為熱入血室即指男子而言故無經水適來之語三十三濕熱證上下失血或汗血毒邪深入營分走竄欲泄宜大劑犀角生地赤芍丹皮連翹紫草茜根銀花等味雄按以上四條雄本無之丹皮雖涼血而氣香走泄能發汗惟血熱而瘀者宜之又善動嘔胃弱者勿用熱逼而上下失血汗血勢極危而猶不即壞者以毒從血出生機在是大進涼血解毒之劑以救陰而泄邪邪解而血自止矣血止後須進參耆善後乃得汪按善後宜兼養血汗血即張氏所謂肌衄也內經謂熱淫於內治以鹹寒方中當增入鹹寒之味此說未知何人所注亦甚有理也汪按可知牡蠣並有止汗之功不嫌其澀此注乃後人所附評語未羼入原注者他條俱與原注併合不可分析矣雄按此條本文但云熱證是感受暑熱而不挾濕邪者也暑熱之氣極易傷營故有是證章氏乃云此篇所謂淫熱即是暑也然則此條不曰淫熱而曰熱者又是何病耶夫寒暑二氣易經即以往來對待言之矣後之妄呈臆說者真是冷熱未知辛甫云辯得是璜按此毒熱也服清血方血宜止不止即危余嘗見熱病大衄一日而死到今思之猶無法制止也醫道誠難矣哉三十四濕熱證七八日口不渴聲不出與飲食亦不卻雄按吳本有二便自通句默默不語神識昏迷進辛香涼泄芳香逐穢俱不效此邪入雄按吳本下有手字厥陰主客渾受宜仿吳又可三甲散一百一醉地鱉蟲醋炒鱉甲土炒穿山甲生殭蠶雄按吳本無此味柴胡桃仁泥等味暑濕先傷陽分然病久不解必及於陰陰陽兩困氣鈍血滯而暑濕不得外泄雄按據章氏以此為薛氏自注然疊以暑濕二氣並言以解濕熱病證若謂暑中原有濕則暑下之濕又為何物乎一笑余恐後學迷惑故不覺其饒舌也遂深入厥陰絡脈凝瘀使一陽少陽生氣也不能萌動生氣有降無升心主阻遏靈氣不通所以神不清而昏迷默默也破滯通瘀斯絡脈通而邪得解矣海昌許益齋云此條即傷寒門百合病之類趙以德張路玉陶厚堂以為心病徐忠可以為肺病本論又出厥陰治法良以百脈一宗悉致其病元氣不布邪氣淹留乃祖仲景法用異類靈動之物鱉甲入厥陰用柴胡引之俾陰中之邪盡達於表䗪蟲入血用桃仁引之俾血分之邪盡泄於下山甲入絡用殭蠶引之俾絡中之邪亦從風化而散緣病久氣鈍血滯非拘拘於恆法所能愈也汪按此有神昏一症可知其非百合病矣故與百合病異治百合病究宜治肺為是璜按濕熱證誤治變為此候者頗多葉氏以為濕邪蒙敝故神呆用溫運開濕之法此節主行瘀通絡以治神識昏迷乃為病久血渾亂者而設不知與飲食不卻則神機猶在若明若昧之間不必濕邪虛證亦有之余曾遇此證診其脈甚虛舌淡紅而無苔投以養營湯而愈乃知治病未可拘執一法也西洋醫每譏中國醫學無定論噫惟無定論乃所以為中國之醫學三十五濕熱證口渴苔黃起刺脈弦緩囊縮舌硬譫語昏不知人兩手搐搦津枯邪滯宜鮮生地蘆根生首烏鮮稻根等味若脈有力大便不通大黃亦可加入雄按吳本無此條汪按首烏味澀似未妥胃津劫奪熱邪內據非潤下以泄邪則不能達故仿承氣之例以甘涼易苦寒正恐胃氣受傷胃津不復也璜按昏譫搐搦津枯黃刺痙厥大端畢具加以囊縮舌硬已成十不救一之證僅用生地首烏蘆稻根藥力輕微何濟於事此證須以溫病條辨護胃承氣湯和安官牛黃丸或紫雪丹服之為死裡求生之計十中可救一二三十六濕熱證發痙撮空神昏笑妄舌苔干黃起刺或轉黑色大便不通者熱邪閉結胃腑宜用承氣湯六下之雄按此下十一條從吳本補入撮空一症昔賢謂非大實即大虛虛則神明渙散將有脫厥之虞實則神明被逼故多繚亂之象今舌苔黃刺干澀大便閉而不通其為熱邪內結陽明腑熱顯然矣徒事清熱泄邪止能散絡中流走之熱不能除胃中蘊結之邪故假承氣以通地道然舌不幹黃起刺者不可投也雄按第二十八條有曾開泄下奪之文則濕熱病原有可下之證惟濕未代燥腑實未結者不可下耳下之則利不止如已燥結亟宜下奪否則垢濁熏蒸神明蔽塞腐腸爍液莫可挽回較彼傷寒之下不嫌遲去死更速也楊云通透之論承氣用硝黃所以逐陽明之燥火實熱原非濕熱內滯者所宜用然胃中津液為熱所耗甚至撮空繚亂舌苔干黃起刺此時胃熱極盛胃津告竭濕火轉成燥火故用承氣以攻下承氣者所以承接未亡之陰氣於一線也濕溫病至此亦危矣哉汪按治溫熱與傷寒異而溫熱壞證多與傷寒同評汗出過多胃燥變痙承氣湯即起死之神方須放膽用之雄按董發翁有云外感之邪既不得從元腑透達則必向里而走空隙而十二臟腑之中惟胃為水穀之海其上有口其下有口最虛而善受故諸邪皆能入之邪入則胃實矣胃實則津液干矣津液干則死矣楊乘六云此言道盡感證致死根由彼肆用風燥之劑劫液夭人生命者正坐不知此義耳余謂凡治感證須先審其胃汁之盛衰如邪漸化熱即當濡潤胃腑俾得流通則熱有出路液自不傷斯為善治若恃承氣湯為焦頭爛額之客詎非曲突徙薪之不早耶楊云陳修園自謂讀傷寒論數十年然後悟出存津液三字而其用藥仍偏辛燥不知其所悟者何在得孟英反復申明迷者庶可大悟乎汪按此條語語破的楊評亦妙存津液固為治溫暑諸證之要務然非專恃承氣湯急下存津一法也璜按發痙撮空神昏笑妄舌苔干黃起刺此內腎水虧已失功用尿毒不能外泄混入血內宜用滋腎之藥以利小便倘大便堅結速下之以泄其毒西人有此證有一最便最妥之法以冷水浴身或以布漬冷水掩腹上五分鐘換一次並屢飲沸過之冷水即能減病蓋以冷水能助紅血輪中之養氣以焚血內熱毒故也方出肘後而我國醫學不能取用惜哉三十七濕熱證壯熱口渴自汗身重胸痞脈洪大而長者此太陰之濕與陽明之熱相合宜白虎加蒼朮湯一百一評挾痰熱者亦能胸痞脈若洪滑須兼豁痰熱渴自汗陽明之熱也胸痞身重太陰之濕兼見矣脈洪大而長知濕熱滯於陽明之經故用蒼朮白虎湯以清熱散濕然乃熱多濕少之候雄按徐氏云暑不挾濕蒼朮禁用白虎湯七仲景用以清陽明無形燥熱也胃汁枯涸者加入人參以生津名曰白虎加人參湯八雄按余於血虛加生地精虛加枸杞有痰者加半夏用之無不神效身中素有痹氣者加桂枝以通絡名曰桂枝白虎湯八十九而其實意在清胃熱也是以後人治暑熱傷氣身熱而渴者亦用白虎加人參湯熱渴汗泄肢節疼痛者亦用白虎加桂枝湯胸痞身重兼見則於白虎湯中加入蒼朮以理太陰之濕寒熱往來兼集則於白虎湯中加入柴胡以散半表半裡之邪雄按余治暑邪熾盛熱渴汗泄而痞滿氣滯者以白虎加厚朴極效凡此皆熱盛陽明他症兼見故用白虎清熱而後各隨症以加減楊云此論極圓活可悟古方加減之法苟非熱渴汗泄脈洪大者白虎便不可投辨證察脈最宜洋審也雄按熱渴汗泄而脈虛者宜甘藥以養肺胃之津汪按若大汗脈虛身涼不熱口潤不渴則為之陽脫證非參附回陽不能挽救洄溪醫論謂陽未亡則以涼藥止汗陽已亡則以熱藥止汗此中轉變介在幾微辨之精且詳矣學者宜究心焉璜按白虎湯用處盡多隨症加減皆能取效此注辨別精詳俱有精義痞滿加厚朴血虛加生地精虛加枸杞有痰加半夏尤為細針密縷推之下利發熱舌黃可合白頭翁湯伏氣營陰虧損舌絳熱渴可合犀角地黃湯大汗脈虛不熱不渴可合生脈飲倘大汗小便短而熱舌苔黃絳可加生地元參雖厥冷亦不禁用西洋醫謂石膏無功用不宜入藥未免太過三十八濕熱證濕熱傷氣四肢困倦精神減少身熱氣高心煩溺黃口渴自汗脈虛者東垣用清暑益氣湯一百三主治同一熱渴自汗而脈虛神倦便是中氣受傷而非陽明鬱熱清暑益氣湯乃東垣所制方中藥味頗多學者當於臨證時斟酌去取可也王士雄曰此脈此證自宜清暑益氣以為治但東垣之方雖有清暑之名而無清暑之實觀江南仲治孫子華之案程杏軒治汪木工之案可知故臨證時須斟酌去取可也汪案清暑益氣湯洄溪譏其用藥雜亂因當此云無清暑之實尤確余每治此等證輒用西洋參石斛麥冬黃連竹葉荷梗知母甘草粳米西瓜翠衣等以清暑熱而益元氣無不應手取效也汪按此方較東垣之方為妥然黃連尚宜酌用璜按東垣清暑益氣湯藥味太雜殊不成方且多滯那枯液之品精於醫者自能識之余臨證三十年未嘗一用王氏方較為佳妙三十九暑月熱傷元氣氣短倦怠口渴多汗肺虛而咳者宜人參麥冬五味子等味汪按徐洄溪謂麥冬五味咳證大忌惟不咳者可用是也評熱邪未清此方尚須慎用此即千金生脈散也與第十八條同一肺病而氣粗與氣短有分則肺實與肺虛各異實則瀉而虛則補一定之理也然方名生脈則熱傷氣之脈虛欲絕可知矣汪按脈虛為的驗若弦數者豈可輕試乎王士雄曰徐洄溪云此傷暑之後存其津液之方也觀方下治證無一字治暑邪者庸醫以之治暑病誤之甚矣其命名之意即於復脈湯內取用參麥二味因止汗故加五味子近人不論何病每用此方收住邪氣殺人無算用此方者須詳審邪之有無不可徇俗而視為治暑之劑也四十暑月乘涼飲冷陽氣為陰寒所遏皮膚蒸熱凜凜畏寒頭痛頭重自汗煩渴或腹痛吐瀉者宜香薷厚朴扁豆等味汪按香薷惟暑月受涼無汗者宜之有汗者宜慎用評非暑病何以用香薷此由避暑而感受寒濕之邪雖病於暑月而實非暑病昔人不曰暑月傷寒濕而曰陰暑以至後人淆惑貽誤匪輕今特正之其用香薷之辛溫以散陰邪而發越陽氣厚朴之苦溫除濕邪而通行滯氣扁豆甘淡行水和中倘無惡寒頭痛之表證即無取香薷之辛香走竄矣無腹痛吐利之裡證亦無取厚朴扁豆之疏滯和中矣故熱渴甚者加黃連以清暑名四味香薷飲減去扁豆名黃連香薷飲濕盛於裡腹膨泄瀉者去黃連加茯苓甘草名五物香薷飲若中虛氣怯汗出多者加入參耆白朮橘皮木瓜名十味香薷飲然香薷之用總為寒濕外襲而設楊云古人亦云夏月之用香薷猶冬月之用麻黃不可用以治不挾寒濕之暑熱也略參拙意汪按十味香薷飲用藥亦太雜評香薷飲治傷於暑濕而表實者之正方四十一濕熱內滯太陰郁久而為滯下其症胸痞腹痛下墜窘迫膿血稠黏裡急後重脈耎數者宜厚朴黃芩神麯廣皮木香檳榔柴胡煨葛根銀花炭荊芥炭等味汪按柴葛終嫌不妥凡病身熱脈數是其常也惟痢疾身熱脈數其證必重評亦治痢之套方評痢疾多由暑邪鬱伏於肝肺故糞下赤白者極多挾飲食傷者通用肝肺佐以消食之品五色痢著熱尤酷故古人取用鳳尾草汁米薑蔥白之屬不為無見本書未見及此茲特揭出古之所謂滯下即今所謂痢疾也由濕熱之邪內伏太陰阻遏氣機以致太陰失健運少陽失疏達熱鬱濕蒸傳道失其常度蒸為敗濁膿血下至肛門故後重氣壅不化仍數至圊而不能便傷氣則下白傷血則下赤氣血並傷赤白兼下濕熱盛極痢成五色汪按昔人有謂紅痢屬熱白痢屬寒者謬說也痢疾大抵皆有暑熱其由於寒者千不得一唯紅屬血白屬氣則為定論故用厚朴除濕而行滯氣檳榔下逆而破結氣黃芩清庚金之熱木香神麯疏中氣之滯葛根升下陷之胃氣柴胡升中土之木氣汪按蠻升無益而有害熱侵血分而便血以銀花荊芥入營清熱汪按地榆炭丹皮炭亦可用若熱盛於裡當用黃連以清熱大實而痛宜增大黃而逐邪昔張潔古制芍藥湯以治血痢方用歸芍芩連大黃木香檳榔桂心甘草等味而以芍藥名湯者蓋謂下血必調藏血之臟故用之為君不特欲其土中瀉木抑亦賴以斂肝和陰也然芍藥味酸性斂終非濕熱內蘊者所宜服汪按芍藥甘草乃治痢疾腹痛之聖劑與濕熱毫無所礙不必疑慮倘遇痢久中虛而宜用芍藥甘草之化土者恐難任芩連大黃之苦寒木香檳榔之破氣若其下痢初作濕熱正盛者白芍酸斂滯邪斷不可投汪按初起用之亦無礙並不滯邪已屬試矣此雖昔人已試之成方不敢引為後學之楷式也王士雄曰嘔惡者忌木香汪按後重非木香不能除則用木香佐以止嘔之品可也無表證者忌柴葛汪按即有表證亦宜慎用蓋胃以下行為順滯下者垢濁欲下而氣滯也雜以升藥濁氣反上衝而為嘔惡矣汪按升清降濁則可今反升濁豈不大謬至潔古芍藥湯之桂心極宜審用苟熱邪內盛者雖有芩連大黃之監製亦恐其有跋扈之患也若芍藥之酸不過苦中兼有酸味考本經原主除血痹破堅積寒熱疝瘕為斂肝氣破血中氣結之藥仲聖於腹中滿痛之證多用之故太陰病脈弱其人續自便利設當行大黃芍藥者宜減之以胃氣弱易動故也蓋大黃開陽結芍藥開陰結自便利者宜減則欲下而窒滯不行之痢正宜用矣楊云是極芍藥湯治濕熱下利屢有奇效其功全在芍藥但桂心亦須除去為妥汪按白芍開結佐以甘草和中必不有礙胃氣乃治痢必用之品不但治血痢也況白芍之酸嗽證尚且不忌則治痢用之有何顧忌乎四十二痢久傷陽脈虛滑脫者真人養臟湯一百六加甘草當歸白芍評此病絕少此等藥餘生平從未一試牌陽虛者當補而兼溫然方中用木香必其腹痛未止故兼疏滯氣用歸芍必其陰分虧殘故兼和營陰汪按果系虛寒滑脫固宜溫澀今既云陰分虧殘豈可妄投溫燥以速其死乎但痢雖脾疾久必傳腎以腎為胃關司下焦而開竅於二陰也汪按所傷者腎陰而非腎陽也蠻助腎陽何益況火為土母欲溫土中之陽必補命門之火若虛寒甚而滑脫者當加附子以補陽不得雜入陰藥矣汪按虛寒滑脫誠宜參附粟殼然忘卻此篇本專論濕熱病矣王士雄曰觀此條似非一瓢手筆而注則斷非本人自注汪按當亦後人所附評語葉香岩云夏月炎熱其氣俱浮於外故為蕃秀之月過食寒冷郁其暑熱不得外達汪按亦有不食寒冷而患痢者食物厚味為內伏之火煅煉成積傷於血分則為紅傷於氣分則為白氣滯不行火氣逼迫於肛門則為後重滯於大腸則為腹痛故仲景用下藥通之河間丹溪用調血和氣而愈此時令不得發越至秋收斂於內而為痢也汪按亦有夏月即痢者評痢疾由大腸熱腫忌滯忌溫忌補忌澀用景岳法則纏綿難愈或熱熾而成噤口戒之此理甚明何得誤認為寒而用溫熱之藥余歷證四十餘年治痢惟以疏理推蕩清火而愈者不計其數觀其服熱藥而死者甚多汪按餘生平治痢必宗葉氏之論惟曾誤服溫澀者每多不救其餘無不愈者同志之士慎勿為景岳之書所誤以殺人也汪按可謂苦口婆心心無如世之宗景岳者必不肯信從也聶久吾云痢疾投補太早錮塞邪熱在內久而正氣已虛邪氣猶盛欲補而澀之則助邪欲清而攻之則愈滑多致不救汪按幸而不死亦必成休息痢終身不瘥徐洄溪云夏秋之間總由濕熱積滯與傷寒三陰之利不同汪按學者切記後人竟用溫補殺人無算觸日傷懷尤拙吾云痢與泄瀉其病不同其治亦異泄瀉多由寒濕寒則宜溫濕則宜燥也痢多成於濕熱熱則宜清濕則宜利也雖泄瀉有熱證畢竟寒多於熱痢病亦有寒證畢竟熱多於寒是以泄瀉經久必傷於陽而腫脹喘滿之變生痢病經久必損於陰而虛煩屢發之疾起痢病兜澀太早濕熱流注多成痛痹泄瀉疏利過當中虛不復多作脾勞此余所親歷非臆說也或問熱則清而寒則溫是矣均是濕也或從利或從燥何歟曰寒濕者寒從濕生故宜苦溫燥其中濕熱者濕從熱化故宜甘淡滑石之類汪按茯苓通亦是利其下蓋燥性多熱利藥多寒便利則熱亦自去中溫則寒與俱消寒濕必本中虛不可更行清利濕熱鬱多成毒不宜益以溫燥也合諸論而觀之可見痢久傷陽之證乃絕無僅有者然其真人養臟湯須慎重而審用矣猶謂其雜用陰藥豈未聞下多亡陰之語乎須知陽脫者亦由陰先亡而陽無依如盞中之油干則火滅也汪按辨得明暢庶免誤人四十三痢久傷陰虛坐努責者宜用熟地炭炒當歸炒白芍炙甘草廣皮之屬里結欲便坐久而乃不得便者謂之虛坐努責凡里結屬火居多火性傳送至速鬱於大腸窘迫欲便而便仍不舒故痢疾門中每用黃芩清火甚者用大黃逐熱若痢久血虛血不足則生熱亦急迫欲便但久坐而不得便耳此熱由血虛而生故治以補血為主評由血虛而不得便者蓯蓉菟絲子亦可加入里結與後重不同里結者急迫欲便後重者肛門重墜里結有虛實之分實為火邪有餘虛為營陰不足後重有虛實之異實為邪實下壅虛由氣虛下陷是以治里結者有清熱養陰之異治後重者有行氣升補之殊虛實之辨不可不明汪按辨析精細允當言言金玉王士雄曰審屬痢久而氣虛下陷者始可參用升補若初痢不挾風邪久痢不因氣陷老升柴不可輕用故喻氏逆流挽舟之說堯封斥為偽法也四十四暑濕內襲腹痛吐利胸痞脈緩者濕濁內阻太陰宜縮脾飲一百此暑熱濁邪傷太陰之氣以致土用不宣太陰告困故以芳香滌穢辛燥化濕為制也王士雄曰雖曰暑濕內襲其實乃暑微濕盛之證故用藥如此汪按此有脈緩可徵故宜用溫藥四十五暑月飲冷過多寒濕內留水穀不分上吐下瀉肢冷脈伏者宜大順散十六暑月過於貪涼寒濕外襲者有香薷飲寒濕內侵者有大順散夫吐瀉肢冷脈伏是脾胃之陽為寒濕所蒙不得升越故宜溫熱之劑調脾胃利氣散寒然廣皮茯苓似不可少此即仲景治陰邪內侵之霍亂而用理中湯之旨乎略參拙意評肢冷脈伏有熱深厥亦深者切須細辨稍一誤投則變生頃刻為醫者不可不參透此關王士雄曰此條明言暑月飲冷過多寒濕內留水穀不分之吐利宜大順散治之是治暑月之寒濕病非治暑也讀者不可草率致誤若肢冷脈伏而有苔黃煩渴溲赤便穢之兼症即為暑熱致病誤投此劑禍不旋踵汪按洄溪論大順散語見第五卷本方下四十六腸痛下痢胸痞煩躁口渴脈數大按之豁然空者宜冷香飲子一百七此不特濕邪傷脾抑且寒邪傷腎煩躁熱渴極似陽邪為病惟數大之脈按之豁然而空知其燥渴極證為虛陽外越而非熱邪內擾故以此方冷服俾下咽之後冷氣既消熱性乃發庶藥氣與病氣無扦格之虞也王士雄曰此證亦當詳審如果虛陽外越則其渴也必不嗜飲其舌色必淡白或紅潤而無干黃黑燥之苔其便溺必溏白而非穢赤苟不細察貽誤必多醫師秘籍僅載前三十五條江白仙本與溫熱贅言於三十五條止採二十條而多後之十一條且編次互異無從訂正偶於友人顧聽泉學博處見鈔本濕熱條辨云曩得於吳人陳秋垞贊府者雖別無發明而四十六條全列殆原稿次序固如是耶今從之俾學者得窺全豹焉又按喻氏云濕溫一證即藏疫癘在內一人受之則為濕溫一方受之則為疫癘楊云以下論治疫之法綱領已俱學者於此究心焉庶免多歧之惑余謂此即仲聖所云清濁互中之邪也石頑亦云時疫之邪皆從濕土鬱蒸而發土為受盛之區平時汙穢之物無所不容適當邪氣蒸騰不異瘴霧之毒或發於山川原陸或發於河井溝渠人觸之者皆從口鼻流入膜原而至陽明之經脈必右盛於左蓋濕土之邪以類相從而犯於胃所以右手脈盛也陽明居太陽之裡少陽之外為三陽經之中道故初感一二日間邪犯膜原但覺背微惡寒頭額暈脹胸膈痞滿手指痠麻此為時疫之報使與傷寒一感便發熱頭痛不同至三日以後邪乘表虛而外發則有昏熱頭汗或咽腫發斑之患邪乘裡虛而內陷或挾飲食則有嘔逆痞滿嘈雜失血自利吐蛔之患若其人平素津枯兼有停滯則有譫語發狂言舌苔黃黑大便不通之患平素陰虧則有頭面赤熱足膝逆冷雄按此二端亦有不屬陰虛而胃中濁氣上熏肺為熱壅無以清肅下行而使然者至夜發熱之患若喘噦冷汗煩擾瘛瘲等症皆因誤治所致也評此篇於疫邪時感伏氣各病闡發透亮字字精實蓋傷寒之邪自表傳裡濕熱之邪自里達表雄按此謂伏氣發為溫熱也若外感風溫暑熱皆上焦先受疫病之邪自陽明中道隨表裡虛實而發不循經絡傳次也以邪既伏中道不能一發便盡雄按夏之濕溫秋之伏暑病機皆如此治法有區別故有得汗熱除二三日復熱如前者有得下里和二三日復見表熱者有表和復見里證者總由邪氣內伏故屢奪屢發不可歸咎於調理失宜復傷風寒飲食也汪按此真閱歷之言評此等證多發於夏秋病情錯雜治法盡多誤用風藥死者接踵外解無如香豉蔥白連翹薄荷之屬內清無如滑石芩連山梔人中黃之屬下奪無如硝黃之屬如見發熱自利則宜葛根芩連雄按葛根宜慎用余易以滑石銀花較妥汪按宜用綠豆胸膈痞滿則宜枳橘香附雄按桔梗太升須少用香附太燥宜酌用余則以厚朴主濕滿石菖蒲主痰痞貝母主鬱結皆妙汪按用制香附無礙嘔吐呃逆則宜藿香芩連雄按熱熾者以竹茹枇杷葉易藿香衄血下血則宜犀角丹皮發斑咽痛則宜犀角牛蒡亞枝云發斑咽爛者宜用錫類散一百十吹之煩渴多汗則宜知母石膏愈後食復勞復則宜枳實梔豉汪按宜加竹茹隨症加葳蕤茯苓丹皮芍藥之類汪按葳蕤宜慎用皆為合劑而香豉人中黃又為時疫之專藥以其總解溫熱時行外內熱毒也顧雁庭云喻氏治疫以解毒為主即又可之專用大黃葉氏之銀花金汁同用皆此意也雄按松峰之青蒿綠豆亦猶是耳評誤用辛溫則熱熾或至變痙當知其證雖有內外之殊一皆火毒為患絕無辛溫發散之例每見窮鄉僻壤無醫藥之處熱極恣飲涼水多有浹然汗出而解者汪按昔人亦有多飲殺人之戒須知又見鄉人有搗鮮車前草汁飲之者甚妙此非宜寒涼不宜辛熱之明驗乎顧雁庭云脈症不必大涼而服大涼之藥似有害而終無害者疫也脈症可進溫補而投溫補之劑始似安而漸不安者疫也雄按疫證皆屬熱毒不過有微甚之分耳間有服溫補而生者必本非疫證偶病於疫癘盛行之際遂亦誤指為疫也或熱邪不重過服寒涼宜亦溫補回春然非疫癘正治之法學者辨之汪按溫補得生者乃暑月乘涼飲冷中於寒濕之病與中於熱毒之病大相徑庭故云本非疫證讀者不以害辭意可也故一切風燥辛熱皆不可犯每見粗工用羌獨柴前蒼芷芎防之類引火上逆亢熱彌甚者以風燥之藥性皆上升橫散如爐治得鼓鑄之力也用樸半檳榔青皮木香等耗氣之藥胸膈愈加痞滿者汪按庸手見此必指為虛揠苗助長之道也雄按又可達原飲必濕盛熱微者可用未可執為定法有下證已具而遲疑不敢攻下屢用芩連不應者此與揚湯止沸不殊也至於發狂譫語舌苔焦黑而大便自利證實脈虛不可攻者雄按清熱救陰間亦可愈及煩熱痞悶冷汗喘乏四肢逆冷六脈虛微不受補者皆難圖治也時疫變證多端未能一一曲盡聊陳大略如此雄按小兒痘證多挾疫癘之氣而發伍氏謂疫毒藏於脾經正與此論合故費氏專講痘疫以救非常痘證之偏厥功偉矣後人不察訾其偏任寒涼蓋未知痘之同於疫也審其為疫必宗其法又可曾亦論及近惟玉清任知之余謂麻疹亦有因疫癘之氣而發者故治法亦與溫熱相埒也習幼科者於溫熱暑疲諸證因其可不細心討究耶汪按治痘專任寒涼窮非正軌痘證本與斑疹不同也此謂費氏之法特以救非常之痘則知尋常之痘未可概施若奉費氏為治痘定法而置溫托諸法而不用是又大誤矣即如溫熱病固大忌溫補而病情萬變至其壞證卻與傷寒壞證無異有必須溫補挽救者亦不可執一也然豈可奉溫補為治溫熱病之定法乎
