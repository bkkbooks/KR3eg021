body:
  text: 卷三脈辨脈浮緊惡寒謂之傷寒脈數寒少熱多謂之溫病脈緩惡風謂之傷風脈盛壯熱謂之熱病脈虛身熱謂之傷暑醫者不可不辨凡溫病脈不浮不沉中按洪長滑數右手反盛於左手總由怫熱鬱滯脈結於中故也若左手脈盛或浮而緊自是感冒風寒非溫病也凡溫病脈怫熱在中多見肌肉之分而不甚浮若熱鬱少陰則脈沉伏欲絶非陰脈也陽邪閉也凡傷寒自外之內從氣分入始病惡寒發熱一二日不作煩渴脈多浮緊不傳三陰脈不見沉溫病由內達外從血分出始病不惡寒而發熱一熱即口燥咽乾而渴脈多洪滑甚則沉伏此發表清裡之所以異也凡浮診中診浮大而力浮長有力傷寒得此脈自當發汗麻黃桂枝證也溫病始發雖有此脈切不可發汗乃白虎瀉心證也生死關頭全於此分凡溫病內外有熱其脈沉伏不洪不數但指下沉澀而小急斷不可誤為虛寒若以辛溫藥治之是益其熱也所以傷寒多從脈溫病多從症蓋傷寒風寒外入循經傳也溫病怫熱內熾鬱於經也凡傷寒始本太陽發熱頭痛而脈反沉者雖曰太陽實見少陰之脈故用四逆湯溫之若溫病始發未嘗不發熱頭痛而見脈沉澀而小急此伏熱之毒滯於少陰不能發出陽分所以身大熱而四肢不熱者此名厥正雜氣怫鬱火邪閉脈而伏也急以鹹寒大苦之味大清大瀉之斷不可誤為傷寒太陽始病反見少陰脈沉而用四逆湯溫之溫之則壞事矣又不可誤為傷寒陽厥慎不可下而用四逆散和之和之則病甚矣蓋熱邪亢閉陽氣不能交接於四肢故脈沉而澀甚至六脈俱絶此脈厥也手足逆冷甚至通身冰涼此體厥也即仲景所謂陽厥厥淺熱淺厥深熱深是也下之斷不可遲非見真守定通變達權者不足語此璜按王士雄說謂沉細之脈亦有因熱邪閉塞使然形症實者下之可生未可概以陰脈見而斷其必死凡熱邪壅遏脈多細實遲澀按證清解自形滑數不比內傷病服涼藥而脈加數為虛也又馬元儀謂三陽證亦有脈微弱不起者以邪熱抑遏不得外達待清其熱則脈自起勿謂陽衰脈微也二公論脈與栗山前說均合乃經驗日久確切不易之理解為醫者當切記之凡溫病脈洪長滑數者輕重則脈沉甚則閉絶此辨溫病與傷寒脈浮脈沉異治之要訣也凡溫病脈洪長滑數兼緩者易治兼弦者難治凡溫病脈沉澀小急四肢厥冷通身如冰者危凡溫病脈兩手閉絶或一手閉絶者危凡溫病脈沉澀而絶狀若屋漏者死凡溫病脈浮大而散狀若釜沸者死診舌法舌者心之竅凡病俱現於舌能辨其色證自顯然假如津液如常口不燥渴雖發熱尚屬表證若舌苔粗白漸厚而膩是邪已入胃挾濁飲而欲化火也此時已不辨滋味矣再由厚膩轉為黃色邪已化火倘熱甚失治則黃苔變黑胃火亢極若厚苔漸退而舌底紅色為火灼水虧此表邪之傳裡者也間有脾胃虛寒者則舌白無苔而潤甚者連唇口面色俱萎白此因受濕胃無火力也胃熱者舌中苔黃而薄心熱者舌尖必赤甚者起芒刺肝熱者舌邊赤或有芒刺其舌中苔厚而黃者胃微熱也舌中苔厚而黑燥者胃大熱也倘唇口俱黑則胃將蒸爛矣再有舌黑而潤澤者屬腎虛也若滿舌紅紫色而無苔此名絳色溫熱發於營分亦多有之更有病後絳舌如鏡發亮而光或舌底溢干而不飲冷此腎水虧極也以上驗舌色之大略如此視其色即知其病之所在矣璜按熱病一二日舌上每有厚白膩苔此病我國名醫主開泄溫痰百試百驗考近世西洋醫學說則以為胃液鹽酸減少消化機及吸收機衰弱以致食欲缺乏味覺變常口內涸燥舌上生苔此等消化力弱實由病原菌之障害消化器使然究之西醫所謂消化器即腸胃也所謂病原菌即我國醫學所言之邪氣也是篇言邪已入胃挾濁飲而化火與西說若合符節特當時未有顯微鏡之檢查故無病原菌可言耳究之診舌大法西疏我密西略我詳吳坤安何廉臣二家診舌法尤為博大深微茲摘録之病之經絡臟腑營衛氣血表裡陰陽寒熱虛實畢形於舌故辨感證以舌為主而以脈症兼參之此要法也茲將舌之部位形色詳列於下部位滿舌屬胃中心亦屬胃舌尖屬心舌根屬腎兩旁屬肝膽四畔屬脾舌尖屬上脘舌中屬中脘舌根屬下脘形色白苔肺經絳苔心經黃苔胃經黑苔脾經紫色腎經焦紫起刺肝經青滑肝經診察白苔肺經候衛分氣之表邪也肺主衛主氣主皮毛風寒先入皮毛內應乎肺又太陽亦主一身之表故散肺分之邪亦即以疏太陽之表觀仲景麻黃湯方意可知舌無苔而潤或微白而薄者風寒也外證必惡寒發熱而口不渴宜溫散之璜按此等舌苔無病人多有之此乃風寒初感故舌苔無甚轉變應照風寒外感用溫散之法以惡寒口不渴非溫熱病也舌苔白而燥刺者溫邪也外感初必微寒繼即發熱不已此邪在手太陰肺經宜涼散之忌足經辛溫藥舌白而黏膩者溫邪在氣分也外證必發熱頭重身痛而口不渴宜解肌去濕如杏仁滑石紫蘇二陳二苓之類璜按此濕邪在氣分之正治也原本桂技秦艽未合今易之肺分雖兼太陽惟寒邪可用足經辛溫藥若風溫入肺症見發熱口渴咳嗽喉痛舌苔白燥或白兼邊紅治宜輕清涼解肺經如焦梔豆豉桑葉杏仁瓜蔞皮象貝前胡薄荷蘇子黃芩桔梗之類絳苔心經候營分血分之溫熱也心主營主血舌苔絳燥邪已入營中宜清絡中之熱血分之火忌用氣分之藥凡溫邪從口鼻入上焦心肺先受如舌苔先白後紅者邪先入氣分後入營分也如初起舌即絳色者邪不入氣分而入營分也宜清解營分之熱如犀角生地丹皮元參竹葉連翹之類璜按治溫熱病入手即宜分別氣分營分果系在營便宜清營不得以病正在初起而不敢用血藥也暑邪溫疫診斷及治熱均同凡白苔邪在氣分宜解表忌清裡絳舌邪在營分宜清熱忌發汗璜按此治溫病暑疫在氣在營一定不易之要訣也黃苔胃經辨陽明裡證之熱邪也邪入手經以舌之絳白分心營肺衛矣邪入足經又當以舌之黃白分表裡施治也蓋白苔主表黃苔主裡太陽主表陽明主裡故黃苔專主陽明裡證辨證之法但見舌苔帶一分白病亦帶一分表必純黃無白邪方離表而入里璜按邪在陽明之表未入陽明之裡者古人每以梔子豉湯主治如見白苔白中帶黃或微黃而薄是邪病入陽明猶帶表證微兼惡寒宜涼散之如黃而兼燥外證不惡寒反惡熱是傷寒外邪初入陽明之裡或溫熱內邪欲出陽明之表斯時胃家熱而未實宜梔豉白虎之類清之可也如厚黃燥刺或邊黃中心焦黑起刺臍腹脹滿硬痛乃陽明裡證也承氣湯下之璜按此傷寒傳胃化熱之治法溫熱暑疫邪入陽明治法均同難經謂熱病皆傷寒之類諒哉斯言鮮紅膽經候少陽內發之溫邪也少陽以木火為用溫邪內發必借少陽為出路乃同氣之應也如淡紅嫩紅白中帶紅是溫邪之輕者初起微寒繼即發熱不已口渴甚者是也璜按此條未必是少陽證蓋溫病因時感而發者多有此候大概鮮紅比絳色為輕仍屬血熱不必瑣分之為膽熱也膽為遊行之府膽汁敷布於胃即能助胃化食若黃疸腹脹飲食不淌即膽之病也傷寒論以口苦為少陽病殊有的見蓋以膽汁入胃而口苦也今乃僅以鮮紅屬之膽經毫無膽之病狀而觀下節所用藥仍以犀角翹丹生地元參清血安見其為少陽之溫邪耶古人著書大率有牽扯附會之處此亦其一也如純紅鮮紅起刺此膽火熾而營分熱宜犀角翹丹等法解之如不解此溫邪伏於少陰而發於少陽之表也症非輕渺速宜重加生地麥冬元參之類以滋少陰之水而少陽之火自解矣大忌風藥又風溫暑疫等證見舌苔鮮紅者當從少陰治璜按少陰主血此條仍主清手少陰之血可見鮮紅仍熱在營分也黑苔脾經辨太陰濕土之寒熱也太陰濕土所主而水就濕故脾家見症每每舌見黑色如舌苔灰黑而滑者此寒水侮土太陰中寒證也外證腹痛吐利手足指冷六脈沉細宜理中湯主之甚加附子如雜證而現黑滑苔者必是濕飲傷脾宜溫中和脾逐飲治之如白苔而兼帶灰黑色更兼黏膩浮滑者此太陰在經之濕邪是從雨霧中得之宜解肌滲濕如五苓加羌防之類如白帶黑點或兼黑紋而黏膩者亦屬太陰氣分之濕宜行濕和脾如黃中帶黑而浮滑黏膩者是足太陰濕熱內結宜利濕清熱如黑而燥刺是陽經注入太陰之熱邪宜清火解毒兼陽明治如屢清不解腹無痞滿硬痛之症者不可妄投承氣是胃中津液乾涸少陰腎火不支宜大小甘露飲主之如舌苔黑刺大便祕結臍腹礙滿耕痛此燥矢為患也承氣湯下之仍從陽明治若黑而堅斂焦刺如荔子形者乃陽亢陰竭胃汁腎液俱涸也不治諸書但以黑苔為腎氣凌心水來剋火百無一治語尚未確邵仙根云此係腎陰胃液俱竭陽熱亢極陰涸而死故回不治不得已用大劑滋陰清熱之法藥勿間斷希救萬一又有以舌之五色分五臟乃五行之死法不足以測感證之變璜按脾為行血之臟西法至今功用未明而熱證瘧疾動輒脾腫往往釀成血薄症面黃腹脹氣微喘四肢無力身體倦怠診其舌每淡紅或白而無苔生平見此證多矣是篇以黑苔屬脾取太陰濕土水就濕之義從氣化探原立論亦合然臟腑挾痰飲之濕每見黏膩苔或黃或白以宣通氣分為治又不專在太陽一經也濕結太陰宜用苦辛開法與陽明迥別陽明實滿舌苔老黃燥裂太陰濕滿舌苔白而黏膩陽明實滿滿及臍下少腹太陰實滿滿在心下胃口又安舌苔之必變黑也即以黑苔論胃燥陰枯者有之寒結在臟舌苔黑滑者又有之亦不盡關於太陰此節言黑苔屬脾僅根據濕土而言乃正論非定論也若以西法互勘則於義難通矣紫色腎經察少陰本臟之虛邪也六經惟腎無實證故仲景於少陰證中揭出脈微細但欲寐為主病示正氣之虛也璜按脈微細但欲寐病足經而及手少陰心也脈者血脈與心之跳動相應心陽盛則脈大心陽虛則脈細西說謂脈之大小關於脈管之廣狹不思脈有乍大而乍小者豈其動脈管忽廣忽狹有是理耶況遺精白濁之久者其脈每弦大而芤豈遺精白濁之人能使脈管變大耶璜臨證三十年知脈法惟我國最精最粹西醫不及也病至少陰氣衰血弱心房之運血力亦減少故脈微細但欲寐耳證有虛即有實此言其虛者耳若云無實證彼少陰之三急下證獨非實證耶以此知傷寒論之不可不讀也如舌形紫燥唇焦齒黑二便俱祕此為陰中兼陽可兼陽明以治犀角地黃甘露飲之類凡舌形圓大胖嫩皆屬足少陰虛證不拘傷寒雜證如見舌色紫如豬肝枯晦絶無津液者此腎液已涸不治痢疾見此苔胃陰之竭必死傷寒更衣後舌苔頓去而見紫色如豬肝者此元氣下泄胃陰已絶不治如舌苔去而見漬紅有神者佳焦紫肝經辨厥陰陽毒之危候也凡舌苔焦紫起刺如楊梅狀者此陽邪熱毒已及肝臟險症也大便祕者急以更衣丸下之金汁人中黃之類大清大解之璜按此證余曾以大劑清解養津得效但症至此其人每多煩渴不寐原文未言及病情殊不解凡舌苔兩旁有紅紫點者肝臟伏毒也大凶之症急用犀角尖人中黃透之解之青滑肝經辨厥陰陰毒之危症也凡舌苔青滑乃陰寒之象急宜四逆吳茱輩溫之外證若見面青唇紫囊縮厥逆筋急直視等症者厥陰敗症也不治璜按舌苔青滑亦有因於痰者余嘗見一人舌有兩條青色由舌根直達舌尖背常惡寒時患痰嗽服溫藥則發喘清早泄瀉服暖腎藥則益甚後借用吳門治驗録合歡枝金萱花等類和入除痰養胃之品而青色悉化不得謂青滑概屬寒證也附識於此以就正有道云爾凡舌苔紫焦如刺厥陰熱毒難治青滑厥陰寒吳茱溫之則愈璜按周雪樵曰舌膜與消化器各臟俱連故能顯消化部之病又與津液器循壞器有密切之關係驗苔之法以潤燥為兩大綱血熱而多則色紅血寒而小則色淡若胃有燥糞膽汁無事則逆流無上其色即黃其所以色黑者表明血中有毒也而舌與心肺肝胃大小腸等相關故苔色為治病第一要據西醫柯為良曰凡舌上面有刺刺中有腦蕊能主嘗味亦有苔用以察病最為有益西醫合信氏曰驗舌苔形色乾溼可辨表裡看舌十法一曰老嫩凡物之理實則其形堅斂其色蒼老虛則其體浮胖其色嬌嫩而病之現於舌也其形與色亦然故凡病屬實者其舌必堅斂而兼蒼老病屬虛者其舌必浮胖而兼嬌嫩二曰干潤乾者津乏而燥潤者津足而滑凡病初起而舌即乾者中竭可知病久而舌尚潤者液存可識望之若干捫之卻潤者若濕熱蒸濁其色鮮絳若瘀血內蓄其色紫暗望之若潤捫之卻燥者若氣濁痰凝其苔白厚若氣虛傷津其苔白薄又凡陰虛陽盛者其舌必乾陽虛陰盛者其舌必滑陰虛陽盛而火旺者其舌必乾而燥陽虛陰盛而火衰者其舌必滑而濕三曰榮枯榮有光彩凡病皆吉枯無精神凡病皆凶四曰脹癟脹者腫也或水浸或痰溢或濕熱上壅癟者瘦也或心虛或血枯或內熱消肉五曰軟硬軟者柔也氣液自滋硬者強也脈絡失養六曰歪碎歪者斜偏一邊也痙痱與偏枯常有碎者血痕傷跡也舌衄與抓傷當辨七曰舒縮舒者伸也伸之無力者虛氣也欲伸如有線吊者或經或脈非燥即寒也麻木而伸不出者內風挾痰也伸以餂唇者心熱脾燥也伸出不收者脾涎浸也伸出弄舌者中蛇毒也縮者卷也邊卷者胃液燥極也湯飲潤之而仍坦者病去而舌未和也尚可治卷而縮短者厥陰氣絶也不治垢膩揩去而仍縮者亦不治璜按何廉臣所訂之看舌法若老嫩若干潤若榮枯若脹癟語語切實具有體會歪碎二字殊不典切且此病亦少見若云痙痱偏枯則必口眼皆歪而舌仍隨之此乃腦筋病也與溫熱病無涉且見此舌乃由腦部牽纍而及非辨證之要點其中有透舌之腦筋失力致舌轉掉不靈者何以並不言及耶至伸縮不收乃病重擾害神經忘卻收回熱證多有之云脾涎浸於理難通試質諸醫學家然乎否耶八曰戰痿戰者顫掉不安蠕蠕微動也皆舌腦筋戰動使然舌多紅色加深紅赤紅而戰者宜清降三黃石膏湯等紫紅瘀紅而戰者宜寒瀉白虎承氣湯等淡紅而戰者宜峻補十全大補湯等鮮紅灼紅而戰者宜滋補六味地黃湯等此舌虛火實火皆有之均里證無表證誤治即壞舊說指為汗多之陽或漏風所致且不詳辨而概用溫補謬也痿者軟而不能動也為舌腦筋麻痹所致淡紅而痿者宜補氣血人參養營湯等深紅而痿者宜涼氣血犀角地黃湯等赤紅而痿者宜瀉心導赤導赤各半湯等紫紅而痿者宜清肝瀉腑犀連承氣湯等鮮紅灼紅而痿者宜滋陰降火知柏地黃湯等惟絳紅而痿者陰虧已極無藥可治舊說只云紅痿而不分類疏甚九曰凸凹凸者起瘰也為梟毒內伏凹者缺陷也為藏形痿頓璜按此節所論之戰痿根據西說言由腦筋使然於法亦精而以我國學說勘之肝風將起舌多戰痿危症也大率津枯者每見此舌至舌凸多由熱毒恆多熱熾大渴凹者餘生平從未見之不敢強解十曰濃淡舌色本紅淡於紅者血虛也淡紅無苔反微似黃白苔者氣不化液也甚則淡紅帶青者血分虛寒也婦人子宮冷者常有之久痢虛極者亦有之濃於紅者為絳血熱也尖絳者心火上炎也根絳者血熱內燥也通絳無苔及似有苔黏膩者血熱又挾穢濁也絳而深紫紫而干晦者肝腎竭紫而潤暗者中脘瘀舌本無苔而隱隱若摻煙煤者多兼煩渴平素胃燥舌也若不渴肢冷即屬陰證舌光黑無苔而潤者虛寒積水也辨苔十法一曰有無病而有苔者多里滯無苔者多中虛病本無苔而忽有者胃濁上泛病本有苔而忽脫者胃陰將涸璜按必兼舌燥方為陰涸二曰厚薄苔薄者表邪初見苔厚者里滯已深璜按苔薄乃胃氣非病也厚由里滯則通矣三曰松膩松者無質揩之即去為正足化邪膩者有地揩之不去多穢濁盤踞璜按此解殊精四曰偏全全者苔滿布也多濕痰食滯偏者苔或偏外偏內也凡外有內無邪雖入里未深而胃氣先匱內有外無里邪雖減而胃滯依然璜按舌心無苔真陰素虧好色之徒多有之兼紫絳者尤傷精之象五曰糙黏糙者穢濁黏者痰涎六曰紋點苔有斷紋者土燥水竭苔點粞者內蟲䘌蝕七曰瓣暈凡黑苔起瓣皆臟腑實熱已竭或因六氣之燥火灼爍或因百藥之燥火逼迫燥火與毒火交戰於中熏蒸於上而成此舌苔者猶之當暑炎熱土木生菌惟大雨時行即自銷滅可知舌有黑瓣非大寒涼藥斷難起死回生此證多大熱大渴口開吹氣或絞腸痛絶或頭腦脹痛求死或口噤不言或渾身發臭難聞或猝然仆地不省人事雙目直視不等不論見何怪脈舍脈憑舌看黑瓣尚未敷滿仍可救治急用十全苦寒救補湯生石膏八兩研粉生知母六錢黃柏四錢黃芩六錢黃連生大黃芒硝各三錢生陳厚朴一錢生枳實錢半暹犀角尖四錢四倍石膏或分為三黃白虎湯及大承氣湯用兩罐煮之不拘時刻不次急投凡言不次者皆不限定劑數須輪流急灌服至黑瓣漸退舌底漸紅則病愈知此法者雖危不死倘不明利害忌服苦寒或不敢多服必死無疑別無救法也如舊說云見此舌不可用藥雖無惡候脈亦暴絶不治此拘於切脈無知妄斷醫家卸肩之積習耳璜按此節辨證用藥極有膽識有功醫門不少梁特岩先生曰余於辛卯七月道出清江浦見船戶數人同染瘟病渾身發臭不省人事醫者俱云不治置之岸上徐俟其死余目擊心憫姑往診視皆口開吹氣舌則黑苔黑瓣底其親人向余求救不忍袖手即教以用十全苦寒救補湯生石膏加重四倍循環急灌一日夜連投多劑病人陸續瀉出極臭之紅黑糞次日舌中黑瓣漸退復連服數劑三日皆痊愈是時清江疫癘大作未得治法輒數日而死有聞船戶之事者群來求治切其脈皆怪絶難憑望其舌竟皆黑瓣底均以前法告之其信者一二日即愈其稍知醫書者不肯多服苦寒仍歸無救余因稍有感冒留住十日以一方活四十九人頗得仙方之譽若舌苔灰色重暈者此溫病熱毒傳遍三陰也熱毒傳內一次舌增灰暈一層最危之證急用涼膈散或雙解散黃連解毒湯大承氣湯下之一暈尚輕二暈為重三暈必死亦有橫紋二三層者與此不殊舊說如此尚合理惟熱毒傳裡已深涼膈雙解二方嫌有表藥尚不恰合解毒湯太輕大承氣僅能利下而未能透涼臟府不如用十全苦寒救補湯加四倍生石膏不次急投服至灰暈退淨為止雖見二三重暈均能救活八曰真假凡舌有地質而堅斂蒼老不拘苔色白黃灰黑揩之不去刮之不淨底仍粗澀黏膩不見鮮紅者是為真苔中必多滯凡舌無地質而浮胖嬌嫩不拘苔色白黃灰黑揩之即去刮之即淨底亦淡紅潤澤不見垢膩者是為假苔里必大虛即看似苔色滿布飲食後苔即脫去舌質圓浮胖嫩者亦屬假苔他如食枇杷則苔色黃食橄欖則苔青黑此為假色之染苔有地質與無地質此虛實之一大關鍵也璜按苔浮舌上揩之即去邪淺正復者多有之必謂假苔屬虛豈食枇杷橄欖染色亦屬虛證邪殊有語病九曰常變凡舌苔始終一色不拘白黃灰黑即有厚薄滑澀干潤濃淡之各殊總屬常苔凡舌一日數變或由黃而黑或乍有乍無乍赤乍黑者皆為變苔故察舌之確切雖不同脈理之微茫而其苔之易於變幻較脈象為尤速此又為驗舌者所不可不知者也璜按此臨證有得之言十曰苔色白而薄者寒邪在表或氣鬱不舒白而厚者中脘素寒或濕痰不化黃苔薄而滑者表猶未罷熱未傷津黃苔有質地而濁者邪已結里若濁愈甚則入里愈深熱邪愈結黑苔焦枯為火熾水竭久病舌起煙煤者屬胃虛液涸又如苔色淡白者多寒有水及發紋滿布者多濕其色黃厚者多滯帶灰及干砂刺點者多熱色見黃白間或焦黑者氣分化燥舌色絳紅間或光亮者血分受熱平日多黃苔其人必胃熱多紅色其人必營虛至於如水黑青色為虛寒如咸膩厚者為瘟疫此皆一定不易之看法璜按此節語語精實真不厭百回讀我國醫學最精最妙之法也察色八法一曰白色白色為寒表病有之里證有之而虛者熱者實者亦有之其類不一故白色舌苔辨病較難凡白淨滑薄其苔刮去即還者太陽經表受寒邪也白浮滑而帶膩漲刮之有淨有不淨者邪在少陽經半表半裡也全舌白苔浮漲浮膩漸積而干微厚而刮不脫者謂刮去浮面而其底仍有寒邪欲化火也辨傷寒舌大約如此至若雜病之人舌白嫩滑刮之明淨者裡虛寒也無苔有津濕而光滑其白色與舌為一刮之不起垢泥是虛寒也白厚粉濕滑膩苔刮稍淨而又積如麵粉發水形者裡寒濕滯也舌白粗澀兼有朱點有罅紋之苔及白乾膠焦燥滿苔刮不脫或脫而不淨者皆裡熱結實也此舌頗多其苔在舌比之面上傅粉刮之多垢其白色與舌為二物是熱也與前論之虛寒舌相反當認明此苔由淺而深將黃未黃或竟變黑者宜用枳實導滯湯急下之不可用溫補藥馬良伯云有舌厚膩如積粉者為粉色舌苔舊說並以為白苔其實粉與白一寒一熱殆水火然溫病溫疫時行並外感穢惡不正之氣內蓄伏寒化熱之勢邪熱瀰漫三焦充滿每見此舌與熱在陽經者異與腑熱燥實者亦異治宜清涼泄熱粉苔乾燥者則急宜大黃黃連瀉心湯等甚或硝黃下之切忌拘執舊說視為白苔則大誤事矣此與吳又可說大同小異惟王晉三謂戊午歲自春徂秋民病無論三因舌苔白者居多有白滑白屑白粉之異用薑附則白苔厚而液燥用芩連則手足冷而陽脫因制薑桂湯薑汁為君辛潤泄衛肉桂通營佐以參草南棗甘補應乎而愈故治病當匯參辨苔亦然不可偏主一說也凡風寒濕初中皮腠則為白苔寒濕本陰邪白為涼象故苔色白白苔及白滑者風寒無濕也滑而膩者濕與痰膩而厚者濕痰與寒惟薄白如無則虛寒但滑膩不白者濕與痰也兩條滑膩者非內停濕食即痰飲停胃白如積粉則濕熱或痰熱也溫病熱病瘟疫時有此苔與白苔作寒論者大異總之滿舌一色為一經證旁白與中間白俱傳經證如從根至尖直分兩條者則合病與夾陰寒證合病則白中兼兩條黃陰寒則白中兼兩條黑潤或兼灰色從根至尖橫分兩三截苔色不一者是並疲證也故尖白根黃或根黑或半邊苔灰苔滑皆半表半裡證但看白苔之多少白色多者表邪尚多宜清解或表裡並用若黃黑灰多或生芒刺及黑點乾裂則裡熱已結急宜用下以清裡若有苔白而滑厚者寒飲積聚膈上也每於十三四日過經時忽然生變最宜先時謹防臟結證亦有此苔觀傷寒論自知二曰黃色黃色舌苔表裡實熱證有之表裡虛寒證則無刮之明淨即為無病刮之不淨均是熱證璜按黃色為胃有熱滯膽汁上逆之候雖刮之明淨不可謂無病也淺黃膩薄者微熱也乾澀深黃膩厚大熱也芒刺焦裂老黃或夾灰黑色者極熱也黃苔見於全舌為臟腑俱熱見於某部即某經之熱表裡證均如此辨乃不易之理也表證風火暑燥皆有黃苔惟傷寒邪在太陽少陽時均無黃苔待邪傳陽明腑其舌必黃初淺久深甚則老黃或夾變灰黑皆邪火里逼實熱里結諸危症其脈往往伏代散亂奇怪難憑則當舍脈憑舌專經急治斯為盡善若泥於火乘土位故有黃苔之說迂執誤人矣黃苔多主裡實薄黃為熱黃膩為痰熱濕熱黃膩而垢為濕痰祕結腑氣不利食滯亦時有此苔滑厚而膩者為熱未盛結未定在冬時尚未可遽用攻夏月才見黃苔即當用下以夏令伏陰在內裡熱即熾而苔不遽燥雖滑原亦未可信如黃而燥或生芒刺生黑點中心瓣裂則無分何時皆當速下以存陰液若焦黃則熱甚宜清宜下璜按仲景云舌黃未去者下之黃自去足見黃苔宜下者多又有根黃而尖白不甚干短縮不能伸出者痰挾宿食也亦宜用下璜按宜兼化痰藥千金子萊蔔子均佳痰飲水血諸證舌多不露燥象不可因其未燥而疑慮誤事陰寒夾食亦多黃而不燥然黃則實象總宜急下但法有寒溫之別耳如有苔黃厚而舌中青紫甚則碎裂口燥而舌不幹者此陰寒夾食也亦宜斟酌溫下之三曰黑色凡舌苔見黑色病必不輕寒熱虛實各證皆有之均屬裡證無表證凡舌色全黑本為陰絶當即死而有遲延未死者非極熱即極寒尚留一線生機苟能辨准補偏救弊欲可不死在傷寒病寒邪傳裡化火則舌苔變黑自舌中黑起延及根尖者多自根尖起黑者少熱甚則芒刺乾焦罅裂其初有白苔變黃由黃變黑甚至刮之不脫濕之不潤者熱傷陰也病重脈亂舍脈憑舌宜用苦寒以瀉陽急下以救陰璜按黑苔此證為多乃熱傷真陰宜急下以救之在雜病見黑苔皆因實熱傷里也亦惟速瀉熾火毋使枯竭若虛寒而舌黑者則必濕滑無苔多津口不苦唇不燥無朱點無芒刺無罅裂刮之明淨如水浸豬腰有淡淡瀜瀜之形是臟腑極寒之舌也宜用十全辛溫救補湯亦有真寒假熱證而見黑舌者其舌必全黑而不分經且必由淡白之時忽然轉黑其初無變黃之一境約略望之似有焦黑芒刺干裂之狀然刮之必淨濕之必潤環唇皆舌而不紅焦寒結在臟也其證亦周身大熱煩燥惡衣被與實熱邪火證相似實則中宮寒極陽氣盡發於外也口大渴喜冷飲水卻不多與實熱異外假熱而里極寒也患此假證之人必煩亂昏沉六脈必遲弱無力大便結常欲下而不下宜甘溫救補湯璜按辨假熱黑舌甚細然亦有唇紅者須從脈症合參如中黑無苔而舌底乾燥有小點紋可見者乃胃經實熱並無六氣侵擾也宜破格白虎三黃治之如中黑無苔而舌底濕嫩光滑無點紋者乃胃經虛寒亦非六氣所擾也宜附子理中湯加肉桂黃耆者治之舊說不辨寒熱專用生脈散合附子理中誤人不少如全黑無苔而底紋粗澀乾焦刮之不淨者極熱也不論何證何脈皆宜十全苦寒救補湯數倍生石膏急投必愈如全黑無苔而底紋嫩滑濕潤如浸水腰子淡淡瀜瀜洗之不改色者極寒也不論何證何脈宜十全辛溫救補湯重加薑桂急投可愈舊說謂水剋火百無一生則迂矣璜按一寒一熱辨別不清死生反掌醫者遇黑苔最宜細認此篇宜熟讀之到臨證時乃有分曉如全黑無苔而無點無罅乾燥少津光亮如錢者即絳舌之變陰虛腎水涸也妊娠者亦有之宜十全甘寒救補湯加減酌用如有點有罅乾燥無津澀指如銼者極實熱證也宜十全苦寒救補湯數倍生石膏不次急投服至黑色轉紅則全如黑色暗淡無苔無點無罅非濕非干似亮不亮者陽虛而氣血兩虧也久病見之不吉宜十全甘溫救補湯如有煙癮之人常多黑舌看法當比平常病人之黑舌減一二等算又有誤食物而染黑者宜明辨之總之凡見黑舌皆重症危症也寒熱虛實務當詳辨稍有不明便易取禍璜按亦有伏飲常見灰黑者卻無危候不可不知邪熱傳裡火極反兼水化則為黑色舌熱結燥實津液焦灼少陰真水垂涸此最凶象宜急攻下其熱滯以存一線之陰或兼芒刺燥裂結瓣者須用新青布蘸薄荷湯濕潤揩去刺瓣看舌上色紅者可治急下之若刺瓣下仍黑色者則腎陰已竭藏色全露法在不治有苔黑腐爛者為心腎俱絶舌黑而捲縮者為肝絶皆不治有黑薄而潤或滑者為陰寒可治有始病即舌心黑色非由白黃變化舌轉瘦小者為真藏中寒此寒水凌心腎色外見急宜用溫稍緩則誤事璜按黑非由黃變化與淡白忽轉黑之說同一意義此辨寒熱之確據也有中黑而枯並無積苔邊亦不絳或略有微刺者為津枯血燥證急宜養陰生津誤用攻下或溫經皆必死有中間一條或拇指大黑潤浮苔兩邊或黃或白者兩感病也凡苔無黑黃白雜見或中燥邊滑或尖干根潤皆並病合病寒熱不和之候此以黃白黑及燥潤同時並見別為兩感並病也夏月中暑多有黑舌為濕痰鬱熱亦有黑滑膩厚舌又不可與傳經證同論此因暑寒原因之不同也灰黑色舌者足三陰雜病而太少兩陰為多始自白苔黃而灰黑者為傳經證或生刺點燥裂不拘在根在尖並宜急行攻下此以刺點燥裂傷陰斷為急下證有淡灰色中起深黑重暈者為濕病熱毒及瘟疫證急用涼膈雙解等清中逐邪中氣不宣乃變重暈大清大解所以逐其邪而宣其氣也如舌灰而潤並無苔更不變別色始病即見非由白黃漸變者為夾食中寒及停飲蓄血證當用消用溫用攻因證而治非白黃轉黑多寒證而此則別有原因醫所以貴通變也又有屢經汗下而灰黑不退或滋潤或不潤亦不燥者脈必虛數無力此因汗下太過傷陰使然宜急救陰津固不得用硝黃亦不可用姜附總而言之凡黑色舌苔尖黑稍輕根黑全黑則死此要訣也楊云峰云舌苔由白而黃由黃而焦或枯黑燥裂其舌邊胖大舌底潤滑者甚有舌底亦燥而絶無津液其糙刺如砂皮斂束如荔子者皆因勞傷脾肺氣虛發熱誤用發散益虛並熱復用寒涼重陰內逼以致虛火上炎所以白上加黃黃上加焦而枯黑燥裂也不論其脈不論其症大劑參附養營湯不時灌服多有得生者更有其舌同一黑色而一屬寒水侮土者宜用附子理中一系腎氣凌心者宜用人參八味其治又不相同何也蓋寒水侮土者系陰盛於內逼陽於外外假熱而內真寒格陽證也其黑色止聚於舌中腎氣凌心者系陰盛於下逼陽於上上假熱而下真寒戴陽證也其黑色直底於舌尖然未有不胖且嫩者乾燥滑潤又在所不拘也若是實火一證則其形必堅斂其色必蒼老而萬無胖嫩者耳此一虛二寒證皆驗舌者所必知也璜按黑苔危候此篇十餘節苦心分明他書無此精細也茲全録之四曰灰色灰色不列五色乃色之不正也舌見灰色病概非輕均里證無表證有實熱證無虛寒證有邪熱傳裡證有時疫流行證鬱積停胸證蓄血如狂證其證不一而治法不外寒涼攻下蓋寒涼以救真陰攻下以除穢毒也舌鑑謂熱傳三陰則有灰黑乾薹皆當攻下泄熱是也又謂直中三陰見灰黑無苔者當溫經散寒此說甚謬蓋灰黑與淡黑色頗相似惟灰則黑中帶紫淡則黑中帶白之殊耳若寒邪直中三陰者其舌灰黑無苔自宜溫經散寒如熱邪直中三陰者其舌灰黑無苔宜三黃白虎大承氣並用連投失出失入其害非輕願望舌者小心謹慎焉至於舌尖灰黑有刺而干是得病後猶如常飲食之故雖症見耳聾脅痛發熱口苦非少陰病勿用小柴胡宜大柴胡湯或調胃承氣加消導藥若傷寒已經汗解而見舌尖灰黑此有宿食未消或又傷飲食熱邪復盛之故也以調胃承氣下之若雜病裡熱見此舌宜大承氣湯重加黃連傷寒證邪入厥陰舌中尖見灰色其症消渴氣上衝心飢不欲食食則吐蛔者宜烏梅丸若雜病見此舌為實熱里證則宜大承氣與白虎湯合用璜按吐蛔宜用苦辛殺蟲暑熱證竟不在此例若純灰色舌全舌無苔而少津者乃火邪直中三陰證也或煩渴或二便閉或昏迷不省人事脈則散亂沉細伏代不等舍脈憑舌均屬裡證治宜三黃白虎大承氣並用急速連投服至灰色轉黃轉紅為止病則立愈舊說誤指為寒用附子理中湯四逆湯安得不致漸漸灰縮乾黑而死乎五曰紅色全舌淡紅不淺不深者平人也有所偏則為病表裡虛實熱證皆有紅舌惟寒證則無之如全舌無苔色減紅者氣血虛色深紅者氣血熱也色赤紅者臟腑俱熱也色紫紅瘀紅者臟腑熱極也中時疫者有之誤服溫補者有之色鮮紅無苔無點無津津舌底出無液液舌面浮者陰虛火炎也色灼紅無苔無點而膠乾者陰虛水涸也色絳紅無苔無點光亮如錢或半舌薄小而有直紋或有泛漲而似膠非膠或無津液而咽乾帶澀不等紅光不活絳色難名水涸火炎陰虛已極也瘦人多火偏於實熱醫者拘於外貌輒指為虛誤服溫補灼傷真陰或誤服滋補俾鬱火灼耗真陰亦成絳舌而為陰虛難療矣璜按紅為熱而有火須據溫熱診病時言之若陽臟血盛者雖無病時血色亦深紅更有一種嗜飲濃酒舌亦深紅未必為病也惟絳舌必須清血誤用滋膩亦多滯邪須知之不論病狀如何見絳舌多不吉舌鑑總論引仲景云冬傷於寒至春變為溫病至夏變為熱病故舌紅面赤此專指溫熱與傷寒也而紅舌各病實非溫熱傷寒所可賅括勿泥古以致誤茲將紅舌中最要者約舉其八一紅餂舌天行燥火時疫證有之全舌必紫而兼瘀臟腑為疫毒內攻逼迫心經所以舌長出口外時弄不止或餂上下唇左右口角或餂至鼻尖不等宜十全苦寒救補湯倍加川連生石膏不次急投至舌收回乃愈知治法者可以十全否則十無一生舊說用解毒湯加生地必不效也如舌長出口外脹而不餂者熱毒乘心也內服三黃瀉心湯外用銀針刺去惡血以龍腦香人中黃摻之即愈如不針則合用大承氣三黃瀉心湯不次急投必大瀉頻瀉乃愈二紅硬舌臟腑實熱已極又為燥火浸淫誤服溫藥則舌根強硬不能言語或時疫直中三陰者亦有之宜十全苦寒救補湯不次急服必愈三紅癍舌全舌純紅而有小黑點者臟腑皆熱也傷寒邪傳陽明府失治以致邪火逼入三陰或疫毒直中三陰證或實熱人誤服辛溫藥燥傷三陰證均有之不論老少何病何脈見此舌即宜十全苦寒救補湯倍加真犀尖連服必愈四紅星舌全舌純紅而有深紅星乃臟腑血分皆熱也中燥火者中疫毒者實熱人誤服溫補者皆有之其病多大熱大渴心胸脹滿皮膚燥癢日夜不能眠大便祕小便澀不等宜十全苦寒救補湯急投則愈五紅裂舌如舌色赤紅厚苔膩而裂紋臟腑實熱也宜十全苦寒救補湯倍加犀角如灼紅色無苔無點而紋裂者陰虛火炎也用黃連解毒湯加麥冬可也若紅色中有裂紋如人字者君火燔灼熱毒炎上故發裂也宜涼膈散如渴甚燥者宜大承氣湯急下之璜按舌上若有裂紋者多屬真陰不足精涸血衰或由伏熱人誤服溫補藥若加以灼紅舌絳色舌溫邪入血更可想見犀角地黃及清營各法正為此證設也舌色除淺紅及紅光不活屬血虛外一見鮮紅有裂紋便是火熱灼陰便宜從清解著手不易之理法也六紅尖出血舌乃心經邪熱壅盛所致宜三黃瀉心湯如黃檗連翹生地真犀角尖不次急服則愈七紅色蟲碎舌紅舌中更有紅點如蟲碎之狀者熱毒熾盛也宜小承氣湯下之不退再用大承氣湯攻下八紅色紫瘡舌瘡在心肺經位者乃時疫毒中心肺或楊梅毒注心肺皆有之宜十全苦寒救補湯倍加生石膏黃連不次急投至瘡平則愈有滿舌明紅並無他苔者為絳色心之本色也舌絳而潤為虛熱絳而干為實熱絳而刺為熱盛絳而光為陰液不足絳而光燥裂為陰液大傷溫病熱病瘟疫及傷寒邪熱內傳三焦熏灼心包先受熱蒸則本臟之色見治宜清心存陰化熱紅中兼有白苔者更感非時之寒也紅中夾兩條灰色者濕熱兼夾寒食也兼黑苔者邪熱傳入足少陰也兼黃黑有芒刺者邪熱入腑有紫黑斑或外證兼發斑者心胃熱極也起白泡點者心肺熱灼也若紅色柔嫩望之似潤而實燥干數行汗下津液告竭也病多不治璜按紅苔兼證分別精詳真可為法六曰紫色紫見全舌臟腑皆熱極也見於舌之某部即某經鬱熱也傷寒邪化火者中時疫者內熱熏蒸者誤服溫補者酒食濕滯者皆有紫舌有表裡實熱證無虛寒證若淡紫中夾別色則亦有虛寒證如淡紫青筋舌淡紫帶青而濕潤又伴青筋者乃寒邪直中陰經也必身涼四肢厥冷脈沉緩或沉弦宜四逆湯理中湯小腹痛甚者宜回陽救急湯若舌不濕潤而乾枯乃是實熱宜涼劑璜按此非溫熱因與辨證有特別之關係仍全照原本採入如淡紫帶青舌青紫無苔多水滑潤而瘦小為傷寒直中腎肝陰證宜具茱萸湯四逆湯溫之有紫如熟豬肝色上罩浮滑苔者邪熱傳裡表邪未淨也既不可下又不可表下並用法宜清中以解外若全紫光暗並無浮苔者陽極似陰也多不可救急下之間有得生者有紫苔中心帶青或灰黑下症復急者熱傷血分也宜微下之余則酒後中寒及痰熱鬱久者往往見紫色苔七曰藍色藍者緑與青碧相合猶染色之三藍也舌見藍色而尚能生苔者臟腑雖傷未甚猶可醫治若光藍無苔者不論何脈皆屬氣血極虧勢必殞命舊論泥於五行謂金木相併火土氣絶不分有苔無苔概云不治亦管窺之見耳凡病舌見藍光無苔者不治若藍色而有苔者心肝肺脾胃為陽火內攻熱傷氣分以致經不行血也其症有顛狂大熱大渴哭笑怒罵捶胸驚怪不等宜十全苦寒救補湯倍生石膏黃連急投則愈璜按藍色多屬寒此則熱病也其著眼在有苔無苔別之然須參之外候若孕婦舌見純藍者胎死腹中也宜下之若純藍舌有藍色之紋也在傷寒為胃氣衰小柴胡去黃芩加炮姜若因寒食結滯者宜附子理中湯或大建中湯急投有舌滑中見藍色苔者肝臟本色也邪熱傳入厥陰陰液受傷臟色外見深而滿舌者法在不治如微藍而不滿舌者法宜平肝息風化毒舊法主用薑桂然邪熱鴟張肝陰焦灼逼其本臟之色外見再用薑桂是抱薪救火也瘟疫濕溫熱鬱不解亦有此舌治宜芳香清泄濕痰痰飲證亦有舌滿滑膩中見藍色者為陰邪化熱之候法宜清化璜按余遇此證用溫藥口燥用清化如石投水竟以疏肝解鬱得效八曰黴醬色者有黃赤兼黑之狀乃臟腑本熱而夾有宿食也凡內熱久郁者夾食中暑者夾食傷寒傳太陰者皆有之凡見此舌不論何證何脈皆屬裡證無表證虛寒證舊論謂苔薄用桂枝湯加枳橘半夏舌色厚為土邪剋水鮮有得愈者皆謬說也凡純黴醬色舌為實熱蒸胃為宿食困脾傷寒傳陰中暑躁煩腹痛瀉痢或祕結大渴大熱皆有此舌不論老少何病何脈宜十全苦寒救補湯連服必愈如全舌黴色中有黃苔實熱鬱積顯然可見宜大承氣連服舊說謂二陳加枳實黃連恐未必效也如中黴浮厚舌宿食在中郁久內熱胃傷脾困也或刮不淨而頃刻復生者不論何證何脈宜十全苦寒救補湯分二劑循環急服則愈舊說用枳實理中湯加姜炒川連此治寒實結胸者與此舌不合察平人舌苔法舌之有胎猶地之有苔地之苔濕氣上泛而生舌之胎脾胃津液上潮而生故胎或作苔平人舌中常有浮白苔一層或浮黃苔一層夏月濕土司令苔每較厚而微黃但不滿不板滯其脾胃濕熱素重者往往終年有白厚苔或舌中灰黃至有病時脾胃津液為邪所郁或因瀉利脾胃氣陷舌反無苔比平者較薄其胃腎津液不足者舌多赤而無苔或舌中有紅路一條或舌尖舌邊多紅點此平人舌苔之大較也驗舌訣死症法生死之訣於脈症者四經垂訓甚明且備矣而佐以驗舌則尤顯而易見也故並撮其素所經驗者附載於此以為臨證之一助舌如去膜豬腰子者危璜按此陰虛之極也溫熱病中最忌之舌如鏡面者危此胃陰亡腎氣將敗也舌糙刺如砂皮而乾枯燥裂者危按此證清熱生津可愈舌斂束如荔子肉而絶無津液者危此津枯熱熾之證舌如硃紅柿者危此即所謂灼紅舌與絳不同舌如烘糕者危此熱極也舌本強直轉動不活而語言蹇澀者危按此腦病也牛黃丸可治舌卷短萎軟枯小者皆危此第照對三岔腦筋受熱爍也腎陰竭絶腦筋短萎將死之候舌起白苔如雪花片者不治此俗名雪花苔舌竟無苔久病胃氣絶者不治此證須兼胃氣決之舌因誤服芩連而現出人字紋者不治熱本傷陰又加苦燥化火爍陰故不治育陰清熱亦有生者舌卷而囊縮者不治舌淡灰轉黑淡紫轉藍邪毒攻心已甚而傷腐脾胃者不治舌黑爛而頻欲齧必爛至根而死舌底乾燥不拘苔色黃白形如豆腐渣者或如齧碎飯子者皆死此俗名飯苔胎舌與滿口生白衣如黴苔或生糜點胃體腐敗也多死舌乾晦枯萎而無神氣者必死陰衰血敗神將離矣故主死舌絳無苔乾枯紅長而直紋透舌尖者心氣內絶也必死舌燥苔黃中黑通尖下利臭水者胃腸腐敗也十不救一舌色㿠白兼青此中焦生氣已絶也多死若孕婦面舌俱青母子俱死璜按溫病辨舌較之脈候尤為真切越醫何廉臣覼列看舌十法辨苔十法察色八法挈領提綱條理朗若列眉此前醫者無此精到也最後察舌以訣證之危亡夫一舌診耳而謂死生全憑乎此錫璜不信也然以此決臟腑陰陽之虛實神經擾害之徵驗每每切中緣自天士而後代有發明乃中醫經驗最精之法也不辭僭妄特全録而評釋之庶後之醫學家臨床議病又有所根據云爾察目法兩目赤色火證也必兼舌燥口渴六脈洪大有力宜犀角連翹等清透之陽毒三黃石膏湯表裡兼解之若目赤顴紅六脈沉細手足指冷者此少陰火上冒假熱真寒也六脈洪大按之無力者亦是兩目黃色此濕熱內盛欲發黃也必兼小便不利肝脾積血發熱者多患之腹滿口渴脈沉散已由膽而病及胃矣輕則茵陳五苓散重則茵陳大黃湯若目黃小便自利大便黑我國舊說謂之蓄血證病原最切小腹硬滿而痛者桃仁承氣湯下之若目黃身冷口不渴脈沉細屬陰黃宜茵陳理中湯璜按肝脾積血病及膽胃而腹脹發黃者我國謂之濕熱證其陰黃即濕寒也透濕暖胃多效病人目眵多結者肝膽火盛也宜清之病人目睛微定暫時轉動者痰也宜加味導痰湯痰去目珠自然流動矣病人眼胞上下黑者痰也病人目昏黃者衄血也病人目色清白寧靜者多非火證不可妄用寒涼病人目不識人陽明實證可治少陽虛證難治凡目昏不知人或戴眼上視或目瞪直視或眼胞陷下皆屬死證傷寒必先觀兩目目中不了了尚為可治之候直視則為不治之疾故經云視其目色以知病之存亡也凡病至危必察兩目睛不和者熱蒸腦系也蓋腦為髓海腦之精為瞳子悍熱之氣入絡於腦故睛不和而昏眩甚或見鬼見怪凡病目能識人者輕睛昏不識人及目歪視目縮小目睛正圓為神氣已去多不治惟直視歪上視移時即如常者多因痰閉使然又不可竟作不治論目有眵有淚精采內含者為有神氣凡病多吉無眵無淚白珠色藍烏珠色滯精采內奪及浮光外露者皆為無神氣凡病多凶脫陽者見鬼脫陰者目盲凡病皆危燥病則目光炯炯濕病則目多昏蒙燥則目無淚而乾澀濕甚則目珠黃而皆爛或眼胞腫如臥蠶陽明腑實則譫語妄有所見熱入血室血耗陰傷晝日明瞭夜則低聲自語如見鬼狀璜按內經以目為命門言其一開一闔為生命之門若目不能開闔而人死矣執此以論病之死生若操左券也人也精神在腦而寄託於目仲景言目中不了了晴不和雖無表裡證者亦須急下此中奧妙非淺學者能所悟出也蓋腦病最易猝死捍熱上衝頃刻死人非急下不能救治若目昏不識人目睛正圓已擾害及腦神經故多不治試觀黴菌之入於延髓其電擊性者數句鍾而死可以略識其概惟本篇名察目而目暈黃者多鼻衄為溫熱病所恆見並不採入茲特補之診腹法本於內經難經診腹之法載在內經刺禁篇蓋言誤刺則發其動氣也難經之八難十六難亦有此法八難謂生氣之原在腎間動氣十六難謂假令得肝脈其外證善潔面青善怒其內證臍左有動氣按之牢若痛其病四肢滿閉癃溲便難轉筋有是者肝也無是者非也假令得心脈其外證面赤口乾喜笑其內證臍上有動氣按之牢若痛其病煩心心痛掌中熱而啘有是者心也無是者非也假令得脾脈其外證面黃善噫善思善味其內證當臍有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收有是者脾也無是者非也假令得肺脈其外證面白善嚏悲愁不樂欲哭其內證臍右有動氣按之牢若痛其病喘咳灑淅寒熱有是者肺也無是者非也假令得腎脈其外證面黑善恐缺其內證臍下有動氣按之牢若痛其病逆氣上腹急痛泄如下重足脛寒而逆有是者腎也無是者非也璜按難經此說按腹部位與西醫解剖學有不相符合之處然以見上古亦重腹診也今醫四診亦只得其大略於古人腹診之法不講久矣遑言西法之聽診打診及鏡檢各法耶下文只就診腹之有關於溫熱者採入其中西診法大略正在編輯後即續出原南陽云欲工醫術須講求診腹知人之死生病之輕重莫切於診腹欲詳其法先須知病人之腹象而推考之朝夕用工揣摩則必得其精微不可忽略也外感病診腹不盡可憑腹候佳象而死者有焉然腹皮潤澤而元氣張者邪熱雖劇其熱易去腹皮無潤澤元氣不張陰分衰弱虛火亢者死診腹下手法及驗輕重熱症決死生法凡診腹瘦人大便後腹力益弱肥人大便燥結後腹力益強醫者宜察於此先使病人仰臥胸前拱平兩足齊伸腳跟若腹皮強張動氣不見者使兩足稍屈則可診得焉求古録醫譜云凡診腹之法用左手患人男則坐其左女則坐其右若不便反之亦可也而手掌與五指伸展平板先停住膻中察氣之緩急遷停住虛里診其動之高低而徐徐左右按過至兩側膂肉外如此數次而至鳩尾醫手掌魚腹外側膂指根三肉與病者皮膚相襯著而久停住初輕軟漸重墜使手掌與患者肌膚相和而溫融手掌魚肉當肘下掌側肉當肘上極按肘骨際左右排押而至兩側膂肉外如此各數十次以察肘下之堅軟攣緩塊之有無隱顯次至大腹停住三次密排診尺脈手掌當腹之正中以察氣之動靜動氣之有無高低大絡之拘攣軟緩任脈之浮漫沉整而左右排按及兩側肋外廉如此各數十次以察塊之有無隱顯次至臍上掌肉當臍亦停住魚腹外側指根三肉遞推遞察以臍之緊實虛軟臍蒂有力否深淺凸凹次至小腹又停住察氣之默躁力之有無動之應否浮沉大絡之急強濡弱任脈之浮見沉伏而左右排按及兩側腰髖外如此各十數次察塊之有無露伏若胸膺大小腹三處俱手掌難探求者並齊指頭以察之復再如初手掌與五指伸展而襯著病者之皮膚上從膻中下至橫骨左右中央三行排按各十數次每時醫之氣息與患者氣息相應以察過不及而究膺胸之肥瘦廣窄高低腹形之廓大隘狹上低下豐上豐下低緩漫緊收虛弱充實肉之肥瘠瘦削皮之薄軟厚強膚之潤澤枯索熱之淺深有蒂無蒂腹之滿脹低減塊之大小長短圓扁軟硬水之有無多少冷之厚薄漫結是其梗概耳如其纖細悉盡者足諦知其證候審辨其用藥是診法所以按腹回出於切脈之右也然其按探押索自有微妙存者口可以授書可以傳非敢祕惜也醫者初診患人之法其再次三次者則惟取其要而省其他若有不解則數數診按如初診法得解而後止醫之手心熱者診無熱人猶有熱須自知之以手背察其熱脈候有熱而腹候無熱者表熱而其熱易去也按腹而熱如燒手掌者伏熱而其熱不易去也小兒暴熱其輕重不易以脈辨可以腹候決定心下有動而其熱如燒手掌者不可忽腹皮上浮如撫脫毛鳥是為極虛凶候如此者汗必多病人濱死之手足亦如此欲知其狀察死人之肌膚可知病者腹形之半途忽變於常腹皮附脊如削去胸肋以下如板至橫骨漸漸高者皆惡候也或疫或痢一二日內得此候者多難治須預防之若待動悸等惡候現而後知其難治是謂庸醫祕傳曰診腹須先分別邪氣及元氣之動按之浮而強者邪氣也沉而強勇而不澀滯者元氣也候腹而動應手者大抵邪氣之動也在鳩尾下或右脅或左脅其動今日有而明日止或移他處或靜然止者是邪氣離去也遇此證當專補元氣治之若按之腹勢無維持之力而柔者邪氣既去而元氣亦脫也難治動氣止者邪氣離也左動轉於右右動轉於左者亦邪氣離也可因邪氣之離以定其死生吉凶凡腹部動氣不收束者可慮動氣浮散者屬虛實者屬濕熱微細者屬陽虛能知得腹動者可謂治術已入其室膻中大動痰火壅盛滯氣火鬱或為吐衄之兆其人必皮膚壯熱內經難經所載知死生之說大要以脈然腹候亦有一祕訣醫按病人之腹氣海丹田氣張有力如中有物是為元氣氣海丹田不氣張有力者元氣虛衰也其病必重若大病後如此者必三十日內死鳩尾下細筋見皮肉離者必十四五日內死腹動上迫於肋骨下者七日死皆是病中病後之診也假令人迎寸口脈平和者見此候亦不治邪氣祛後腹之上下左右平和而壯實者生邪氣祛後脈靜而足下溫者亦生邪氣祛後腹中纍纍如布袋盛小石者死邪氣祛後腹中虛軟如無物者亦死璜按腹診本我國舊法二十年前東瀛亦頗重之亦足以助診法所不及蓋即按摩之遺意也小腸壞再歸熱按其脾部甚腫大腰痛腓腸痛殆所必發璜按脾部在左脅下我國舊云肝部者非痧疹熱脾亦多發腫但多現神經症狀熱瘧脾腫尤多急性胃炎胃部疼痛發熱嘔吐腹部現澎滿緊張之感急性腹膜炎惡寒發熱下腹劇痛手壓更痛嘔渴便祕腹部膨脹最險者為膿毒熱侵襲全身慢性腹膜炎嘔吐便祕食欲不進下腹部現漸進之膨脹觸診時每觸知其肥厚及粒粒之軟塊物熱度為輕度由結核性者大抵現日晡潮熱診腹凡診腹時醫師先溫其手以免病人受驚腹壁脹硬致有診斷不能確鑿之虞凡醫師診病人腹部時必問其疼痛與否若右側下部疼痛者即為小腸炎腸結核腸炎盲腸周圍炎等症若右側下部疼痛者即為赤痢證其按之下腹有硬塊者必為大便停積腸內之證凡診脾臟肥大及轉位時宜使患者高舉左腕醫師居右側診察之凡診肝臟肥大轉位等症易觸知之蓋觸診時可覺其抵抗力之強且或得明知其下緣與兩截痕也凡診腎臟腫脹及轉位時宜使患者仰臥以兩側外轉立膝於床上先檢左腎以左手自腹壁壓腎臟部右手壓背部肋骨緣與腸骨間從前後兩側觸知之
