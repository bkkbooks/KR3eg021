body:
  text: 卷一考證溫熱名義經云冬傷於寒春必病溫又曰冬不藏精春必病溫同一病溫耳而必別之曰是為傷於寒是為不藏精其義何居曰此皆伏氣之為病也傷寒甚者冬時即病微者不即病其氣伏匿於肌腠及少陰至春陽氣開泄觸動伏氣而為病此一例也西洋醫謂潛伏期不過十四日無冬傷寒至春乃病之理不思痘疹麻疹為先天之毒有潛伏至十餘年二三十年者由冬及春一剎那間耳能決其必無是病乎不藏精之説注家謂不專主陰精而言如冬應寒不寒桃李反花之類夫氣候不寒陽邪早發消鑠陰液腎精內虧至春陽氣舒張或新邪引觸伏邪為病人與天地同一氣耳氣候不和感觸蘊藏日積月纍而病以生此又一例也經又曰先夏至日為病溫後夏至日為病暑暑即熱也夏至以前氣候和煦故感之者隨時令而病溫夏至以後氣候酷熱故感之者隨時令而病暑溫者較熱為微熱者較溫為重此又一例也溫熱雖隨時令而變遷究之病重於溫則為熱又不可謂夏至以前必無熱病也東洋醫學謂人為溫血動物以熱度表測算通常在攝氏寒溫計三十六五度與三十七五度之間溫特爾里希氏以三十七度五分乃至三十八度名為次熱三十八度乃至三十八度五名為輕熱三十八度五分乃至三十九度五分名為中熱三十九度五分乃至四十度五分名為高熱四十度五分以上名為劇熱但至四十度以上患者必無生望其以熱度表九十八度起算者規例亦同夫次熱輕熱即溫病之類也高熱劇熱即熱病之類也觀此而溫與熱之名義渙然冰釋矣熱度表檢溫熱法我國醫學僅以望聞問切為診病之準繩而於溫熱之度數未能周悉此缺點也則檢溫之法尚焉檢溫部位以腋窩為便檢時先視腋窩干濕倘有汗則蒸散時皮膚溫度下降不可不知檢溫器之水銀部須留神高插於腋窩之內使病人固定上膊於胸側其上膊向前上方屈曲經十分至十五分取出視其度數留點檢溫器之種類近益增多以節省時間之故有二至三分鐘即可表示體溫者所謂分時檢溫器是也在腋窩中故意摩擦水銀部或強力壓迫時則溫度上升診病時務須注意病人衰弱過甚而精神模糊或幼兒檢溫時其上肢不能保正當之位置者可於肛門或陰戶內檢之身體表部血分減少時如熱病惡寒期虛脫霍亂等亦有在此處檢溫者行時須以脂肪或油塗檢溫器送入大腸肛門溫度較腋窩常高二至五度水銀柱上升亦較早尋常須十分者此則五分已足用分時檢溫器則僅一至二分鐘即可知矣直腸或陰戶有分泌物者用過之檢溫器可用石灰酸或升汞水消毒近多用輕便小檢溫器宜於舌下檢溫使病人閉口以鼻呼吸檢溫器必使常在舌下其檢定溫數殆與腋窩無異檢溫次數若僅一次則不過辨有熱無熱而止非反復行之於診斷預後及治療上無應用之價值檢查次數視熱之高低病之輕重而異雖在輕症至少一日二次即午前七時至九時午後四時至六時各一次重病則每二至三小時檢一次是為通例體溫升降情形欲使一目瞭然每次檢溫必將度數記於熱度表因此可知所謂熱曲線而脈搏呼吸之數尋常亦同記於表中檢溫器至熱證將愈期尤不可離蓋慮其復發故也檢溫器一則查其身熱度數一則查水銀上時之遲速以知身熱之盛衰檢溫熱為辨證之助檢溫不徒可以分熱之度數也尤可為辨證之助例如平人先一日毫無別恙忽然身熱至寒暑計高四十度或一百度於次日尤減低者此必感受黴毒若時瘧之類故變遷如此之速尋常熱症如感冒傷風發熱自始至終皆有一定即朝夕加減度數亦無大差從無忽然變遷驟加驟減者熱度表以行度高低及有定無定足以別其症之彼此不同醫者於此可免錯誤即大熱症於病盛時或將愈時忽起發炎或復發等事者必其身熱有所變遷用檢溫器均可先見故醫者不可一日而不用熱度表也熱度高則證必重亦必有發炎及毒入血內等事醫者於此均不可輕言易治倘已查其身熱甚高所加度數又速而不絶則證必重若大小便閉而其身又無汗則危險更不可言熱度表查其身熱忽有變遷或加過高或減太低者必兆其證有變重之危雖不即變後數日亦必變之如小腸壞大熱症而身熱忽然減低過常人之度則必有大小腸流血之徵身熱數日而熱度不見加高或自朝至晚略減低者則其證必易治設或本晚熱既減低而次早復高者則症又略重焉熱極應退之時不拘輕重能按次第漸減而不復加則必漸愈若應退之期熱仍不減或一時減而又加者則必危矣熱病雖退之甚速但脈與呼吸並不見靜而反躁急其各處病狀不見減而反增多則症必危殆故身熱必按次第漸退各病狀與脈呼吸亦皆減輕乃為見效若僅退熱非愈兆也飲食勞動時及憂思忿怒熱度表亦必加高非徒病者然即無病亦然也身熱有因大小便閉小而加高者下利後試之則減低矣若熱病初痊其熱度往往比常人尤低數日方復原者此又不獨大熱症為然即各等瘧證與應時輕重熱症皆然也溫熱提要俞東扶曰今之所謂傷寒者大概皆溫熱病耳仲景云太陽病發熱而渴不惡寒者為溫病在太陽已現熱象則麻桂二湯必不可用與傷寒迥別內經云熱病者皆傷寒之類也是指諸凡驟熱之病皆當從傷寒例觀二説似乎不同因審其義蓋不同者在太陽其餘則無不同也溫熱病只究三焦不講六經此是妄言仲景之六經百病不出其範圍豈以傷寒之類反與傷寒截然兩途乎葉案云溫邪吸自口鼻此亦未確仲景明云伏氣之發李明之王安道俱言冬傷於寒伏邪自內而發奈何以吳又可溫疫論牽混邪惟傷寒則足經為主溫熱則手經病多如風溫之咳嗽鼻鼾熱病之神昏譫語或溏瀉黏垢皆手太陰脈手厥陰心包絡手陽明大腸現症甚至喉腫肢掣昏蒙如醉躁擾不寧齒焦舌燥發斑發頤等症其邪分布充斥無復六經可考故不以六經法治耳就餘生平所驗初時兼挾表邪者多仍宜發散如防葛豉薄牛蒡杏仁滑石連翹等以得汗為病輕無汗為病重如有斑則參入蟬蛻桔梗蘆根西河柳之類如有痰則參入土貝天蟲瓜蔞橘紅之類如現陽明證則白虎承氣少陽證則小柴胡去參半加花粉知母璜按少陽證因於溫暑者雷少逸清營捍瘧法較穩少陰證則黃連阿膠湯豬苓湯豬膚湯俱宗仲景六經成法有效但溫熱病之三險證多死不比傷寒蓋冬不藏精者東垣所謂腎水內竭孰為滋養也惟大劑養陰佐以清熱或可救之養陰如二地二冬阿膠丹皮元參人乳蔗漿梨汁清熱如三黃石膏犀角大青知母蘆根茅根金汁雪水西瓜銀花露絲瓜汁隨其對證者選用若三陰經之溫藥與溫熱病非宜亦間有用真武理中者百中之一二而已大抵溫熱病最怕發熱不退及痙厥昏蒙更有無端而發暈及神清而忽間以狂言者往往變生不測遇此等症最能惑人不比陽證陰脈陽縮舌卷撮空見鬼者易灼其危也要訣在辨明虛實辨得真方可下手然必非劉河間吳又可之法所能救平素精研仲景傷寒論者庶有妙旨至若葉案之論溫熱有邪傳心包震動君主神明欲迷瀰漫之邪攻之不解清竅既蒙絡內亦痹豁痰降火無效者用局方至寶丹或紫雪或牛黃丸宗喻氏芳香逐穢之説真足超越前賢且不蹈用重藥者一點偶誤覆水難收之弊也璜按喻氏此論確切不移其間有云無端發暈神清而忽間以狂言者往往變生不測因此證神氣半明半昧察其舌色淡紅而近紫苔甚薄或無苔死期每在五六日之間余於臨證見之屢矣此證在西醫以為延髓神經為細菌所侵害此因由顯微鏡之檢查而得者也未識我國醫者以為然否溫熱病候難經云熱病皆傷寒之類歷考各醫家皆謂未可概以傷寒法治之茲特覶列如下以為辨證之準的霜降後天氣寒冷感之即病者傷寒也霜降後當寒不寒乃更溫暖感冒而即病者冬溫也春氣和暖初病但熱不惡寒而口渴此由內發外伏氣之春溫也初起微寒後即但熱不寒此感而即發之春溫也夏至以後時令炎熱一起壯熱煩渴而不惡寒者熱病也熱病與中暑相似但熱證脈盛中暑脈虛夏月有病頭痛譫語自汗身不甚熱兩脛逆冷四肢沉重胸腹滿而渴者濕溫也其人常傷於濕因而中暑濕熱相搏故發此病頭痛身熱自汗與傷寒同而脈尺寸俱浮身重默默但欲眠鼻鼾語氣難出四肢不收者風溫也身熱足寒頭項強急惡寒時頭熱面赤目脈赤獨頭搖卒口噤背反張者痙也金匱要略云太陽病發熱無汗惡寒者為剛痙發熱汗出不惡寒者為柔痙伏天受暑至秋晚發新邪欲人伏氣欲出寒熱類瘧脘痞渴悶午後則甚入暮更劇天明得汗則諸恙稍緩者伏暑也大火西流炎𭶟一如盛夏暑溫交蒸病見壯熱煩渴蒸蒸自汗者秋暑也璜按傷寒指掌云古時傷寒十一證類傷寒六證時行傷寒二證細考之屬於溫熱為多故今之所謂傷寒大半屬於溫熱也而治法究與傷寒不侔傷寒入足經而溫邪多入手經傷寒宜表而溫邪忌汗傷寒藥宜辛溫而溫邪藥宜辛涼苟不辨明必多誤傷歷代以來若河間之原病式楊栗山之寒溫條辨吳又可之醒醫六書戴天章之廣瘟疫論皆能就傷寒溫熱之病證不同處剖析精詳而用藥大法非升散即苦寒猶非面面圓到葉天士先生出於溫熱治法具有慧舌靈心章虛谷邵步青王士雄吳坤安吳鞠通杜羲桐輩皆宗之治效歷歷可紀李纘文陸九芝信口謾罵非正論也璜以類傷寒各症與溫熱頗不相似特將伏暑秋暑二病類入因近代此病最多救世急也論病所以發生溫熱及惡寒之原理何謂熱因新陳代謝之變化而起之體溫升騰也健康者之體溫在腋窩不逾攝氏三十七度二分至三十七度三分在直腸不逾三十七度五分至六分然既罹於傳染病則由微生體之作用於身體內增進蛋白質之分解以是發生體溫恆較常態為多況因傳染之感作乃體溫之升騰呼吸心搏俱各增加故亦能發生體溫此發生之體溫在健體者即因溫放散機能之精進而調節平均之在發熱者則因水分蒸發之溫放散失其調節與溫發生不能均勻遂至體溫蓄積而升騰其所以起此失調者大率皆由神經中樞之溫政主宰部有變動故耳當發熱之初期其發生之溫增進頗著而皮膚之血管收縮水蒸氣之發散同時減少以抑制溫之放散兩者相助為虐遂使體溫升騰若此時皮膚之血管收縮過度且甚急劇則患者頓覺寒冷兼起不隨意之筋運動及鬥牙等是謂戰栗若皮膚之血流略起變化其所起亦不甚急劇則其發熱常以惡風力始發熱達極點時則溫放散亦增進皮膚感熱然尚不能驅除過剩之溫觸於皮膚則覺其乾燥是為水蒸氣放散減少之症熱之將下降也溫調節機漸復常態或急速放溫故流汗淋漓高溢在二十四時內即峻下而復平溫是謂分利或則由産溫之漸減而解熱降熱徐緩無分利性之發汗是謂渙散璜按此即我國醫家所謂正復邪自退之義凡高熱之後體溫必先降於常溫以下凡腋窩在三十七度直腸在三十七度三分以內乃得謂為解熱解熱後體溫暫時尚易移動稍有感作其體溫即增加是溫調節機猶未復元之症也傳染病逞雄威之機生體其抵抗力失墜時體細胞已蒙其障害之結果則分解蛋白質以減降發生體溫之機能即此時之溫放散機能亦從而沉降其調節不完全時則身體之厥冷過甚是謂虛脫如是患者外貌頓呈危險之狀則知其解熱非良徵也璜按此即我國醫學所謂假熱一退真寒便生之義體溫之升騰以高於蛋白質之分解加以傳染亦消耗蛋白而發熱時之攝取食物又不充足心筋及呼吸筋過勞欲體脂肪之遠原以是其熱稍高或稍持久則體重必減少睹其體筋肉瘦削及漸次倦怠無力可知熱病之消耗蛋白質為不少也神經中樞為細菌毒易於侵害之處往往起頭痛不安不眠意識混濁譫妄等症於延髓之循環呼吸中樞亦受侵害則其麻痹實占死因之多數璜按此即中醫所謂熱入心包也就心臟之節序呈種種之變化其心力又往往低降夫心力之低降本於心筋之解剖的變化然血管運動神經之變化亦與有力焉蓋血管運動神經中樞受障礙則血管弛緩血液幾全集於內臟神經所分配下之下腹血管中終至誘起腦皮膚筋肉等之貧血而虛脫時之體溫沉降亦與此循環障礙有密接之關係從可知血管運動神經之關係於傳染者若是其大也而傳染病之恢復期其關係於心臟之障礙者尤重璜按王肯堂有心血一調其熱自退之説義與此合肺臟亦多因微生體之為病或渾合傳染而陷於炎症為直接之死因脾臟肥大恆於多數之傳染病見之其意雖未詳然每為細菌之巢窟如霍亂症小腸炎其脾臟中多含細菌所産之破壞物質璜按熱證及溫瘧其脾脹大者甚多左脅下痛即其據也腎臟有排除細菌毒於體外之用而此時之上皮及血管被其障害輕者現熱性蛋白尿重者必起純然之腎炎腎炎之起多在有熱期然如患猩紅熱症則又往往至恢復期而始然也璜按溫熱病後所以多水腫者此亦其一原因吳鞠通溫病條辨中於下焦病關於少陰者每用減味復脈湯最為卓見喻氏有病後血虛氣盛下部發腫之説亦腎炎也論熱病輕重進退之狀況熱病中有所謂輕熱症者其熱或往或來神經不受障害雖熱時試以熱度表甚高殆汗出熱退氣體即見平和縱有時體溫亢進亦可漸就痊愈若因特種之起熱物入於血中被毒而發是名之為中毒熱此熱最重即我國醫學所謂溫毒是也熱病初期因皮膚血管收縮而起惡寒頃之寒退而熱呼吸頻數頭痛不快有體溫升騰經一二時而達於第二期者有體溫徐升經一日至數日而達於第二期者此期發熱增加雖有一二次之升降而脈管神經興奮不止肌溫及放溫毫無定則或皮膚次厥或潮紅灼熱而乾燥或手足冷厥而軀體灼熱脈軟而數煩渴引飲手揚足擲倦怠不安此期為最害身體之時故熱病之輕重一以此期之熱度及心力為斷大概熱度不越三十九度者為輕症越四十度者為重症心力強者其預後良弱者即不良甚至於死乃百試而百驗者也熱病減退期其皮膚血管擴張而充血發汗極盛放溫增加而熱解脈漸緩和而軟惟尚疲勞煩渴神雖倦而清臥覺安枕暫時間縱有急劇之體溫或呈顯著之升降亦不過比常溫為高耳過此以往體溫每達於常度或雖比常度較減悠忽仍復此期間倘飲食起居不善調攝亦有發輕熱者良由溫政未能一時復舊故也我國醫學所謂餘邪稽留或食復者正此類耳論虛熱實熱之原因體溫亢進脈搏增加此實熱證也而腦底腦膜炎熱度雖高脈不頻數蓋因滲出物壓迫迷走神經不得謂脈不數之即為虛熱也健康強壯者每遇熱病心力及血壓亢進脈大而且洪實然於危重之熱證或慢性熱病之末期心力及血壓衰減脈遂小而且虛軟醫學家遂以前者為實性熱後者為虛性熱然設此實性虛性之區別實不加研究心力及血壓衰減之原因其原因為何即久久持續之體溫亢進與病原菌化生之毒物也夫熱病所以始實而終虛者蓋由熱度過熾亢進之血溫至為心臟筋質及神經質之害又熱病則食欲不進營養衰減心力又為熱所鼓動大足致心臟之疲勞因而心臟機能遂至乏困動脈血壓遂至沉降而虛候成矣熱性虛實既由心力而分無怪素體血虧及營養不良者其發熱時心力之衰減較強壯康健者為尤易也論神昏譫語熱病之神昏譫語為最常見之候此症在我國有云邪入心包者有云陽明燥實者有云邪入於腑則不識人者而在西醫則以為神經障害之症耳神經障害有輕重二候輕者頭部昏暈壓重疼痛身體不安心煩不眠重者神氣昏憒如半睡狀應答遲滯又發譫語起臥不安精神錯覺甚至昏昧在小兒則兩手顫振喃喃譫語或發昏睡推厥病原良由該疾病所化生毒菌之作用也論溫熱瘟疫溫毒即西醫之重輕熱症西醫論熱症有八除疽疹痘外分為小腸炎能傳染熱症及復發熱症與輕熱症四種是四者中醫列之溫熱門近人有以小腸炎為即中國之傷寒證此大誤也蜀彭唐宗海以小腸炎即中國之腸癰其説近似而猶未確何言之仲景傷寒為治六氣之書並不專指一證而言見三陽證即用三陽方見三陰證即用三陰方甚至有一日而病及少陰者與小腸炎之來勢甚緩病情大不相同彼徒習西法而於中醫學問未深者烏識所謂傷寒證哉腸癰初起亦有惡寒發熱而小腸炎初起甚寒冷僅有幾日瀉利且其熱必朝輕暮重肚腹按之痛右胯部按之亦痛脹滿雷鳴脾亦腫大與腸癰症顯有不同且纍及心則積黑血而血管脹至深紅纍及腎則略變白色或脹大或積血而紅蓋近世醫學進步以為即腸窒扶斯菌此菌體小入人體而每至小腸回腸處侵犯黏膜而繁殖蔓延腸間脾臟其毒為體中吸收則發熱犯心臟則麻痹薄腸破碎則腸出血而斃命其初起甚輕至六七日而漸次增重發病之初思睡懶言或有汗或無汗頭痛額痛腰骨四肢痛脘悶作嘔鼻衄肢體不能自持此則仲景風溫例中所云風溫為病身重多眠睡鼻息必鼾語言難出之類也夏秋熱病重者亦多類此西醫於是病先觀顏容次及腦部胃部皮部與身熱及小便其察顏容云先即臉皮略紅隨即困倦無神或覺昏昧則症重愈久則昏昧愈甚若肺內有壞則兩顴必露一片圓紅色用指按則散指離則紅復聚分明溫邪為病首先犯肺之確據其察腦部云此七日必見頭痛或腰骨痛而皆非甚痛到七日後其痛漸失然起譫語者甚多有要起身下地自言欲回家者有勸以睡下雖聽從而不久復起者有日靜夜劇者有所言皆其日用尋常事者其甚煩躁大聲疾呼用力起身不歇動輒須人看禁不則心昏昧不能理事口渴不知引飲久睡不知轉側遺溺遺糞耳聾神呆撮空捻衣肢搐眉皴皆危病也但此證在西醫以為腦病然華醫治法有包絡熱宜用開竅清血者有痰熱阻滯經絡宜用清熱蠲痰者有燥實堅宜用下法者皆能救危亡於頃刻溫熱書俱在非可籠統施治也察胃部病狀云此證作悶者居多初起尚思飲食至神氣半昏半昧雖飢渴亦不知呼喚察其舌有薄苔或厚苔色有黃紫黑之不同如苔漸退舌漸潤則病漸愈舌苔有退數次復發者有退後色甚紅者有滑紅有乾硬到神昏則乾硬尤甚者舌戰動則病重病重則令伸舌甚難舌伸又忘卻收回由其神昏致此耳牙齒則黑垢常積牙齦亦有時流血其腹內各核壞爛又應細察以指按右胯如撈水聲重按則痛用指以叩按腹指痛有氣則應如響並有腫起如臌者其痛多在右胯亦有滿腹皆痛者若神昏必力按方覺痛辨之之法大便瀉大小腸有氣胯部響痛皆為此證必有之狀況此西醫之説也若中醫辨此證其名詞有各異之處謂溫熱肺先受病舌薄苔邪尚在肺開肺可愈肺與包絡為近包絡即心外衣熱傳此即昏睡飢渴不知神明迷亂也神明發於心故熱邪由肺傳心神氣則半昏半昧也究之中醫言心西醫言腦皆主神明而言也西醫謂人之精神在腦乃其論小腸炎也竟云將患此證而死之人割開視之見其腦內並無發炎然則譫語及昏昧等事其不盡關於腦也明矣我國言陽明病燥實則譫語又曰邪入於腑則不識人故昏沉燥實曾有用下法而愈者蓋下其熱則病除病除則神復也原此證初起作悶舌苔厚黃久則變黑若紫黑苔漸退舌漸潤則病漸愈絶似中土之時行大熱病其苔退數次復發者即伏氣之濕熱病也其滑紅者必夾濕痰其乾硬者必傷胃陰其舌戰及難驟伸者必由痰阻舌根右胯部痛者清熱解毒之外佐以通絡柔肝病無不愈良以用此等藥即能消伏匿之炎熱故也至其作瀉乃熱邪出路善治者可漸消其發炎我國治法每以芩連銀翹知母等大清大解熱退而炎退矣其察皮部云此證身多生類荔枝皮之小粒色略紅摩之嶙峋粗糲此溫熱發斑疹在時行中發疹之類另有一證而由初熱不能用辛涼透汗或用辛溫藥強發其汗以致此者亦屬不少倘用輕清宣泄解毒而不冰毒熱自漸減漸輕而愈矣西醫於發疹之病僅云身熱無汗者乃常事而竟不以清熱解毒為透汗之地汗不出則發斑疹溫熱溫中每或有之其察身熱云熱之輕重雖時有不同但朝減夜加乃其常蓋伏暑濕溫秋暑晚發等病無不皆然故余於西醫之小腸炎敢斷斷言之曰小腸炎即中土之溫熱證乃正論而非影響之談也其察小便云病時所函之尿底與酸必多且重其色亦深中有蛋白者約六七居其一有之則病重據西醫論此病謂半由內腎積血半由血內有毒不知病由伏氣而發熱邪內灼銷鑠真陰故上為不寐而下為小便混濁乃熱病常有之症也清熱育陰小便自然清長熱勢自然輕減加以淡薄滋味佐以生津養氣便可復元此則屢試屢驗之妙法西醫於此病每用牛奶牛羊肉雞鴨白鴿粥之類助熱添病以重熱症而初起即遽用此殊非余之所敢知矣惟其對於此症只許食流動之食物粗硬難化之品始終禁食則精切之確論也能傳染熱症西醫列之重熱病中即我國所謂時行之毒由口鼻傳入於心肺也此症初起時甚速又甚重病情與小腸炎無異所不同者無瀉利乃腹中雷聲作脹作痛耳西醫曾剖驗以察臟腑見其肺本體積血而喘氣心亦瘀變其心房與大血管之血則黑而稀與葉氏所謂溫邪上受首先犯肺逆傳心包者隱然若合符節察顏容皮色瘀晦眼罩皮多紅脹憔悴較前尤甚病深者即一睡不醒譫妄狂躁抽搐循衣撮空西醫以為病關腦部若華醫則以為三焦大熱擾亂神明也察其舌色紫苔厚無干裂各狀惟伸出覺難齒垢黑積呼吸氣覺短促病伏在肺則轉為咳嗽病機與小腸炎有分別者小腸炎來勢緩此來勢速也小腸炎傳染較少此則一人病一傢俱病鄰里戚屬沿門闔境靡不相同蓋瘟疫症之類依中醫法仍須分證施治西醫論治與小腸炎相同而多用補身之物若牛羊若雞鴨鴿此則與我國治法有大相鑿枘之處矣復發之熱症西醫以為飢荒復熱症我國則以為伏邪在內纏綿難愈故多復發也發病時無論遠近情狀相同故西醫名之為速傳症一染是症渾身無力便覺冷顫森然隨即頭額疼胸膈痞悶不久即嘔吐清水肚腹不舒或作痛肝脾亦痛脾腫更痛不可忍胃不思食時覺口乾舌潤而有白淡黃苔或絳干或舌尖乾裂舌色純紅舌上起粒或腹瀉或咽痛其四肢腰骨則痠痛難當熱則或早或晏時刻無定病者間或略冷冷後出汗而病不解熱亦不退小便略短睡臥不寧惟衄血則甚多病退後舌苔漸減並有起咳嗽者其咳出之痰甚膠黏略血者亦間有之或血薄腿腫周身發黃孕婦得此病每小産而變危小兒及老人常多不治病後調理尤難復元或頭暈或瀉或紅痢婦人則子宮流血小兒則嘔吐不止或氣管內皮發炎多遷延而成死候即病輕者亦或悠忽而變重症據西醫云治此症宜令其大便隨時不結又不可頻頻瀉之若病者早能求醫宜先與以吐藥令其嘔吐若見津液尚屬無虧則可用發表劑或利小便藥以清水一片開火硝一錢或二錢服之璜謹案西醫此説即中國伏邪在營之證也伏氣病胸脅滿悶小便不利最為常有脘悶多吐黃涎或有痰熱瘀積於吐法尚屬相宜至發表大法須養津降熱俾津通而汗自出因其人陰氣先傷陽邪獨發非此不足以育陰解熱也利水傷陰愈蓋其熱故此病發表利水皆變危症西醫晚出治病僅泥迹象此其一也利水則肌肉焚余曾遇之始嘆王漢階立説之精應時輕重熱症中土謂之溫瘧初起腹脹不舒作悶作嘔頭身皆痛而困倦繼則寒冷非同瘧疾之寒顫稍覺毛豎隨即身熱雖瘧疾極熱亦不及焉其皮則灼熱如燒面紅眼亮頭痛困憊不能眠睡久之必發譫語或有狂妄者必嘔吐不止始嘔宿食繼以清水終則膽汁或紫或黑而腹內覺悶脹舌白唇裂口極渴脈必數有熱六點鐘之久而後減輕者亦有至半日或一日甚至兩三日而減輕者將減時則必發汗汗出熱減減後旋覆熱較重於前按其減候速遲以分症之輕重清早則病略快有午後起熱而夜半減者有夜間起熱而次早減者亦有每日二次午刻發熱夜半熱減減後復熱次早復輕者據西醫皆以為重症謂當邪盛正衰血氣弱皮色必黃瀉血亦常有之久必變為發黃熱症肝脾二部必軟腫小便必短而色深不知此種病悉由伏氣華人謂之化瘧不成執治瘧死板法以治此症危者接踵若能精參葉案細勘溫熱諸書分其在氣在血有汗無汗或清手太陰或治足陽明挾濕者化之液燥者滋之有痰熱者開降而疏泄之此症雖纏綿不十數日而可愈究竟非重症也惟老人小兒及虛甚者患此多死又醫者不可不知耳按此症西醫分為三等曰輕症曰重症曰危症輕者初起身熱四五日無甚加減後則熱之起止俱有定候舌苔黃厚口氣穢濁作悶作嘔頭額骨痛每覺寒毛森動其病初起發汗則身熱略減越日復作時必先惡寒隨即身熱又加夜不成寐或流鼻血及輕咳嗽是也重症身熱甚少輕減一似連綿不斷約第三日腦漿不安則譫語不能理事其舌乾裂皮色發黃甚則瀉紅利此脾肺本體腫大之症多成死候惟漸變輕或化瘧則無妨危症起時與重症相同熱連綿甚熾隨即譫語不能理事昏迷沉睡或初起即現危險之狀譫語發黃諸竅見血或小便閉或吐瀉或紅痢皆由肺病或肝生瘡以致此也據西醫此説以熱熾昏譫則病腦瀉利發黃則病腸病血實為危重之症也此病來因各殊不能混一施治然預後不良多有變痙厥而亡者此則中外醫學家之所公認耳再應時輕重熱症中國秋間濕熱證此候最多華岫云以為不比傷寒之邪一汗即退亦不比溫熱之邪投涼即安者此病是也治之不得其法則告斃甚多取溫熱各書細心體會自能措之裕如辨寒熱傷寒溫熱瘡瘍癆病無不惡寒發熱而皆有不同瘡瘍寒熱周身必有痛處癆病雖潮熱而勢不甚且由咳肺體生病得來不難辨悉風寒外感惡寒發熱無時而勢不甚時疫惡寒有時而勢甚惡寒之後必見發熱熱時自熱而不覺寒寒時自寒而不覺熱非若外感諸病惡寒發熱之相兼也時疫溫熱病由里達表初起皮膚怫鬱則惡寒發熱汗多亦惡寒有但熱不寒者有寒熱往來如瘧者治須以清裡透表為主義其或邪深入里失於攻下成熱深厥深之病反欲擁被向火惡寒而不發熱即熱亦微甚則四肢反厥此雖惡寒實非寒也陽氣為邪所鬱而不通以通郁為主清熱而不冰熱斯為得之裡實者切須攻下使氣通而鬱陽發反大熱而煩渴也此證在惡寒時最難辨其為熱須於九竅察之如目大小眥赤鼻乾唇紅舌苔黃黑燥耳鳴或聾小便黃赤澀痛大便燥結或稀黃極臭或鮮血或心下至少腹有痛不可按處此熱深陽郁之象大抵周身皆見冷證一二處獨見熱病反當以熱證為主反此亦然乃辨寒熱真假之機要也至本系熱證因其平素虛損衰老及大病後攻伐寒涼太過至汗出不止嘔利俱作四肢微厥六脈細濡而惡寒者為陽虛乃攻伐太過所致雖有時當用苓朮參耆寸脈微佐以升柴尺脈微佐以桂附仍宜活法變通須知雖屬陽虛卻從熱證來而陰必虧參耆桂附亦不可過用當佐以護陰藥如白芍麥冬五味之類此證溫補略緩及清補不到則死或過用溫補陽回而陰竭亦死有熱邪退淨神情昏睡口不能食而人事不省者急用溫補自然神清緩補亦死此外更有寒涼太早而成實證之惡寒因熱邪未經傳變胸膈積有痰滯有見其煩躁而遽用知膏芩連者有因其作渴而遽用生地麥冬者有病者自認火證而恣啖冷水西瓜梨薺太早者皆能郁遏陽氣壅閉邪熱遏於中下二焦若冷物停痰滯於上焦每見惡寒症遇此惟以宣導痰滯為主滯通則惡寒自止不可過溫致下焦虛熱為蓄血斑黃厄逆而死不可清涼致胸腹痞悶而危宜用草果厚朴檳榔末香附半夏萊蔔白蔻仁苓澤導痰開滯逐水痰滯去則惡寒止而熱證見證之甚者至膈間冷氣喜大熱飲仍屬熱痰瘀滯心下大劑清解中兼以開痰汗多者白虎湯加旋覆滑石川貝厚朴萊蔔連翹天竺菖蒲瓜蔞半夏清肅開降以通上下之樞機熱邪怫鬱於皮膚更有寒熱往來絶類瘧象又有舌絳純寒無熱者此不關少陽為病或清肺胃或清絡熱當隨其傳變而施以對病之藥蓋傷寒惡寒為重時疫惡寒為輕多有初起惡寒及發熱而惡寒自已者若誤用辛溫及發汗劫津之方禍不旋踵溫病養津須防窒膩溫熱瘟疫宜養陰清潤甘涼甘寒皆養陰之法也然不能透汗不知豁痰開降以和上中二焦則藥雖清潤仍效者少而不效者多故此病除舌乾絳鼻血洛血可用生地二冬元參之屬此外務取清靈妙品若花粉蘆根瓜瓣川貝知母天竺旋覆荸薺梨肉諸清降肺胃等味皆能解熱即皆能生津又當隨症而進退去取務求清熱而不冰閉育陰而不滯邪斯為得之倘徒知育陰而於升降氣機之大法不能探討膈間受陰藥阻隔痰氣一逆神昏目閉痙厥立至矣溫病挾濕用升提則熱熾津枯而變痙多服陰藥濕盛痰升而亦變痙不知者每謂寒涼太過中藏寒生嗚呼豈真由於中藏寒生也哉溫熱瘟疫脈遲脈虛勿認作陰寒溫熱瘟疫傳變後脈症與風寒頗同初起時與風寒迥異風寒從皮毛入一二日脈多浮或兼緊兼緩兼洪而皆浮逮傳入里始不見浮脈其至數亦清楚而不模糊溫熱瘟疫自里出表初起脈多沉逮自里透表脈始不沉乃不浮不沉而數或兼弦兼大至數或不清楚初起脈沉遲勿作陰寒斷沉者邪在裡也遲者邪在陰分也或有汗則脈遲細而虛汗為心液脈為血脈熱邪怫鬱於氣血中借汗而泄心脈不受熱一蒸故遲細而虛其伏邪猶尚在裡乃熱病非陰寒病也脈象雖類陰寒而氣則臭腐色則垢滯或如油膩或如煙燻舌則白厚或白燥或淡黃或粗如積粉或雖有淡薄黃白苔而頗乾燥神情恍惚變常或煩躁或譫語或癡如醉擾亂驚悸輕者雖神氣清明亦能自主仍多浮思幻想夢寐不安閉目即妄有所見此浮思幻想即為譫妄之根原亦即為熱病傷腦之確據所謂舍脈從症也又熱病有脈數而無力者萬勿誤認為虛緣熱蒸氣散脈不能鼓指但當解熱不宜補氣熱清而脈轉為滑數者往往而有設認為虛寒而誤投補劑熱得補而愈熾上下氣機不通熱邪盡攻腦髓馴至痙厥神昏而其人已萬無生理矣故治溫熱溫疫者雖宜辨脈而斷不可執常法以論脈身熱不退治法瘟疫溫熱表證未得汗解里證未得下解或半表半裡未得和解或肺胃熱盛未得疹出或心脾熱盛未得斑出三焦小腸熱盛未得尿利或熱痰結胸未得化吐或濕熱沁肉未用山梔茵陳或新停食於胸胃未得楂朴蔔枳或服寒涼冰閉未得宣透疏泄或濕痰包熱蘊結中焦未得辛香滌穢皆能作身熱不退務加察也大法隨症汗下和解斑疹未出宜涼血透毒生地銀花芥穗牛蒡子之屬是熱盛尿澀宜清降生地滑石知母花粉之屬是熱痰結胸必滿悶小陷胸加入蔥白薤白之屬是寒涼冰閉濕痰蘊結宜溫運溫膽類加蘭草鬱金藿香降香之屬是隨病所宜加入於透汗劑中諸症一解汗自出而熱自退不同傷寒病宜溫散也
