body:
  text: 中西溫熱串解書後萱家世代以醫名屆家嚴而七世矣家嚴承我祖庭訓寢饋於傷寒金匱諸書歷有年所以近世溫熱病證甚多遂益究心溫熱各方籍欲以垂世用而救世急也生平於醫書不惜重價購覓於溫熱獨取王氏五種闡發奧義無間寒署評註王氏醫案數種每於案中要點推闡其所以然之妙用稿經數易猶難自信近以西法正在日新月異時代遂益究心從師訪道垂十多年茲再將舊著論說及舊注溫熱經緯重新刪繁去蕪折中中東西各學說而參以己見囑萱等抄錄以付石印為改良醫學初步書成名曰中西醫學串解世之醫者得書而習之於溫熱辨證大法必益瞭然於心目家君以近腦膜炎甚多考中國醫學發揮腦症者殊少欲纂輯一書以補我國醫學之缺萱雖習聞庭訓以聞家君撰述各書神勞心瘁不留餘力自愧學問簡陋未能分勞謹綴數語聊以自警且以見家嚴精究醫學之苦心云爾時中華民國九年歲在庚申暮春之月男樹萱謹志
