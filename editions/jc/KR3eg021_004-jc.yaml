body:
  text: 卷四葉香岩溫熱論註解溫邪上受首先犯肺逆傳心包華岫云曰風溫濕溫之時感者邪從口鼻而入故曰上受若春溫之由冬時伏寒藏於少陰者又非上受也按傷寒從毛竅而入溫病從口鼻而入二語世莫不奉為定案其實二者皆有而總以從毛竅入者為多南人中焦濕熱素盛一感溫邪即表裡合一遂似全從口鼻而入亦不察之甚也若果盡從口鼻而入何以治法中有汗法乎本文上受二字即內經邪氣在上之義璜按病菌之侵襲由口鼻而入者有之由毛竅而入者亦有之肺癆肺炎疫症之傳染由口鼻而入也溫瘧由肉叉蚊刺螫致瘧疾寄生體入於血中由毛竅而入也傳染病以二者最居多數近世新學說多宗之王士雄曰第四章云不從外解必致里結是由上焦氣分以及中下二焦者為順傳惟包絡上居膻中邪不外解又不下行易於襲入是以內陷營分為逆傳也然則病之順傳天士雖未點出而細釋其議論則以邪從氣分下行為順邪入營分內陷為逆也璜按肺與心包最近依近世解剖學驗之自明惟其近故傳變甚速也而西醫於此症則以為神經障害之特徵我國葉天士先生對此症獨闢蠶叢神驗卓著今且依舊學說解之心主血血屬營溫熱法主清降即從營分內陷而以牛黃丸至寶丹清營湯神犀丹等方湔滌中宮使之由營出氣挽回者實居多數乃是引邪從氣分下行為順之義王氏此解乃治溫熱之要訣也肺主氣屬衛心主血屬營辨營衛氣血雖與傷寒同若論治法則與傷寒大異璜按傷寒初起分在營在衛溫病初起辨在氣在血其實一理也但治法有辛溫辛涼之異耳本論開章即提出肺衛心營為主並以傳心包為逆我國言傳入心包即西國言侵襲延髓也心肺腦為人身最重要之部分凡病之傷人惟心肺腦傳變最速且多粹死醫及病家不悟也凡遇此等病之較重者切勿輕言易治竊願諸同道者細心討論則得耳蓋傷寒之邪留戀在表然後化熱入里溫邪則化熱最速未傳心包邪尚在肺肺合皮毛而主氣故云在表初用辛涼輕劑挾風加薄荷牛蒡之屬挾濕加蘆根滑石之流或透風於熱外或滲濕於熱下不與熱相搏勢必孤矣章虛谷曰傷寒邪在太陽必惡寒甚其身熱者陽郁不伸之故尚未化熱也傳至陽明其邪化熱則不惡寒始可用涼解之法若有一分惡寒仍當溫散蓋以寒邪陰凝故須用麻桂猛劑璜按不惡寒者言其常也若陽明發熱汗多則有背微惡寒之症若溫邪為陽則宜輕散倘重劑大汗而傷津液反化燥火則難治矣璜按溫病所以忌汗之由一語點出然傷寒辛溫發汗取皮膚濈濈微似有汗者佳溫病辛諒解表必須汗多內邪方得外泄此又不可知始初解表用辛涼須避寒凝之品恐遏其邪反不易解也璜按此乃要訣精細殊不可及或遇陰雨連綿濕氣感於皮毛須解其表濕使熱外透易解否則濕閉其熱而內侵病必重矣其挾內濕者清熱必兼滲化之法不使濕熱相搏則易解也不爾風挾溫熱而燥生清竅必干謂水主之氣不能上榮兩陽相劫也濕與溫合蒸鬱而蒙敝於上清竅為之壅塞濁邪害清也其病有類傷寒驗之之法傷寒多有變證溫病雖久在一經不移以此為辨周澄之曰此義世皆以手足經釋之非也傷寒亦有不傳經者但傳經者多溫病傳經者少所以然者邪寒為斂其入以漸進一境即傳一象故變證多溫邪為開重門洞闢初病即常兼二三經再傳而六經已畢故變證少也璜按溫邪在肺鼻竅每多閉塞甚至見風而眼出清涕與辛夷散證大相似用桑葉甘菊山梔皮杏仁薄荷之類輕清以泄風熱每每獲效誤用辛夷散竟有變為昏痙者余臨證時曾遇之前言辛涼散風甘淡驅濕若病仍不解是漸欲入營也璜按津不足者熱邪即易入營而伏邪由營發出者亦恆有之營分受熱則血液被劫心神不安夜甚無寐或斑點隱隱即撤去氣藥璜按據西醫學說此乃神經障害之輕者如從風熱陷入者用犀角竹葉之屬如從濕熱陷入者用犀角花露之品參入涼血清熱方中若加煩躁大便不通金汁亦可加入老年及平素有寒者以人中黃代之急急透斑為要周澄之曰必以氣托斑尤必以津載斑始能透達也章虛谷曰熱入於營舌色必絳風熱無濕者舌無苔或有苔亦薄也熱兼濕者必有濁苔而多痰也然濕在表分者亦無苔其脈必浮細澀王士雄曰仲景論傷寒又可論疫症麻桂達原不嫌峻猛此論溫病僅宜輕解乃上焦之治藥重則過病所璜按此即徐之才輕可去實之義華岫云有云用藥有極輕清極平淡者取效更捷乃溫病常有之治法也若斑出熱不解者胃津亡也周澄之曰熱邪滯著於肌肉而津液不能浮之使出也主以甘寒重則如玉女煎輕則如黎汁蔗漿之類或其人腎水素虧病未及下焦每多先自彷徨必驗之於舌如甘寒之中加入鹹寒務在先安未受邪之地恐其陷入易易耳周澄之曰有本飲須兼微酸以斂固其正氣充盈其津液非僅入鹹寒已也尤拙吾曰蘆根梨汁蔗漿之屬味甘涼而性濡潤能使肌熱除而風自息即內經風淫於內治以甘寒之旨也斑出則邪已透發理當退熱其熱仍不解故知其胃津亡水不濟火當以甘寒生津若腎水虧者熱尤難退故必加鹹寒如元參知母阿膠龜板之類所謂壯水之主以濟陽光也如仲景之治少陰傷寒邪本在經必用附子溫臟即是先安未受邪之地恐其陷入也熱邪用鹹寒滋水寒邪用鹹熱助火藥不同而理法一也驗舌之法詳後王士雄曰此雖先生口授及門之論然言簡意賅不可輕易一字本條主以甘寒重則如玉女煎者如玉女煎之石膏地黃同用以清未盡之熱而救已亡之液以上文曾言邪已入營故變白虎加人參法而為白虎加地黃法不曰白虎加地黃而曰如玉女煎者以簡捷為言耳唐本刪一如字徑作重則玉女煎是印定為玉女煎之原方矣鞠通虛谷因而襲誤豈知胃液雖亡身熱未退熟地牛膝安可投乎余治此證立案必先正名曰白虎加地黃湯斯為清氣血兩燔之正法璜按營氣俱病熱甚者尚有犀角地黃合白虎法不止白虎加地黃湯也地黃合白虎為清熱滋液起見津枯甚者必加入生梨汁生蔗漿同服尤為速效若其人始終在氣分流連者可冀戰汗透邪法宜益胃令邪與汗並熱達腠開邪從汗出周澄之曰邪雖在氣必以津浮之使出故須邪與汗並方能與汗俱出亦須津能浮邪始能邪與汗並也解後胃氣空虛當膚冷一晝夜待氣還自溫暖如常矣璜按汗出膚冷熱病解後此候盡多甚至有如寒厥者但其脈必虛緩精神必安舒粗工不識誤認亡陽妄投溫補者往往或有誤藥變證蜂起每歸咎前醫之過用寒涼一誤再誤轉治轉劇以至於死而真能識病治病者反至受謗余因閱歷備嘗其苦安得病家盡有醫學知識遇此症絕不慌張者乎蓋戰汗而解邪退正虛陽從汗泄故漸膚冷未必即成脫證此時宜安舒靜臥以養陽氣來復旁人切勿驚惶頻頻呼喚擾其元神但診其脈若虛軟和緩雖倦怠不語汗出膚冷卻非脫證周澄之曰此論甚細切凡戰汗之後多有此象但熱邪在氣分似不須戰更不須再三戰必邪入營分方有戰汗即傷寒亦如此況溫熱乎何者凡傷寒戰汗乃正陽為邪氣蹂躪溫補元陽力透重圍故有戰象若溫熱之戰汗必待津液耗燥滯入營分以甘寒扶胃生津如大旱遇雨陰津與亢陽相爭亦作戰也若在氣分則但汗耳何以戰為若脈急疾躁擾不臥膚冷汗出便為氣脫之證矣更有邪盛正虛不能一戰而解停一二日再戰汗而愈者不可不知魏柳洲曰脈象突然雙伏或單伏而四肢厥冷或爪甲青紫欲戰汗也宜熟記之王士雄曰溫熱之邪迥異風寒其感人也自口鼻入先犯於肺不從外解則里結而順傳於胃胃為陽土宜降宜通所謂腑以通為補也故下章即有分消走泄以開戰汗之門戶云云可見益胃者在疏瀹其樞機灌溉湯水俾邪氣松達與汗偕行則一戰可以成功也璜按此論精微之至試觀熱病欲解時飲以燒陽多汗出而熱退即此可悟益胃透汗之法又按腑以通為補一語有至理存焉人身氣機開展消化器泌別器各運用其敷布之權而氣體以和治熱病然非徒治熱病然也西洋醫以大黃黃連龍膽草為補劑即是此意再論氣病有不傳血分而邪傳三焦亦如傷寒中少陽病也彼則和解表裡之半此則分消上下之勢隨時變法璜按溫熱病以清降下行為順濕溫溫瘧尤宜分消其勢或滌痰或解穢或溫運胃中之寒濕而佐以解熱隨時變法具有妙用西醫每以中國言陰陽六氣為不足憑嗚呼舍陰陽六氣而見病治病死守形質能如此靈活通變否邪如近時杏樸苓等類或如溫膽湯之走泄周澄之曰王注此法似指濕溫或其人素有痰飲者苦淡兼微辛乃通腑降濁以宣揚性取降而氣味仍是取輕揚也因其仍在氣分猶可望其戰汗之門戶轉瘧之機括章虛谷曰經言三焦膀胱者腠理毫毛其應而皮毛為腑之合故肺經之邪不入營而傳心包即傳於三焦其與傷寒之由太陽傳陽明者不同傷寒傳陽明寒邪化熱即用白虎等法以陽明陽氣最盛故也凡表裡之氣莫不由三焦升降出入而水道由三焦而行故邪初入三焦或胸脅滿悶或小便不利此當展其氣機雖溫邪不可用寒涼遏之如杏樸溫膽之類辛平甘苦以利升降而轉氣機開戰汗之門戶為化瘧之丹頭此中妙理非先生不能道出以啟後學性靈也不明此理一聞溫病之名即亂投寒涼反使表邪內閉其熱更甚於是愈理而病愈重至死不悟其所以然良可慨也璜按胸脅滿悶小便不利溫熱病中有此二症者最多宣通氣機正是確論惟苦淡微辛除濕熱外宜於清肅滑降通絡蠲痰者殊屬不少皆所以展其氣機也虛谷主以杏樸溫膽施之濕重於熱者尚宜否則難免劫津燥液王士雄曰章氏此釋於理頗通然於病情尚有未協也其所云分消上下之勢者以杏仁開上厚朴宣中茯苓導下似指濕溫或其人素有痰飲者而言故溫膽湯亦可用也試以指南溫濕各案參之自見若風溫留連氣分下文已云到氣才可清氣所謂清氣者但宜展氣化以輕清如梔芩蔞葦等味是也雖不可遽用寒滯之藥而厚朴茯苓亦為禁劑彼一聞溫病即亂投寒涼固屬可慨而不辨其有無濕滯概用枳樸亦豈無遺憾乎至轉瘧之機括一言原指氣機通達病乃化瘧則為邪殺也從此迎而導之病自漸愈奈近日市醫既不知溫熱為何物柴葛羌防隨手浪用且告病家曰須服幾劑柴胡提而為瘧庶無變端病家聞之無不樂從雖至危殆猶曰提瘧不成病是犯真故病家死而無怨醫者誤而不悔彼此夢夢亦可慨夫璜按風溫濕溫伏暑熱病化瘧者甚多皆所謂時瘧也時瘧每偏於熱不甚惡寒早晚發作亦無定候用柴胡羌防等類必至熱邪披猖甚至入營以近世新學說考之乃由肉叉蚊有寄生體因刺螫人體傳染而來此寄生體從患瘧人之血液中或赤血球內檢查而出其寄生體生殖時期即為瘧疾發作時期其有一日兩日三日之瘧疾者皆寄生體之生殖為之也抑顯微鏡之檢查血輪有熱時之寄生體有熱退時之寄生體此項論說為今盛行東西醫學家甚為注意附錄於此以告於我國醫界大凡看法衛之後方言氣營之後方言血周澄之曰有學問有本領不以營衛直屬氣血極是內經言之非一後人每以營衛作氣血之別名者蓋滑口粗心未之加察也此等處即見讀書察證心細如髮在衛汗之可也到氣才可清氣入營猶可透熱轉氣如犀角元參羚羊角等物入血就恐耗血動血直須涼血散血如生地丹皮阿膠赤芍等物否則前後不循緩急之法慮其動手便錯反至慌張矣章虛谷曰凡溫病初感發熱而微惡寒者邪在衛分不惡寒而惡熱小便色黃已入氣分矣若脈數舌絳邪入營分若舌深絳煩擾不寐或夜有譫語已入血分矣邪在衛分汗之宜辛涼輕解直清氣熱不可寒滯反使邪不外達而內閉則病重矣故雖入營猶可開達轉出氣分而解倘不如此細辨施治動手便錯矣先生為傳仲景之道脈迥非諸家立言所及也璜按治溫熱病雖宜用涼解然慮其寒滯宣透法仍不可少王士雄曰外感溫病如此看法風寒諸感無不皆然此古人未達之旨近惟王清任知之若伏暑溫病自里出表乃先從血分而後達於氣分故起病之初往往舌潤而無苔垢但察其脈軟而或弦或微數口未渴而心煩惡熱即宜投以清解營陰之藥殆邪從氣分而化苔始漸平然後再清其氣分可也伏邪重者初起即舌絳咽乾甚有肢冷脈伏之假象宜大清陰分伏邪繼必厚膩黃潤之苔漸生此伏邪與新邪先後不同處更有邪伏深沉不能一齊外出者雖治之得法而苔退舌淡之後逾一二日舌復干絳苔復黃燥正如抽蕉剝繭層出不窮不比外感溫邪由衛及氣自營而血也秋月伏暑證輕淺者邪伏膜原深沉者亦多如此苟閱歷不多未必知其曲折乃爾也附識以告留心醫學者璜按此解字字金玉可為法程又按伏氣病將發未發時類多舌絳發熱後衄血者甚多由營分而達於氣分即此可知又按病由營發益忌辛燥風藥至肢冷脈伏在閱歷未深者遇此未免慌張然既舌絳又屬厥深熱深以熱度表試之肢雖冷而熱度亦高開手即宜大劑清營方免貽誤且吾吳濕熱害人最廣如面色白須要顧其陽氣濕勝則陽微也如法應清涼用到十之六七即不可過於寒涼恐成功反棄何以故耶濕熱一去陽亦衰微也面色蒼者須要顧其津液清涼到十分之六七往往熱減身寒不可就云虛寒而投補劑恐爐煙難熄灰中有火也須細察精詳方少少與之慎不可直率而往也璜按此先生之慎重用藥也清涼慮損陽補劑慮助火病機到此惟育陰略佐溫運透濕為善後妙法又有酒客里濕素盛外邪入里里濕為合在陽旺之軀胃濕恆多在陰盛之體脾濕亦不少然其化熱則一熱病救陰猶易通陽最難救陰不在血而在津與汗通陽不在溫而在利小便然較之雜證則有不同也周澄之曰二語為治溫病中半截要著與前透風滲濕同一本領下節攻裡是後半截要著也璜按泄陽分之邪熱即所以救陰利陰分之濕寒即所以通陽仲景竹葉石膏湯麻黃湯五苓散即是此意二語直從傷寒論精研而出特在溫熱病門用藥有不同耳再論三焦不得從外解必致成里結里結於何在陽明胃與腸也亦須用下法不可以氣血之分就不可下也但傷寒邪熱在裡劫爍胃津下之宜猛此多濕邪內搏下之宜輕周澄之曰濕邪最濡滯來緩去亦緩在表不可猛汗在裡不可猛下傷寒大便溏為邪已盡不可再下濕溫病大便溏為邪未盡必大便硬慎不可再攻也以糞燥為無濕矣王士雄曰傷寒化熱固是陽邪濕熱凝滯者大便雖不幹枯黑如膠漆者有之豈可目為陰邪謂之濁邪可也璜按傷寒大便溏雖梔子豉湯亦所禁用若溫病之大便秘宜大劑清解至氣機通暢以後仍下膠糞而不幹結且黏臭異常切不可以糞溏而謂中虛再人之體脘在腹上其地位處於中按之痛或自痛或痞脹當用苦泄以其入腹近也必驗之於舌或黃或濁可與小陷胸湯或瀉心湯隨症治之或白不燥或黃白相兼或灰白不渴慎不可亂投苦泄其中有外邪未解里先結者或邪郁未伸或素屬中冷者雖有脘中痞悶宜從開泄宣通氣滯以達歸於肺如近世之杏蔻橘桔等是輕苦微辛具流動之性可耳章虛谷曰此言苔白為寒不燥則有痰濕其黃白相兼灰白而不渴者皆陽氣不化陰邪壅滯故不可亂投苦寒滑泄以傷陽也其外邪未解而里先結故苔黃白相兼而脘痞皆宜輕苦微辛以宣通其氣滯也王士雄曰凡視溫證必察胸脘如拒按者必先開泄若苔白不渴多挾痰濕輕者橘蔻菖薤重者枳實連夏皆可用之雖舌絳神昏但胸下拒按即不可率投涼潤必參以辛開之品始有效也璜按腹痛或脹伏氣病初發有之病後亦有之相其在氣在營於當用方中加入百合丹參川楝橘紅檀香樸花之屬往往獲效又按伏暑病脘悶作嘔者居多不先開泄變成昏迷及結胸者往往而有若舌乾絳於清營養液方中亦須佐以辛開之品再前云舌黃或濁須要有地之黃若光滑者乃無形濕熱中有虛象大忌前法周澄之曰以有地無地分有形無形虛字即指無形即膻中氣分空虛處也其臍以上為大腹或滿或脹或痛此必邪已入里矣表證必無或十隻存一亦須驗之於舌或黃甚或如沉香色或如灰黃色或老黃色或中有斷紋皆當下之如小承氣湯用檳榔枳實青皮元明粉生首烏等若未見此等舌不宜用此等法恐其中有濕聚太陰為滿或寒濕錯雜為痛或氣壅為脹又當以別法治之王士雄曰章氏以白為寒非大溫其濕不去是也然苔雖白而不燥還須問其口中和否如口中自覺黏膩則濕漸化熱僅可用厚朴檳榔等苦辛微溫之品口中苦渴者邪已化熱不但大溫不可用必改用淡滲苦降微涼之劑矣或渴喜熱飲者邪雖化熱而痰飲內盛也宜溫膽湯加黃連璜按腹脹痛溫熱病初起亦有之有用通絡搜邪熱發而脹痛尋止者此乃伏邪由里出表之象璜曾數見之非太陰證也至云濕聚太陰為滿或寒溫雜證為痛等夫脹滿乃腸胃之病太陰為脾據仲景傷寒論亦以寒濕脹滿為太陰之病蓋以寒邪因氣體之傳變而異陽勝則入陽明之腑陰勝而入太陰之藏與本節所云濕聚太陰為滿者病形來源雖不同而濕動太陰之證則無不同也西說以脾主收聚往來餘剩之血以寬閒動脈而保護臟腑有發生白血輪之作用熱證傳染病或因赤血球破壞其分解物與血液熱入脾臟而刺激之則脾血管擴張充血脾髓組織增生而成脾腫此病頗多我國醫學無此精切合附錄之又按臍上為大腹乃胃也非太陰之部位太陰脾連於甜肉經即膵臟也主其甜汁助膽汁以消食物或者脾病甜肉經為之障礙因之消化不良胃部脹滿故名之為太陰證乎特存其說以資考證再黃苔不甚厚而滑者熱未傷津猶可清熱透表若雖薄而乾者邪雖去而津受傷也苦重之藥當禁宜甘寒輕劑可也再論其熱傳營舌色必絳絳深紅色也初傳絳色中兼黃白色此氣分之邪未盡也泄衛透營兩和可也純絳鮮色者包絡受病也宜犀角鮮生地連翹鬱金石菖蒲等延之數日或平素心虛有痰外熱一陷里絡就閉非菖蒲鬱金等所能開須用牛黃丸至寶丹之類以開其閉恐其昏厥為痙也何報之曰溫熱病一發便壯熱煩渴舌心赤而有白苔者雖滑仍當清裡切忌表藥章虛谷曰純絳鮮澤者言無苔色則胃無濁垢而邪已入營其熱在心包也若平素有痰必有舌苔其心虛血少者舌色多不鮮赤或淡晦無神邪陷多危而難治於此可卜吉凶也宜牛黃丸痰濕盛而有垢濁之苔者宜至寶丹璜按邪陷心包即西醫所謂神經中樞被細菌侵害之症也此症輕者頭痛不安意識混濁重者或昏譫或昏痙不知人舌絳者用牛黃丸神犀丹多愈舌淡晦者雖神氣半明半昧每每變生不測不可不知再色絳而舌中心乾者乃心胃火燔劫爍津液即黃連石膏亦可加入若煩渴煩熱舌心干四邊色紅中心或黃或白者此非血分也乃上焦氣熱爍津急用涼膈散散其無形之熱再看其後轉變可也慎勿用血藥以致滋膩留邪至舌絳望之若干手捫之原有津液此津虧濕熱薰蒸將成濁痰矇蔽心包也王士雄曰熱已入營則舌色絳胃火灼液則舌心干加黃連石膏於犀角生地等藥中以清營熱而救胃津即白虎加生地之例也其舌四邊紅而不絳中兼黃白而濁故知其熱不在血分而在上焦氣分當用涼膈散清之勿用血藥引入血分反難解散也蓋胃以通降為用若營熱蒸其胃中濁氣成痰不能下降反上熏而矇蔽心包望之若干捫之仍濕者是其先兆也璜按此節辨在氣在營及邪時侵擾神明之候尤為精到蓋人身機括惟心營肺氣及中樞神經最為重要其死人也動在俄頃濕熱初病多在肺次在營又次則擾及神經謂非由口鼻傳染而不可也以生活最關係之肺臟心臟及腦神經因熱病而波累而及偶一誤治對於生命遂有不良之結果醫者遇此尤當心細如髮膽大於身方足以生死人而肉白骨葉氏此論辨在氣忌用血藥辨在營須清熱育陰又恐穢濁矇蔽神明以舌望之若干手捫之原有津液為濁邪害清先事預防之播告際此時幾尤須於當用藥中加芳香開竅諸品以泄穢毒而展神明易曰知幾其神乎吾於葉天士先生而有以識之也再有熱傳營血其人素有瘀傷宿血在胸膈中其舌色必紫而暗捫之濕當加入散血之品如琥珀丹參桃仁丹皮等不爾瘀血與熱為伍阻遏正氣遂變如狂發狂之證若紫而腫大者乃酒毒衝心若紫而干晦者腎肝色泛也難治章虛谷曰舌紫而暗暗即晦也捫之潮濕不幹故為瘀血其晦而乾者精血已枯邪熱乘之故為難治腎色黑肝色青青黑相合而見於舌變成紫晦故曰腎肝色泛也酒毒衝心急加黃連清之舌色絳而上有黏膩似苔非苔者中挾穢濁之氣急加芳香逐之舌絳欲伸出口而抵齒難驟伸者痰阻舌根有內風也舌絳而光亮胃陰亡也急用甘涼濡潤之品若舌絳而乾燥者火邪劫營涼血清火為要舌絳而有碎點白黃者當生疳也大紅點者熱毒乘心也用黃連金汁其有雖絳而不鮮乾枯而萎者腎陰涸也急以阿膠雞子黃地黃天冬等救之緩則恐涸極而無救也章虛谷曰挾穢者必加芳香以開降胃中濁氣而清營熱矣痰阻舌根由內風之逆則開降中又當加辛溫咸潤以息內風也脾腎之脈皆連舌本亦有脾腎氣敗而舌短不能伸者其形貌面色亦必枯瘁多為死症不獨風痰所阻之故也其舌不鮮乾枯而萎腎陰將竭亦為危症而黃連金汁並可治疳也璜按舌短難驟伸死症恆多風痰所阻特間有之耳余曾診兩人一絳干顫動而難伸一舌萎縮濕膩苔布滿而難伸均於診後一二日死王士雄曰光絳而胃陰亡者炙甘草湯去薑桂加石斛以蔗漿易飴糖干絳而火邪劫營者晉之犀角地黃湯加元參花粉紫草銀花丹參蓮子心竹葉之類若尤氏所云不能飲冷者乃胃中氣液兩亡宜復脈原方其有舌獨中心絳乾者此胃熱心營受灼也當於清胃方中加入清心之品否則延及於尖為津干火盛也舌尖絳獨干此火心上炎用導赤散瀉其腑章虛谷曰其干獨在舌心舌尖又有熱邪在心與胃之別尖獨干是心熱其熱在氣分者必渴以氣熱劫津也熱在血分其津雖涸其氣不熱故口乾而不渴也多飲能消水者為渴不能多飲但欲略潤者為干又如血分無熱而口乾者是陽氣虛不能生化津液與此大不同也王士雄曰舌心是胃之分野舌尖乃心之外候心胃兩清即白虎加生地黃連犀角竹葉蓮子心也津干火盛者再加西洋參花粉梨汁蔗漿可耳火上炎者導赤散入童溲尤良再舌苔白厚而乾燥者此胃燥氣傷也滋潤藥中加甘草令甘守津還之意舌白而薄者外感風寒也當疏散之若舌乾薄者肺津傷也加麥冬花露蘆根汁等輕清之品為上者上之也若白苔絳底者濕遏熱伏也當先泄濕透熱防其就干也勿憂之再從里透於外則潤變矣初病舌就干神不昏者急加養正透邪之藥若神已昏此內匱矣不可救藥章虛谷曰苔白而厚本是濁邪乾燥傷津則濁結不能化故當先養津而後降濁也肺位至高肺津傷必用輕清之品方能達肺若氣味厚重而下走則反無涉矣故曰上者上之也濕遏熱伏必先用辛開苦降以泄其濕濕開熱透故防舌乾再用苦辛甘涼從里而透於外則胃氣輸布舌即變潤自能作汗而熱邪亦可隨汗而解若初病舌即干其津液素竭也急當養正略佐透邪若神已昏則本元敗而正不勝邪不可救矣王士雄曰有初起舌乾而脈滑脘悶者乃痰阻於中而液不上潮未可率投補益也璜按白苔絳底或厚黃苔絳底秋後伏熱證多見之乃營分之熱受膈間濕邪矇蔽也見此舌詢之無不脘悶此證滋液則助痰運濕則益熱用升提則神昏久服元參生地二冬等類則動中宮之濕痰氣升浮氣道不利陰霾蔽天往往氣逆眼吊肢冷神呆而死溫熱病雖宜育陰獨於此證則宜慎又不拘何色舌上生芒刺者皆是上焦熱極也當用青布拭冷薄荷水揩之即去者生旋即生者險矣生芒刺者苔必焦黃或黑無苔者舌必深絳其苔白或淡黃者胃無大熱必無芒刺或舌尖或兩邊有小赤瘰是營熱鬱結當開泄氣分以通營清熱也宜涼膈散主之舌苔不燥自覺悶極者屬脾濕盛也或有傷痕血跡者必問曾經搔挖否不可以有血而便為枯證仍從濕治可也再有神情清爽舌脹大不能出口者此脾濕胃熱鬱極化風而毒延口也用大黃磨入當用劑內則舌脹自消矣何報之曰凡中宮有痰飲水血者舌多不燥不可誤認為寒也周澄之曰此即前舌絳難伸痰阻內風之證一為縮急一為脹大前人有用生蒲黃末塗舌者大致總不外苦辛開痰降熱也再舌上白苔黏膩吐出濁厚涎沫口必甜味也為脾癉病乃濕熱氣聚與穀氣相搏土有餘也盈滿則上泛當用省頭草芳香辛散以逐之則退若舌上苔如鹼者胃中宿滯挾濁穢鬱伏當急急開泄否則閉結中焦不能從膜原出矣章虛谷曰脾癉而濁泛口甜者更當視其舌本如紅赤者為熱當辛通苦降以泄濁如色淡不紅由脾虛不能攝涎而上泛當健脾以降濁也苔如鹼者濁結甚故當急急開泄恐內閉也璜按脾癉多由痰涎聚於胸脘甚者如有物憑焉寒熱將發每從痰食結聚處而出胸脘冷則肢體淅淅惡寒胸脘溫則肢體翕翕發熱是證余曾治之大概以辛香逐穢溫運除痰立法周澄之曰溫病必察胸脘如拒按者即舌絳神昏亦宜辛苦開泄不可率投甘潤緣甘寒清潤之藥得大熱煎熬其膏液即化為膠涎結於脘中矣惟胃燥津傷乃可以甘潤養胃為其胃中本虛也王士雄曰濁氣上泛者涎沫厚濁小溲黃赤脾虛不運者涎沫稀黏小溲清白見症迥異虛證宜溫中以攝液即理中湯或四君加益智之類可也何亦以降濁為言乎疏矣若舌無苔而有如煙煤隱隱者不渴肢寒知挾陰病如口渴煩熱平時胃燥舌也不可攻之若燥者甘寒益胃若潤者甘溫扶中此何故外露而里無也章虛谷曰凡黑苔大有虛實寒熱之不同即黃白之苔因食酸味其色即黑尤當問之其潤而不燥舌色並不紫赤或無苔如煙煤者正是腎水來乘心火其陽虛極矣若黑而燥裂者火極變水色如焚木成炭而黑也虛實不辨死生反掌耳周澄之曰舊注舌黑有因食酸味又食橄欖令舌黑枇杷令舌黃不可誤以為病也大黃亦令舌黃更能令小便黃赤此等俱宜平時細心察之若舌黑而滑者水來剋火為陰證當溫之若見舌縮此腎氣竭也為難治欲救之加人參五味勉希萬一舌黑而乾者津枯火熾急急瀉南補北若黑燥而中心厚焙者急以鹹苦下之何報之曰發熱症夾血多有中心黑潤者勿誤作陰證治之章虛谷曰黑苔而虛寒者非桂附不可治佐以調補氣血隨宜而施若黑燥無苔胃無濁邪故當瀉南方之火補北方之水仲景黃連阿膠湯主之黑燥而中心厚者胃濁邪熱乾結也宜用硝黃鹹苦下之矣璜按舌至黑苔最為危候此節辨寒熱虛實具見明晰再以脈症參之病無遁情矣以至危之候真能辨虛實寒熱多可起死回生奈今之學西醫者每鄙中醫之言寒熱虛實為陳羹土飯嗚呼其然豈其然乎周澄之曰王注云更有陰虛舌黑者苔不甚燥口不甚渴其舌甚赤或舌心雖黑無甚苔垢舌本枯而不甚赤症雖煩渴便秘腹無滿痛神不甚昏俱宜壯水滋陰不可以為陰證也若黑苔望之雖燥而生刺但渴不多飲或不渴其邊或有白苔舌本淡而潤者亦屬假熱治宜溫補若舌心並無黑苔舌根有黑苔而燥者宜下之以熱在下焦也若舌本無苔惟尖黑燥為心火自焚不治按此死血攻心也此段論黑苔為葉氏所未及故附錄之舌淡紅無色或干而色不榮者當是胃津傷而氣無化液也宜炙甘草湯不可用寒涼藥何報之曰紅嫩如新生望之似潤而燥渴殆甚者為妄行汗下以致津液竭也章虛谷曰淡紅無色心脾氣血素虛也更加干而色不榮胃中津氣亦亡也故不用苦寒藥炙甘草湯養氣血以通經脈其邪自可漸去矣璜按邪在氣多淡紅邪在血多深紅干而色不榮不徒津亡兼傷其血矣此等候不宜徒診舌須兼脈症辨之若苔白如粉而滑四邊色紫絳者溫疫病初入膜原未歸胃腑急急透解莫待傳陷而入為險惡之病且見此舌者病必見凶須要小心凡斑疹初見須用紙捻照見胸背兩脅點大而在皮膚之上者為斑或云頭隱隱或瑣碎小粒者為疹又宜見小而不宜見多按方書謂斑色紅者屬胃熱紫者熱極黑者胃爛然亦必看外證所合乃可斷之章虛谷曰溫疫白如積粉之厚其穢濁重也舌本紫絳則邪熱為濁所閉故當急急透解王士雄曰溫熱病舌絳而白苔滿布者宜清肅肺胃更有伏痰內盛神氣昏瞀者宜開痰為治黑斑藍斑亦有可治者璜按溫疫斑疹東醫名為猩紅熱西醫以為嚕哂噢拉我國則以為熱毒鬱於血中當汗不汗當下不下火盛不解釀成是證也病之初起舌之邊緣有強度發赤中央部及基底部被以帶青灰白色及灰白黃色之苔前兆期多有劇烈之惡寒反復或一回之戰慄開其端在小兒每發全身痙攣體溫升騰達於三十九度或四十度噁心嘔吐心悸亢進全身倦憊頭痛咽喉亦或痛甚至嚥下困難此等症疫咳假痘小腸壞症盛行時多有之藍斑少見黑斑半出半隱必兼喉嚨極腫每多潰爛朽腐內致流血自內胃肉皮起流入小腸內皮下入溺管內皮多成死候然而春夏之間濕病俱發疹為甚且其色要辨如淡紅色四肢清口不甚渴脈不洪數非虛斑即陰斑或胸微見數點面赤足冷或下利清穀此陰盛格陽於上而見當溫之章虛谷曰此專論斑疹不獨溫疫所有且有虛實之迥別也然火不郁不成斑疹若虛火力弱而色淡四肢清者微冷也口不甚渴脈不洪數其非實火可徵矣故曰虛斑若面赤足冷下利清穀此陰寒格拒其陽於外內真寒外假熱鬱而成斑故直名為陰斑也須附桂引火歸元誤投涼藥即死實火誤補亦死最當詳辨也璜按陰證發斑狀如蚊跡多出胸背手足間但稀少而淡紅身雖熱而安靜以其人元氣素弱心腎有虧當補不補則陰凝不解或服涼藥太過以致變成陰證寒鬱於下逼其無根失守之火聚於胸中薰灼脾胃傳於皮膚而發斑點此證宜溫補托邪西醫不識也嘗考西醫全書云亦有尋常症於行病之後忽見甚危者其脈極弱症已回散身冷逾數時即死者此即葉氏所謂陰斑也又云嘗有周身腫脹復積水成臌症者其小便短少色黑內有瘀血尿濁重而多蛋白嘔瀉齊至頭痛困倦無神身熱時輕時重脈遲而散亂此為出疹臌症抑又死症也其所以然之故不盡由內腎壞所致亦因肺與小腸有病而然又有尿清白而極少或數日無小便者此則內腎伏毒必覺眼矇昏迷不醒與抽筋隨則因腦流血而斃或肺腫脹而絕或精力耗盡而死此二證熱本不甚以其元氣素弱不能送毒外出致成種種危候所云久病之虧窮必及腎亦即陰證發斑之類耳故治此證誤涼誤補均有大害全在醫者心有靈犀當機立斷乃能起死回生余嘗治一王姓疹後疹未全收身微熱面色無華喉中痰聲漉漉脈象虛弱醫者猶用清熱通套之品余獨排眾議投以王清任可保立蘇湯而熱退痰收嗚呼醫豈易言哉方見醫林改錯若斑色紫而小點者心包熱也點大而紫胃中熱也黑斑而光亮者熱勝毒盛雖屬不治若其人氣血充實或依法治之尚可救若黑而晦者必死若黑而隱隱四旁赤色火鬱內伏大用清涼透發間有轉紅或可救者若夾斑帶疹皆是邪之不一各隨其部而泄然斑屬血者恆多疹屬氣者不少斑疹皆是邪氣外露之象發出宜神清氣爽為外解里和之意如斑疹出而昏者正不勝邪內陷為患或胃津內涸之故章虛谷曰此論實火之斑疹也點小即是從血絡而出之疹故熱在心包點大從肌肉而出為斑故熱在胃黑而光亮者元氣猶充故或可救黑暗則元氣敗必死矣四旁赤色其氣血尚活故可透發也斑疹夾雜經胃之熱各隨其部而外泄熱邪入胃本屬氣分見斑則邪屬於血者多矣疹從血絡而出本屬血分然邪由氣而閉其血方成疹也必當兩清氣血以為治也既出而反神昏則正不勝邪而死矣璜按斑疹病毒西醫以為在血液淚液鼻喉頭及氣管枝分泌物迨疹之既發串連成片周身紅紫舌苔黃厚色紅起泡日間心神慌亂夜裡常譫語以實證論實不無在氣在血之分惟察其皮肉積血頗多故治法尤以清血為要此等症常隨疫咳假痘小腸炎等而發生或來熱度之升騰或見心臟之衰弱或顯呈腦障害之症狀常由熱度過高兼心腦兩症狀而死間有尿中含多量蛋白質起腎臟圓柱及血液之排泄尿量減少體溫升騰則又有內腎炎之發生於此則乏尿後則發尿毒症而斃命蓋溫熱中之斑疹其關係有如此者再有一種白㾦小粒如水晶色者此濕熱傷肺邪雖出而氣液枯也必得甘藥補之或未至久延傷及氣液乃濕鬱衛分汗出不徹之故當理氣分之邪或白如枯骨者多凶為氣液竭也王士雄曰濕熱之邪鬱於氣分失於輕清開泄幸不傳及他經而從衛分發白㾦者治當清氣分之餘邪邪若久郁雖化白㾦而氣機隨之以泄故宜甘濡以補之苟色白如枯骨者雖補以甘藥亦恐不及也楊素園曰濕熱素盛者多有此症然在溫病中為輕症不見有他患其白如枯骨者未經閱歷不敢臆斷汪謝城曰白㾦前人未經細論此條之功不少白如枯骨者余曾見之非惟不能救並不及救故俗醫一見白㾦輒以危言恐嚇病家其實白如水晶色者絕無緊要吾見甚多然不知甘濡之法反投苦燥升提則不枯者亦枯矣璜按白如枯骨必兼發喘此死症也余臨證時曾見之再溫熱病看舌之後亦須驗齒齒為腎之餘齦為胃之絡熱邪不燥胃津必耗腎液且二經之血皆走其地病深動血結瓣於上陽血者色必紫紫如干漆陰血者色必黃黃如醬瓣陽血若見安胃為主陰血若見救腎為要然豆瓣色者多險若症還不逆者尚可治否則難治矣何以故耶蓋陰下竭陽上厥也章虛谷曰腎主骨齒為骨之餘故齒浮齦不腫者為胃火水虧也胃脈絡於上齦大腸脈絡於下齦皆屬陽明故牙齦腫痛為陽明之火若濕入胃則必連及大腸血循經絡而行邪熱動血而上結於齦紫者為陽明之血可清可瀉黃者為少陰之血少陰血傷為血竭其陽上亢而氣厥逆故為難治璜按此節言齒齦紫黃據初病言耳若久病黃者為多余曾治黃氏婦神氣昏沉面黃唇黃齒齦黃而無熱自汗出脈浮虛牙關緊急不開延四日矣小便時下三日前大便溏泄一次因思此病全屬虛證然見其面有慘狀身無厥冷汗出脈虛又屬可治因仿張令韶案令按其腹病者似覺痛苦手足抽動再接兩次俱然斷為大實有虛象用大承氣下之汗收噤開身能轉側神氣未清再投以復脈湯去薑桂加紫雪丹遂愈復用養營理中善後而痊愈然則齦黃豈盡少陰血傷耶附此備考齒若光燥如石者胃熱甚也若無汗惡寒衛偏勝也辛涼泄衛透汗為要若如桔骨色者腎液桔也為難治若上半截潤水不上承心火上炎也急急清心救火俟枯處轉潤為妥章虛谷曰胃熱甚而反惡寒者陽邪內郁表氣不通故無汗而為衛氣偏勝當泄衛以透發其汗則內熱即從表散矣凡惡寒而汗出者為表陽虛腠理不固雖有內熱亦非實火矣齒燥有光者胃津雖干腎氣未竭也如枯骨者腎亦敗矣故難治也上半截潤胃津養之下半截燥由腎水不能上滋其根而心火燔灼故急當清心救水仲景黃連阿膠湯主之璜按白如枯骨大劑養肝腎之陰亦有愈者若咬牙齧齒者濕熱化風痙病但咬牙者胃熱走其絡也若咬牙而脈症皆衰者胃虛無谷以內榮亦咬牙也何以故耶虛則喜實也舌本不縮而硬而牙關咬定難開者此非風痰阻絡即欲作痙證用酸物擦之即開木來泄土故也章虛谷曰牙齒相齧者以內風鼓動也但咬不齧者熱氣盛而絡滿牙關緊急也若脈症皆虛胃無谷養內風乘虛襲之入絡而亦咬牙虛而反見實象是謂虛則喜實當詳辨也又如風痰阻絡為邪實其熱盛化風欲作痙者或由傷陰而挾虛者皆當辨也若齒垢如灰糕樣者胃氣無權津亡濕濁用事多死而初病齒縫流清血痛者胃火沖激也不痛者龍火內燔也齒焦無垢者死齒焦有垢者腎熱胃劫也當微下之或玉女煎清胃救腎可也章虛谷曰齒垢由腎熱蒸胃中濁氣所結其色如灰糕則枯敗而津氣俱亡腎胃兩竭惟有濕濁用事故死齒縫流清血因胃火者出於齦胃火沖激故痛不痛者出於牙根腎火上炎故也齒焦者腎水枯無垢則胃液竭故死有垢者火盛而氣液未竭故審其邪熱甚者以調胃承氣微下其胃熱腎水虧者玉女煎清胃滋腎可也再婦人病溫與男子同但多胎前產後以及經水適來適斷大凡胎前病古人皆以四物加減用之謂護胎為要恐來害娠如熱極用井底泥藍布浸冷覆蓋腹上等皆是保護之意但亦要看其邪之可解處用血膩之藥不靈又當省察不可認板法然須步步保護胎元恐損正邪陷也章虛谷曰保護胎元勿使邪熱入內傷胎也如邪猶在表分當從開達外解倘執用四物之說則反因邪入內輕病變重矣故必審其邪之淺深而治為至要也若邪熱迫胎急清內熱為主如外用泥布等蓋覆恐攻熱內走反與胎礙更當詳審勿輕用也總之清熱解邪勿使傷動其胎即為保護若助氣和氣以達邪猶可酌用其補血膩藥恐反遏其邪也且內經曰婦人重身毒之何如岐伯曰有故無殞亦無殞也大積大聚其可犯也衰其大半而止不可過也故如傷寒陽明實熱證亦當用承氣下之邪去則胎安也蓋病邪淺則在經深則在腑而胎繫於臟攻其經腑則邪當其藥與臟無礙若妄用補法以閉邪則反害其胎矣倘邪已入臟雖不用藥其胎必殞而命難保所以經言有故無殞者謂其邪未入臟攻其邪亦無殞胎之害也故要其在辨證明晰用法得當非區區四物所能保胎者也故先生曰看其邪之可解處不可任板法至哉言乎璜按孕婦患溫熱證按證施治較常人尤須多用大劑急奪其熱即所以保其胎若遲疑貽誤以致腹痛如椎腰痛如折服藥已無及矣溫熱病多損胎痢疾亦多墮胎胎墮後神氣昏沉手足厥冷者多死古云需者事之賊醫者病家慎勿以假小心誤事也至於產後之法按方書謂慎用苦寒恐傷其已亡之陰也然亦要辨其邪能從上中解者稍從證用之亦無妨也不過勿犯下焦且屬虛體當如虛怯人病邪而治總之無犯實實虛虛之禁況產後當氣血沸騰之候最多空竇邪勢必乘虛內陷虛處受邪為難治也徐洄溪曰產後血脫孤陽獨旺雖石膏犀角對症亦不禁用而世之庸醫誤信產後宜溫之說不論病證皆以辛熱之藥戕其陰而益其火無不立斃我見甚多葉案中絕無此弊足徵學有淵源魏柳洲曰近時專科及庸手遇產後一以燥熱溫補為事殺人如麻璜按產後患溫熱病者最多直按證施治蓋陰血素虧溫邪易於感受也吳鞠通解產難王孟英產後各醫案均可為法程又有一種產褥熱者其故因產婆處置產婦或褥婦之時消毒未曾嚴密有毒之黴菌由產婆或產婦之手及器具布片等物帶入產門以內自子官傷部竄入血中遂發為病其症有敗血與膿毒兩種敗血症者該毒菌為淋巴管所吸收先犯生殖器次及腹膜遂為害於全身多發於產後第一日至第三日始則惡寒戰慄無何即發三十九至四十一度之大熱脈搏頻數先在百二十至以上繼則熱候不正或低至三十八九度清晨尤低僅僅三十七八度惟脈搏疾駛如故病婦頭痛口渴食欲減損身體倦怠時或精神朦朧腹部始而脹滿疼痛加劇嘔惡頻仍呼吸短促脈搏增進多至百四十或百六十呼吸異常困苦精神昏瞀或發譫語亦有至死精神毫無變異者症狀至此終歸於死更有一種麻痹症狀病人毫不覺痛亦不知病之危篤而轉自覺爽適惟脈搏之數幾不能數我國醫者所云七極八死也頃之四肢逐漸厥冷容貌不良言語艱澀遂至於死其遷延久長者雖幸得保其生命然毒質一旦達於肋膜肺臟心臟腦部等現危險之症狀亦屬不治凡罹此病之產婦或褥婦鮮有不死亡者如脈搏過百四十兼發腦症嘔吐劇甚其危急尤可知若經一星期而腹膜炎尚不顯著或略有治愈之望膿毒輕者毒菌系自靜脈傳入而播及心肺脾肝腎諸臟腑使此等之組織逐漸潰爛為膿此外尚有侵及時膜眼球腦部關節等者多發於產後第一星期之終或第二星期之中其無腹膜炎者每以惡寒戰慄而始壯熱如前一二時後全身發汗乃漸下降經一二日或數時後寒戰如故壯熱又如故一若瘧疾之發熱然發作後之熱度每較尋常為低亦有止於常度者然設於同時犯數多之臟腑則大熱無解退之時其症隨所犯之臟腑而異犯肺則咳嗽不已頻咯血痰犯肝則發劇烈之黃疸犯腎則小便減少排蛋白尿或血尿等犯心亦如敗血症但病情之變化最多發則往往寒戰熱候異常下降脈細而數不安不眠昏睡諸腦症狀發生極多又有患腦膜炎而來頭痛項直及全身痙攣諸症狀者犯眼球則化膿而發劇痛因而失明者犯關節則脹痛異常以上兩種證候有僅具其一者有合併而至者有中途變遷者但兩證相較猶以膿毒一證較為佳良死亡亦較少預防之法總宜消毒若既發生應速醫治腹部疼痛用炒黑楂肉一二兩砂糖酌量體力衰脫進牛乳肉汁葡萄酒等大便秘結大劑潤血施灌腸法陰部速以淡石灰酸水洗滌傷處塗沃度酒等體壯發熱西國用退熱藥我國則和血清熱行瘀譫語虛脫用樟腦一分三釐白糖五分研和分五包每二時服一包如經水適來適斷邪將陷血室少陽傷寒言之詳悉不必多贅但數動與正傷寒不同仲景立小柴胡湯提出所陷熱邪參棗扶胃氣以衝脈隸陽明也此與虛者為合治若熱邪陷入與血相結者當從陶氏小柴胡湯去參棗加生地桃仁楂肉丹皮或犀角等若本經血結自甚必少腹滿痛輕者刺期門重者小柴胡湯去甘藥加延胡歸尾桃仁挾寒加肉桂心氣滯者加香附陳皮枳殼等然熱陷血室之證多有譫語如狂之象防是陽明胃實血結者身體必重非若陽明之輕旋便捷者何以故耶陰主重濁絡脈被阻側旁氣痹連胸背皆拘束不遂故去邪通絡正合其病往往延久上逆心胞胸中痹病即陶氏所謂血結胸也王海藏出一桂枝紅花湯加海蛤桃仁原是表裡上下一盡終解之理看此方大有巧手故錄出以備學者之用章虛谷曰數動未詳或數字是變字之誤更俟明者正之衝脈為血室肝所主其脈起於氣街氣街陽明胃經之穴故又隸屬陽明也邪入血室仲景分淺深而立兩法其邪深者云如結胸狀譫語者刺期門隨其實而瀉之是從肝而瀉其邪亦即陶氏所謂血結胸也其邪淺者云往來寒熱如瘧狀而無譫語用小柴胡湯是從膽治也蓋往來寒熱是少陽證故以小柴胡散提少陽之邪則血室之熱亦可隨之外出以肝膽為表裡故深則從肝淺則從膽以導泄血室之邪也今先生更詳症狀並採陶氏王氏之方法與仲景各條合觀誠為精細周至矣其言小柴胡湯惟虛者為合法何也蓋傷寒之邪由經而入血室其胃無邪故可用參棗若溫熱之邪先已犯胃後入血室故當去參棗惟胃無邪及中虛之人方可用之耳須知傷寒之用小柴胡者正防少陽經乘虛入胃故用參棗先助胃以御之其與溫熱之邪來路不同故治法有異也王士雄曰溫邪熱入血室有三證如經水適來因邪陷入而搏結不行者此宜破其血結若經水適斷而邪乃乘血舍之空虛以襲之者宜養營以清熱其邪熱傳營逼血妄行致經未當期而至者宜清熱以安營
