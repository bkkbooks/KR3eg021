body:
  text: 卷八余師愚疫病篇論疫與傷寒似同而異疫證初起有似傷寒太陽陽明證者然太陽陽明頭痛不至如破而疫則頭痛如劈沉不能舉傷寒無汗而疫則下身無汗上身有汗惟頭汗更盛頭為諸陽之首火性炎上毒火盤踞於內五液受其煎熬熱氣上騰如籠上熏蒸之露故頭汗獨多評傷寒亦有但頭汗出齊頸而還之症未可云此概屬疫證也此又痛雖同而汗獨異也有似少陽而嘔者有似太陰自利者少陽之嘔脅必痛疫證之嘔脅不痛因內有伏毒邪火干胃毒氣上衝頻頻而作太陰自利腹必滿疫證自利腹不滿大腸為傳送之官熱注大腸有下惡垢者有旁流清水者有日及數十度者此又證異而病同也論斑疹余每論熱疫不是傷寒傷寒不發斑疹或曰熱疫不是傷寒固已至云傷寒不發斑疹古人何以謂傷寒熱未入胃下之太早熱乘虛入胃故發斑熱已入胃不即下之熱不得泄亦發斑斯何謂歟曰古人以溫熱皆統於傷寒故內經云熱病者傷寒之類也難經分別五種之傷寒傷寒論辨別五種之治法既云熱入胃縱非溫熱亦是寒邪化熱故可用白虎三黃化斑解毒等湯以涼解也今人不悟此理而因以自誤誤人至論大者為斑小者為疹赤者胃熱極五死一生紫黑者胃爛九死一生余斷生死則又不在斑之大小紫黑總以其形之鬆浮緊束為憑耳如斑一出松活浮於皮面紅如朱點紙黑如墨塗皮此毒之松活外見者雖紫黑成片可生一出雖小如粟緊束有根如履透針如矢貫的此毒之有根錮結者縱不可紫黑亦死苟能細心審量神明於鬆浮緊束之間決生死於臨證之頃始信余言之不謬也論治疫仲景之書原有十六卷今世只傳十卷豈疫疹一門亦在遺亡之數歟以致後世立説紛紛至河間清熱解毒之論出有高人之見異人之識其旨既微其意甚遠後人未廣其説而反以為偏馮氏錦囊亦云斑疹不可發表此所謂大中至正之論惜未暢明其旨後人何所適從又可辨疫甚析如頭痛發熱惡寒不可認為傷寒表症強發其汗徒傷表氣熱不退又不可下徒傷胃氣斯語已得其奧妙奈何以疫氣從口鼻而入不傳於胃而傳於膜原此論似有語病至用達原飲三消諸承氣猶有附會表裡之意惟熊恁昭熱疫志驗首用敗毒散一百八去其爪牙繼用桔梗湯五十二同為舟揖之劑治胸膈手六經邪熱以手足少陽俱下膈絡胸中三焦之氣為火同相火遊行一身之表膈與六經乃至高之分此藥浮載亦至高之劑施於無形之中隨高下而退胸膈及六經之熱確係妙方汪按敗毒散似未盡妥究宜慎用余今採用其法減去硝黃以熱疫乃無形之毒難以當其猛烈重用石膏直入肺胃先搗其窩巢之害而十二經之患自易平矣無不屢試屢驗明者察之璜按誤汗非長熱不退即神昏譫妄誤下多有熱內陷而變痢甚者痢下血水熱熾妄言以致遷延難愈終成敗症慎之慎之論治疹疹出於胃古人言熱未入胃而下之熱乘虛入胃故發斑熱已入胃不即下之熱不得泄亦發斑此指寒邪化熱誤下失下而言若疫疹未經表下有熱不一日而即發者故余謂熱疫有斑疹傷寒無斑疹也熱疫之斑疹發之愈遲其毒愈重一病即發以其胃本不虛偶染疫邪不能入胃猶之牆垣高大門戶緊密雖有小人無從而入此又可所謂達於膜原者也有遲至四五日而仍不透者非胃虛受毒已深即發表攻裡過當胃為十二經之海上下十二經都朝宗於胃胃能敷布十二經榮養百骸毫髮之間靡所不貫毒既入胃勢必敷布於十二經戕害百骸使不有以殺其炎炎之勢則百骸受其煎熬不危何待疫既曰毒其為火也明矣火之為病其害甚大土遇之而焦金遇之而熔木遇之而焚水不能勝則涸故易曰燥萬物者莫熯乎火古人所謂元氣之賊也以是知火者疹之根疹者火之苗也如欲其苗之外透非滋潤其根何能暢茂一經表散燔灼火焰如火得風其焰不愈熾乎焰愈熾苗愈遏矣評溫熱得升散而熱愈熾即同此義疹之因表而死者比比然也其有表而不死者乃麻疹風疹之類有謂疹可治而斑難治者殆指疫疹為斑耳夫疫疹亦何難治哉但人不知用此法也論疫疹之脈不能表下疫疹之脈未有不數者有浮大而數者有沉細而數者有不浮不沉而數者有按之若隱若見者此靈樞所謂陽毒伏匿之象也評脈通於心主血熱傷血致阻脈道故或伏匿或沉細耳診其脈即知其病之吉凶浮大而數者其毒發揚一經涼散病自霍然沉細而數者其毒已深大劑清熱猶可撲滅至於若隱若見或全伏者其毒重矣其證險矣此脈得於初起者間有得於七八日者頗多何也醫者初認為寒重用發表先傷其陽表而不散繼之以下又傷其陰殊不知傷寒五六日不解法在當下猶必審其脈之有力者宜乏評治熱病者有時宜舍脈從症此類是也疫熱乃無形之毒病形雖似大熱而脈象細數無力所謂壯火食氣也若以無形之火熱而當硝黃之猛烈熱毒焉有不乘虛而深入耶怯弱之人不為陽脫即為陰脫氣血稍能駕馭者亦必脈轉沉伏變證蜂起或四肢逆冷或神昏譫語或鬱冒直視或遺溺旁流甚至舌卷囊縮循衣摸床種種惡候頗類傷寒醫者不悟引邪入內陽極似陰而曰變成陰證妄投參桂死如服毒遍身青紫口鼻流血如未服熱藥者即用大劑清瘟敗毒散一百九重加石膏或可挽回余因歷救多人故表而出之璜按誤下熱邪內陷於種種惡候之外尚有下利血水者多成危症此節所云變證蜂起者與病久熱深諸危象大略相同不因誤下固有是證而因誤下變成是證者益屬危機病至此內腎腦髓均被牽纍而及用大清大解仍宜兼理神經商之論疹形治法鬆浮灑於皮面或紅或赤或紫或黑此毒之外見者雖有惡證不足慮也若緊束有根如從皮里鑽出其色青紫宛如浮萍之背多見於胸背此胃熱將爛之候即宜大清胃熱兼涼其血以清瘟敗毒飲一百九加紫草紅花桃仁歸尾務使松活色淡方可挽回稍存疑慮即不能救論疹色治法血之體本紅血得其暢則紅而活榮而潤敷布洋溢是疹之佳境也淡紅有美有疵色淡而潤此色之上者也若淡而不榮或嬌而豔干而滯血之最熱者深紅者較淡紅為稍重亦血熱之象涼其血即轉淡紅色豔如胭脂此血熱之極較深紅為更惡必大用涼血始轉深紅再涼其血而淡紅矣紫赤類雞冠花而更豔較豔紅為火更盛不急涼之必至變黑須服清瘟敗毒飲一百九加紫草桃仁細碎宛如粟米紅者謂之紅砂白者謂之白砂疹後多有此證乃餘毒盡透最美之境愈後蛻皮若初病未認是疫後十日半月而出者煩躁作渴大熱不退毒發於頷死不可救論發瘡疫毒發斑毒之散者也疫毒發瘡毒之聚者也初起之時惡寒發熱紅腫硬痛此毒之發揚者但寒不熱平扁不起此毒之內伏者或發於要地發於無名發於頭面發於四肢種種形狀總是瘡證何以知其是疫毒所聚尋常瘡脈洪大而數疫毒之脈沉細而數尋常瘡證頭或不痛疫毒則頭痛如劈沉不能舉是其驗也稽其證有目紅面赤而青慘者有忽汗忽嘔者有昏憒如迷者有身熱肢冷者有腹痛不已者有大吐乾嘔者有大泄如注者有譫語不止者有妄聞妄見者有大渴思水者有煩躁如狂者有喊叫時作若驚若惕者病態多端大率類是誤認尋常瘡證溫托妄施斷不能救王士雄曰暑濕熱疫諸病皆能外發癰瘡然病人不自知其證發之由外科亦但見其外露之瘡因而誤事者最多人亦僅知其死於外證也噫論妊娠病疫母之於胎一氣相連蓋胎賴母血以養母病熱疫毒火蘊於血中是母之血即毒血矣苟不亟清其血中之毒則胎能獨無恙乎須知胎熱則動胎涼則安母病熱疫胎自熱矣竭力清解以涼血使母病去而胎可無虞若不知此而舍病以保胎必至母子兩不保也至於産後以及病中適逢經至當以類推若云産後經期禁用涼劑則誤人性命即在此言評的是妙談的是至理璜按妊娠病熱急急清熱即是養胎見可下症即宜用下劑不必多所疑畏蓋去病即安胎之妙法也為問熱不去而胎能保存乎熱熾胎墜而産母之命不危如朝露乎熱瘧熱痢每見胎墜而成死候況疫證乎故妊娠熱病尤宜大清大解不容稍緩耳論悶證疫疹初起六脈細數沉伏面色青慘昏憒如迷四肢逆冷頭汗如雨其痛如劈腹內攪腸欲吐不吐欲泄不泄男則仰臥女則覆臥搖頭鼓頷百般不足此為悶疫斃不終朝如欲挽回於萬一非大劑清瘟敗毒飲一百九不可醫即敢用病家決不敢服與其束手待斃不如含藥而亡雖然難矣哉王士雄曰所謂悶者熱毒深伏於內而不發露於外也漸伏漸深入臟而死不俟終日也固已治法宜刺曲池委中以泄營分之毒再灌以紫雪六十一清透伏邪使其外越楊云治法精良或可挽回清瘟敗毒飲何可試耶汪按本方有遏抑而無宣透故決不可用璜按此即西醫所謂電擊性之腦膜炎也死人最速王氏所補治法甚佳疫疹治驗乾隆戊子年吾邑疫疹流行初起之時先惡寒而後發熱頭痛如劈腰如被杖腹如攪腸嘔泄兼作大小同病萬人一轍有作三陽治者有作兩感治者有作霍亂治者逮至兩日惡候蜂起種種危證難以枚舉如此死者不可勝計良由醫者固執古方之所致也要之執傷寒之方以治疫焉有不死者乎是人之死不死於病而死於藥不死於藥而死於執古方之醫也疫證乃外來之淫熱非石膏不能取效且醫者意也石膏者寒水也以寒勝熱以水勝火投之百發百中五月間余亦染疫凡邀治者不能赴診叩其症狀録方授之互相傳送活人無算癸丑京師多疫郎汪副憲馮鴻臚亦以余方傳送服他藥不效者並皆霍然故筆之於書名曰清瘟敗毒飲一百九隨證加減詳列於後雄按吳門顧松園靖遠因父患熱病為庸醫投參附所殺於是發憤習醫寒暑靡間者閲三十年嘗著醫鏡十六卷徐侍郎秉義為之序稱其簡而明約而該切於時用而必效惜無刊本余求其書而不得近見桐鄉陸定圃進士冷廬醫話載其治汪纘功陽明熱證主白虎湯七每劑石膏用三兩兩服熱頓減而遍身冷汗肢冷發厄郡中著名老醫謂非參附弗克回陽諸醫和之群譁白虎再投必斃顧引仲景熱深厥亦深之文及嘉言陽證勿變陰厥萬中無一之説諄諄力辨諸醫固執不從投參附回陽斂汗之劑汗益多而體益冷反詆白虎之害微陽脫在旦暮勢甚危舉家驚惶復求顧診仍主白虎用石膏三兩大劑二服汗止身溫再以前湯加減數服而痊因著辨治論以為溫熱病中宜用白虎湯並不傷人以解世俗之惑陸進士云此説與師愚之説合且醫鏡佳方不少其治虛勞方用生地熟地天冬麥冬龜板龍眼肉玉竹茯苓山藥人乳吳醫匯講乃屬之汪績功方中增入牛膝一味豈顧著醫鏡一書為汪氏竊取耶附及之以質博雅汪按虛勞而咳者肺中必有邪麥冬玉竹不宜用疫證條辨一頭痛目痛頗似傷寒然太陽陽明頭痛不至於傾側難舉而此則頭痛如劈兩目昏瞀勢若難支總因火毒達於二經毒參陽位用釜底抽薪法撤火下降其痛立止其疹自透宜清瘟敗毒飲一百九增石膏元參加菊花誤用辛涼表散燔灼火焰必轉悶證評頭痛目痛一證二骨節煩疼腰如被杖骨與腰皆腎經所屬其痛若此是淫熱之氣已流於腎經宜本方增石膏元參加黃柏誤用溫散死不終朝矣評骨節煩疼腰如被杖一證三熱宜和不宜燥若熱至遍體炎炎較之昏沉肢冷者而此則發揚以其氣血尚堪勝毒一經清解而疹自透妄肆發表必至內伏宜本方增石膏生地丹皮芩連評周身炎熱四有似乎靜而忽躁有似乎躁而忽靜謂之靜躁不常較之顛狂彼乃發揚而此嫌郁遏總為毒火內擾以致坐臥不安宜本方增石膏犀角黃連評毒火內擾坐臥不安五寤從陽主上寐從陰主下胃為六腑之海熱毒壅遏阻膈上下故火擾不寐宜本方增石膏犀連加琥珀評不寐王士雄曰火擾不寐何必琥珀若欲導下宜用木通璜按不寐加入梔子豆豉交媾神機亦妙六一散泡牛黃屢試有驗六初病周身如冰色如蒙垢滿口如霜頭痛如劈飲熱惡冷六脈沉細此陽極似陰毒之隱伏者也重清內熱使毒熱外透身忽大熱脈轉洪數煩躁譫妄大渴思冰證雖梟惡尚可為力宜本方增石膏丹皮犀連加黃柏若遇庸手妄投桂附藥不終劑死如服毒評身冷滿口如霜此證須兼豁痰之藥七四肢屬脾至於逆冷雜證見之是脾經虛寒元陽將脫之象惟疫則不然通身大熱而四肢獨冷此烈毒郁遏脾經邪火莫透重清脾熱手足自溫宜本方增石膏評身熱肢冷此證四肢雖逆冷而口必渴小便必短黃而熱溫疫病此類甚多醫者無不誤治王士雄曰四肢逆冷在雜證不僅脾經虛寒在疫證亦非毒壅脾經增石膏原是清胃氣行則肢自和也亦有熱伏厥陰而逆冷者溫疫證中最多不可不知也八筋屬肝賴血以養熱毒流於肝經斑疹不能尋竅而出筋脈受其沖激則抽惕若驚宜本方增石膏丹皮加膽草評筋脈抽搐九雜證有精液桔涸水不上升咽乾思飲不及半杯而此則思冰飲水百杯不足緣火毒熬煎於內非冰水不足以救其燥非石膏不足以制其焰庸工猶戒生冷病家奉為至言即溫水亦不敢與以致唇焦舌黑宜本方增石膏加花粉評此等症非急下不能存津作者猶未見及此十四時百病胃氣為本至於不食似難為也而非所論於疫證此乃邪火犯胃熱毒上衝頻頻乾嘔者有之旋食旋吐者有之胃氣一清不必強之食自無不食矣宜本方增石膏加枳殼評乾嘔王士雄曰熱壅於胃奮不知飢強進粥糜反助邪氣雖粒米不進而病勢未衰者不可疑為胃敗也若干嘔吐食則本方之甘橘丹皮皆不可用宜加竹茹枇杷葉半夏之類評閲歷之言十一胸膈乃上焦心肺之地而邪不易犯惟火上炎易及於心以火濟火移熱於肺金被火的其燥愈甚胸膈郁遏而氣必長吁矣宜本方增連橘加枳殼蔞仁王士雄曰邪火上炎因能郁遏肺氣而為膈滿第平素有停痰伏飲者或起病之先兼有食滯者本方地芍未可浪投臨證須辨別施治憔蘆蔔汁既清燥火之閉郁亦開痰食之停留用得其宜取效甚捷評胸有夾痰夾食者以蘆蔔煎湯代水入當用藥中煎服甚妙十二昏悶無聲心之氣出於肺而為聲竅因氣閉氣因毒滯心迷而神不清竅閉而聲不出宜本方增石膏犀角芩連加羚羊角桑皮評昏悶無聲王士雄曰桑皮雖走肺而無通氣宣竅之能宜用馬兜鈴射干通草之類清神化毒當參紫雪六十一之類十三胃氣弱者偏寒偏熱水停食積皆與真氣相搏而痛此言尋常受病之源也至於疫證腹痛或左或右或痛引小腸乃毒火衝突發泄無門若按尋常腹痛分經絡而治之必死如初起只用敗毒散一百八或涼隔散四十二加黃連其痛立止評疫病腹痛乃毒蘊於內而不得泄死者甚多王士雄曰疫證腹痛固與雜證迥殊然夾食夾瘀夾疝因病疫而宿疾兼發者亦正多也臨證處方豈可不為顧及十四筋肉瞤動在傷寒則為亡陽而此則不然蓋汗者心之液血之所化也血生於心藏於肝統於脾血被煎熬筋失其養故筋肉為之瞤動宜本方增石膏生地元參加黃柏評此等症最易誤認亡陽其實乃風濕未疾也王士雄曰亡陽瞤動宜補土製水淫熱瞤動宜瀉火息風本方尚少鎮靜息風之品宜去丹橘加菊花膽草十五病人自言胃出冷氣非真冷也乃上升之氣自肝而出中挾相火自下而上其熱尤甚此火極似水熱極之徵陽亢逼陰故有冷氣宜本方增石膏犀地丹連加膽草王士雄曰冷氣上升雖在別證中見之亦多屬火不知者妄投溫熱貽害可勝道哉本方橘芍亦屬非宜更有挾痰者須加海蛇竹瀝蘆蔔汁之類汪按此證挾痰者最多評膈問覺冷每多停痰余亦歷驗多人矣十六口中臭氣令人難近使非毒火熏蒸於內何以口穢噴人乃爾耶宜本方增石膏犀連評此證仍由濕熱蒸為穢毒甚至食物觸其口氣亦臭穢異常用清香涼潤之藥可解王士雄曰宜加蘭草竹茹枇杷葉金銀花薔薇露瑩白金汁之類以導穢濁下行十七舌苔滿口如霜在傷寒為寒證的據故當溫散而疫證見此舌必厚大為火極水化宜本方增石膏犀地翹連加黃柏誤用溫散旋即變黑汪按凡溫熱暑疫見此舌者病必見重最宜詳慎王士雄曰凡熱證疫證見此苔者固不可誤指為寒良由兼痰挾濕遏伏熱毒使然清解方中宜佐開泄之品為治十八咽喉者水穀之道路呼吸之出入毒火薰蒸至於腫痛亟當清解以開茅塞宜本方增石膏玄橘加牛蒡射干山豆根評咽喉腫痛用煎劑取效絶少王士雄曰加瑩白金汁最妙藥汁礙咽者亟以錫類散一百十吹之十九唇者脾之華唇掀腫火炎土燥也宜本方增石膏翹連加天花粉評唇腫二十頭為諸陽之首頭面腫大此毒火上攻宜本方增石膏元參加銀花馬勃殭蠶板藍根紫花地丁歸尾脈實者量加酒洗生大黃評頭腫二十一面上燎疱宛如火燙大小不一有紅有白有紫黑相間痛不可忍破流清水亦有流血水者治同上條評面起泡如火燙二十二腮者肝腎所屬有左腫者有右腫者有右及左左及右者名曰痄腮不亟清解心成大頭治同上條評左右腮腫二十三頸屬足太陽膀胱經熱毒入於太陽則頸腫宜本方增石膏元參翹橘加銀花夏枯草牛蒡紫花地丁山豆根評頸腫二十四耳後腎經所屬此處硬腫其病甚惡宜本方增石膏元地丹翹加銀花花粉板藍根紫花地丁耳中出血者不治評耳後硬腫王士雄曰坎為耳故耳為腎水之外候然肺經之結穴在耳中名曰龍蔥專主乎聽金受火爍則耳聾凡溫熱暑疫等證耳聾者職是故也不可泥於傷寒少陽之文而妄用柴胡以煽其焰古云耳聾治肺旨哉言乎二十五舌乃心之苗心屬火毒火衝突二火相併心苗乃動而嗒舌弄舌宜本方增石膏犀連元參加黃柏評嗒舌弄舌王士雄曰宜加木通蓮子心硃砂童溺之類二十六紅絲繞目清其浮僭之火而紅自退誤以眼科治之為害不淺宜本方加菊花紅花蟬蛻歸尾穀精評加此四味藥力淺薄王士雄曰加味亦是眼科之藥不若但加羚羊角龍膽草二味為精當也二十七頭為一身之元首最輕清而邪不易干通身焦燥獨頭汗湧出此烈毒鼎沸於內熱氣上騰故汗出如淋宜本方增石膏元參評頭汗王士雄曰本方宜去芍橘丹皮加童溺花粉二十八齒者骨之餘雜證齡齒為血虛疫證見之為肝熱宜本方增石膏生地丹梔加膽草評有燥糞者亦多齡齒玩金匱痙證齘齒用大承氣湯自明王士雄曰齒齦屬陽明不可全責之肝也二十九疫證鼻衄如泉乃陽明鬱熱上衝於腦腦通於鼻故衄如湧泉宜本方增石膏元地芩連加羚羊角生桑皮棕櫚灰王士雄曰本方宜去桔梗加白茅根伏邪由營連肺亦多衄血三十舌上白點如珍珠乃水化之象較之紫赤黃黑古人謂之芒刺者更重宜本方增石膏犀連元翹加花粉銀花評舌白點王士雄曰宜加薔薇根瑩白金汁之類三十一疫證初起苔如膩粉此火極水化設誤認為寒妄投溫燥其病反劇其苔愈厚精液愈耗水不上升二火煎熬變白為黑其堅如鐵其厚如甲敲之嘎嘎有聲言語不清非舌卷也治之得法其甲整脫宜本方增石膏元參犀連知翹加花粉黃柏評苦苔如膩粉此肺胃燥熱舌也故用藥主甘寒充津不宜再用苦藥以益其燥王士雄曰此證專宜甘寒以充津液不當參用苦燥余如梨汁蔗漿竹瀝西瓜汁藕汁皆可頻灌如得蕉花上露更良揚云蕉花上露為清熱無上妙品但不可必得即蕉根取汁亦極妙也若邪火已衰津不能回者宜用鮮豬肉數斤切大塊急火煮清湯吹淨浮油恣意涼飲乃急救津液之無上妙品故友範慶簪嘗謂余云酷熱炎天正銀匠熔鑄各州縣奏銷銀兩之時而銀爐甚高火光撲面非壯盛之人不能為也口渴不敢啜茗惟以淡煮豬肉取湯涼飲故裸身近火而津液不致枯竭余因推廣其義頗多妙用拙案中可證也三十二舌上發疔或紅或紫大如馬乳小如櫻桃三五不等流膿出血重清心火宜本方增石膏犀角翹連加銀花舌上成坑愈後自平此二條乃三十六舌未有者評舌發疔王士雄曰亦宜加薔薇根金汁之類外以錫類散一百十或珍珠牛黃研細糝之則坑易平三十三舌衄乃血熱上溢心苗宜本方增石膏黃連犀地梔丹加敗棕灰評蒲黃治舌衄雖常法而欲有神效王士雄曰外宜蒲黃炒黑糝之三十四齒衄乃陽明少陰二經之熱相併宜本方增石膏元參芩連犀地丹梔加黃柏評齒衄王士雄曰須參葉氏溫熱論逆傳治法且此證挾痰者多最宜諦審三十五心主神心靜則神爽心為烈火所燔則神不清而譫語宜本方增石膏犀連丹梔加黃柏膽草三十六厄逆有因胃熱上衝者有因肝膽之火上逆者有因肺氣不能下降者宜本方增石膏加竹茹枇杷葉柿蒂羚羊角銀杏仁如不止用沉香檳榔烏藥枳殼各磨數分名四磨飲仍以本方調服評厄逆來源甚多惟虛厄最難治王士雄曰此三候因皆實證尚有痰阻於中者便祕於下者另有治法銀杏仁溫澀氣分但可以治虛厄不宜加入此方三十七邪入於胃則吐毒猶因吐而得發越至於乾嘔則重矣總由內有伏毒清解不容少緩宜本方增石膏甘連加滑石伏龍肝王士雄曰甘草宜去伏龍肝溫燥之品但可以治虛寒嘔吐不宜加入此方本方桔梗丹芍亦當去之可加旋覆花竹菰半夏枇杷葉如用反佐則生薑汁為妥汪按此方中生薑不可少璜按乾嘔多因胸痞若上焦氣機不利尚宜清降三十八疫毒移於大腸裡急後重赤白相兼或下惡垢或下紫血雖似痢實非痢也其人必惡寒發熱小水短赤但當清熱利水宜本方增石膏黃連加滑石豬苓澤瀉木通其痢自止誤用通利止澀之劑不救評仍是熱邪陷下作痢極力清解無有不愈王士雄曰熱移大腸惡垢既下病有出路化毒為宜既知不可通利何以仍加苓澤等利水毋乃疏乎惟滑石用得對證他如金銀花槐蕊黃柏青蒿白頭翁苦參萊蔔之類皆可採也三十九毒火注於大腸有下惡垢者有利清水者有傾腸直注者有完穀不化者此邪熱不殺穀非脾虛也較之似痢者稍輕考其證身必大熱氣必粗壯小溲必短唇必焦紫大渴喜冷腹痛不已四肢時而厥逆宜其因勢而清利之治同上條評疫病從口鼻而入肺先受之此證由肺熱急奔大腸非清肺不愈王士雄曰唇焦大渴津液耗傷清化為宜毋過滲利惟冬瓜煮湯代茶煎藥恣用甚佳汪按此及上條皆宜用緑豆四十疫證大便不通因毒火煎熬大腸枯燥不能潤下不可徒攻其閉結而速其死也宜本方加生大黃或外用蜜煎導法汪按此證宜用麻仁評果系毒火煎熬下劑亦不可少四十一邪犯五臟則三陰脈絡不和血乖行度滲入大腸而便血宜本方增生地加槐花柏葉棕灰評便血王士雄曰棕灰溫澀即欲止之宜易地榆灰四十二膀胱熱極小溲短赤而澀熱毒甚者溲色如油宜本方加滑石澤瀉豬苓木通通草萹蓄王士雄曰苓澤等藥皆滲利之品溺阻膀胱者藉以通導此證既云熱毒內熾則水已耗奪小溲自然渾赤短澀但宜治其所以然則源清而流潔豈可強投分利而為礱粳打油之事乎或量證少佐一二味慎毋忽視而泛施也璜按伏暑病熱病小便短赤而澀者甚多大劑清解佐以育陰自然清長徒用滲利竭其津液熱邪必熾非妥善之法也四十三溺血小便出血而不痛血淋則小腹陰莖必兼脹痛在疫證總由血因熱迫宜本方增生地加滑石桃仁茅根琥珀牛膝棕灰評溺血王士雄曰設兼痛脹忌用棕灰汪按亦宜用地愈灰四十四發狂罵詈不避親疏甚則登高而歌棄衣而走逾垣上屋力倍常時或語生平未有之事未見之人如有邪附者此陽明邪熱上擾神明病人亦不自知僧道巫尼徒亂人意宜本方增石膏犀連丹梔加黃柏評疫病發狂多由熱迫而亦有由於陰燥者臨證時須細辨王士雄曰宜加硃砂青黛挾痰加菖蒲竹瀝之類四十五疫證之痰皆屬於熱痰中帶血熱極之徵宜本方增石膏芩地加蔞仁羚羊角生桑皮棕灰評痰中吐血風溫秋燥疫病多有乃熱邪傷肺也加葦莖湯妙王士雄曰桑皮棕灰不可商宜加滑石桃仁葦莖瓜瓣之類四十六疫證遺溺非虛不能約乃熱不自持其人必昏沉譫語遺不自知宜本方增石膏犀連加滑石評遺溺四十七諸病喘滿皆屬於熱況疫證乎宜本方增石膏黃芩加桑皮羚羊角評喘滿王士雄曰杏仁厚朴半夏旋覆花枇杷葉蔞仁萊蔔海蛇蘆根之類皆可隨證採用本方地芍宜去之汪按下條亦宜去地芍璜按熱病喘滿多由痰熱葦莖湯加杏仁滑石旋覆花枇杷萊蔔子亦佳四十八淫熱熏蒸濕濁壅遏則周身發黃宜本方增石膏梔子加茵陳滑石豬苓澤瀉木通汪按濕盛而用石膏似宜佐以蒼朮厚朴之類王士雄曰此證亦有宜下者汪按青殼鴨蛋敲小孔納朴硝於孔中紙封燉熟日日服之義取一補一消治黃疸甚效余嘗親試之初時便溏不爽服朴硝而便反干暢矣評此黃疸奇效方其方頗有意義四十九疫證循衣摸床撮空此肝經淫熱也肝屬木木動風搖風自火出左傳云風淫末疾四末四肢也肢動即風淫之疾也宜本方增石膏犀連梔丹加膽草王士雄曰桑枝菊花絲瓜絡羚羊角白薇之類皆可採用實者宜兼通腑虛者宜兼養陰璜按摸床撮空危症用和肝泄熱通腑養陰語特精實惟此乃尿毒入血宜利其小便五十狐惑宜本方增石膏犀角加苦參烏梅槐子以上五十證熱疫惡候變態無恆失治於前多致莫救慎之慎之五十一疫證熱毒盤踞於內外則遍體炎炎夫熱極之病是必投以寒涼火被水克其焰必伏火伏於內必生外寒陰陽相搏則戰一戰而經氣輸泄大汗出而病邪解矣評亦不可過用寒涼冰閉以上乃疫病雜證此下乃瘥後雜證宜用養血潤腸之方五十二疫證瘥後四肢浮腫勿遽溫補王士雄曰宜清餘熱兼佐充津五十三瘥後飲食漸增而大便久不行亦無所苦此營液未充若誤投通利死不終朝矣汪按宜食黑脂麻五十四熱疫為病氣血被其煎熬瘥後飲食漸進氣血滋生潤皮膚而灌筋骸或痛或癢宛如蟲行最是佳境不過數日氣血通暢而自愈矣五十五疫證失治於前熱流下部滯於經絡以致腰膝疼痛甚者起不能立臥不能動誤作痿治必成廢人宜本方小劑加木瓜牛膝續斷萆薢黃柏威靈仙璜按濕熱瘀滯經絡多成痿廢此毒流於肝腎宜開濕通絡以泄腎邪本條下諸藥味俱佳用蠶沙柏葉諸類煮滾布包外尉尤妙五十六瘥後不欲飲食食亦不化此脾胃虛弱宜健脾養胃王士雄曰不欲食病在胃宜養以甘涼食不化病在脾當補以溫運醫者須分別論治評精到語汪按葉香岩論脾胃辨析最明暢余以為勝於東坦之專事升脾學者所當師法也璜按養以甘涼為胃津衰者言也補以溫運為胃陽不足者言也二證治法迥異五十七瘥後驚悸屬血虛宜養血鎮驚評驚悸王士雄曰亦有因痰熱未清者不可不知也汪按因痰者頗多璜按驚悸宜用鎮心清熱及逐痰之品五十八瘥後怔忡乃水衰火旺心腎不交宜補水養心評怔忡王士雄曰硃砂安神丸一百十一最妙汪按亦有兼挾痰者五十九瘥後有聲不能言此水虧不能上接於陽也宜補水評有聲不能言王士雄曰有痰熱滯於肺絡者宜清肅有痰熱耗傷肺陰者宜清養不僅水虧為然也六十瘥後聲顫無力語不接續名曰鄭聲乃氣虛也宜補中益氣湯汪按第五卷方論不録此方附論在清暑益氣湯二百三下評鄭聲王士雄曰此證雖屬氣虛實由元氣無根補中益氣升陽切勿誤投宜集靈膏一百十二六十一瘥後喜唾胃虛而有餘熱也烏梅十個北棗五枚俱去核共杵如泥加煉蜜丸彈子大每用一丸噙化評喜唾璜按喜唾用烏梅以收胃津北棗煉蜜酸甘化陰方法超妙六十二言者心之聲也病中譫妄乃熱擾於心瘥後多言餘熱未靜譬如滅火其火已息猶存余焰也評瘥後多言王士雄曰宜導赤散四十四加麥冬蓮子心硃砂染燈心璜按瘥後多言宜清餘熱仍須養陰以納厚陽六十三瘥後遺精宜交心腎評遺精王士雄曰精因火動者多宜清餘熱黃連黃柏最是要藥六十四瘥後觸事易驚夢寐不安乃有餘熱挾痰也痰與氣搏故恐懼評觸事易驚王士雄曰宜用竹茹黃連石菖蒲半夏膽星梔子知母茯苓旋覆花橘紅等藥六十五瘥後終日昏睡不醒或錯語呻吟此因邪熱未淨伏於心包絡所致評昏睡不醒王士雄曰宜用丹參白薇梔子麥冬甘草木通鹽水炒黃連竹葉硃砂染燈心細茶等藥挾痰者花粉天竺黃石菖蒲省頭草之類或萬氏牛黃清心丸四十皆可採用璜按昏睡錯語餘熱猶上擾元神清心滌痰以安神經方法甚靈六十六瘥後自汗盜汗虛象也宜分陰陽而補益評自汗盜汗王士雄曰固屬虛候多由余熱未清心陽內熾慎勿驟補清養為宜如西洋參生地麥冬黃連甘草小麥百合竹葉茯苓蓮子心之類擇而為劑可也璜按牡蠣白芍茯神及一派清心之藥均可酌用六十七瘥後心神不安乃心血虧損宜養心評心神不安王士雄曰固是心營不足亦因餘熱未清治如上條可也六十八瘥後虛煩不寐者血虛神不守舍也評虛煩不寐王士雄曰非神不守舍也亦餘火擾動耳治如上法或加阿膠或加生雞子黃或加珍珠審證而用得其宜貴乎醫者之神悟矣六十九瘥後餘熱未淨腸胃虛弱飲食不節穀氣與熱氣兩陽相搏身復發熱名曰食復評食復王士雄曰治法與傷寒食復同更有瘥後起居不慎作勞太早虛陽浮擾而發熱者名曰勞復治宜調氣血七十瘥後早犯女色而病者名女勞復女犯者為男勞復其證頭重目眩腰痛肢酸面熱如烘心胸煩悶宜麥冬湯一百十三主之若舌出寸余纍日不收名曰陽強以冰片研末糝之即縮長至數寸者多不救評舌出寸余評女勞復王士雄曰此方甚妙宜加竹茹枸杞方七十一男子新瘥餘熱未淨而女人與之交接得病者名陽易女人新瘥餘熱未清而男子與之交接得病者名陰易其證男子則陰腫入腹絞痛難忍女人則乳抽裡急腰胯痛引腹內熱攻胸膈頭重難抬仰臥不安動搖不得最危之證評陰陽易王士雄曰陰陽二易余謂之熱入精室證第陰易較重於陽易以女人疫熱之氣本從陰戶出也古人用褌襠之義最精取其能引熱邪仍由原路去故陰易須剪所交接女人身穿未浣之褌襠千金用月經赤帛亦從此脫胎陽易須剪所交接男子身穿未浣之褌襠並取近陰處之數寸燒灰服下奏效甚捷後人之用鼠矢亦取其以濁導之義然究不如燒褌散之貼切矣余如竹茹花粉韭白滑石白薇槐米楝實緑豆甘草梢土茯苓等藥並走精室皆可隨證採用以上三條溫熱病後亦同不僅疫證爾也此篇於疫病危重大證及寒熱錯雜難辨等證分別甚清病後調理雜證各法亦佳王氏所注議病用藥尤為細及毫絲倘不拘於清瘟敗毒散一方則無論春溫夏熱伏暑皆可如此辨證如此用藥不專主疫證言也讀者須當隅反光緒戊申七月望後第六日黼堂氏志璜又按原文未盡精粹而別開生面處殊不可及得王注而靡不超妙醫部中治熱病之善本也卷八附録解熱藥新處方解熱藥者因熱性病之體溫增高鎮靜之使熱度低下之藥物也別臘蜜童功力用量見前上焦篇此藥能平體溫熱度減退後脈數覺減於心臟無不良之影響熱度甚高之時每發氣管枝炎服此藥一二日氣管炎大退惡性之肺炎亦可消減如譫語精神昏迷頭痛一切重症感覺等消失甚速或見輕減意識明爽使患者早達於恢復期但重聽往往日久不能治愈阿斯必林此為諸熱病之解熱劑凡一切熱病均可用之各種風濕骨痛尤有特效為諸藥冠茲將其功用觀列於下一無論急性慢性淋病性之關節痛風症用此藥後即能退炎止痛消腫又筋內痛風症亦有特效二無論各種神經痛偏頭痛正頭痛子宮癌乳癌脊髓癆之疼痛服此藥後皆有大效三凡一切之肺癆熱以及其他各種之熱性病用之皆有奇效四凡病眼科之痛風性虹彩炎虹彩毛樣炎亦皆有效用量一日三回每回五至一化於一杯開水內服之處方一治一切熱病阿斯必林三六上分六包一日三包食前服若不效可以六分為六包二日分服注意小兒一二歲者每回服一三歲服一五五歲服二八歲服三十二歲服五萬不可多服二治尿酸性關節炎阿斯必林六一九上分六包一日服三包開水送下三又方阿斯必林三鹽酸海洛因一上分三包一日分服完注意鹽酸海洛因為鎮咳鎮痛呼吸困難之祛痰妙藥四治肋膜炎阿斯必林四乳糖二上為六包一日三回二日分服五偏頭痛阿斯必林三上分三包發痛時服一包六坐骨神經痛阿斯必林五上分六包二日分服七流行性感冒阿斯必林六上分六包一日三次每日一包八關節痛風阿斯必林六上分六包二日分服九顏面神經麻痹阿斯必林三上分六包二日分服十急性氣管枝炎阿斯必林一上為一包臨臥服撒曹為解熱劑鎮痛劑凡咳嗽有熱者可以此品配入咳嗽藥中又為關節縷麻質斯神經性之特效藥處方一一切熱性病撒曹六溜水一上一日三次二日分服二傷風咳嗽撒曹一白糖一上為一包臨臥作一次服三治糖尿病撒曹一上為一包與以六包一日三次每回一包四治嘈雜及胃部疼痛撒曹二重曹十二上研和為散食後服一刀尖五治偏頭痛撒曹一上為一包發作時服一包六痛風風痹撒曹六上分六包一日三次每次一包弗那攝精一名芬阿錫吞為解熱劑為鎮痛劑治痛風有偉效治頭痛亦良用量每回二五處方弗那攝精三上分六包一日三回每回一包退熱藥尚有數品本書特取其功用較多者録之以備採用云爾雞那不止退熱功用盡多集隘不登用法見前
