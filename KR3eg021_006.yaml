body:
  text: 卷六治溫熱方法上焦篇溫熱由伏氣而發者多並有由傳染而來者未能以一二劑取效故西醫退熱藥用之多未到恰好處我國分別春溫夏熱秋暑治法委曲詳盡經驗亦最宏富茲摘其要者録之風溫治法風溫者初春陽氣始開肝經行令溫風挾蘊熱而發作也始發熱而惡風寒舊主桂枝湯愚意仍以蔥豉湯加蘆根桑葉滑石生芍主之蔥豉湯蔥白一把香豉五錢蘆根三錢桑葉三錢滑石二錢生白芍三錢水五杯煎三杯日三服璜按蔥豉湯為溫熱初起開手必用之方至穩至效王士雄又加蘆根滑石透表加桑葉白芍以疏肝膽而理風陽尤為圓到舊本以治春溫新邪引動伏邪之證余謂風溫新感者亦適用之但熱不惡寒而口渴者辛涼平劑銀翹散主之不口渴者亦效銀翹散方及服法加減法見溫病條辨春溫治法春溫證由冬寒內伏藏於少陰發於少陽寒邪深伏而化熱者前賢以黃芩湯為主方用苦寒直清裡熱熱伏於陰苦味堅陰乃正治也此方不因新感而發者宜之黃芩湯黃芩三錢炙甘草二錢白芍二錢大棗二枚去核水五杯煎取二杯分二次服璜按張路玉以此方為溫病之主方余謂必由伏邪而無新感者方合周禹載以此方為治溫邪內郁已深因其人中氣本虛下走作痢籲中氣本虛曾有再用黃芩湯之理乎蓋此即有下痢亦即暴注下迫為溫邪之出路耳風熱入肺者頭脹咳嗽身不甚熱微渴者輕劑桑菊飲主之桑菊飲方見溫病條辨溫熱治法溫熱者春末夏初陽氣弛張溫盛為熱也脈洪渴甚面赤惡熱大汗者辛涼重劑白虎湯主之夏日受暑多患此證然必須大汗大渴脈洪而熱不退者方可服也白虎方本為達熱出表若其人脈浮弦而細者不可與也脈沉者不可與也汗不出者不可與也不渴者不可與也當須識此勿令誤也辛涼重劑白虎湯生石膏五錢知母三錢生甘草一錢粳米三錢水四杯煎二杯分二次服璜按江筆花治一小兒熱證曾用石膏至十餘斤之多足見石膏非大寒涼之品也考西藥大成以石膏無功用煅之可作脫胎鑄模故在西國不入藥品然中醫用白虎湯以治有汗熱證每每熱退而津生蓋得甘涼之效也特功力尚輕故徒用此三味必須多服璜每用必仿雷氏三書去粳米加鮮蘆根天花粉以透肌表而清胃熱較為速效讀溫病條辨謂脈浮弦而細者不可與不思熱病得汗則脈浮熱由汗泄則脈必緩而細倘汗後而脈躁疾則逆症矣豈白虎所能治乎大概有汗而熱渴舌苔黃則可用之不必以脈之浮弦而細為顧慮也熱病固有舍脈從症者全在醫者心靈手敏活潑潑地則得耳瘟疫治法瘟疫者感天地之厲氣厲氣必挾時毒或人煙稠密居室不慎飲食不潔或天時不正致相傳染者多惟不可用溫表藥發汗發汗而汗不出者必發斑疹汗出過多者必神昏譫語發斑者遍體赤紅成片甚則轉黑色則病危矣疹者小紅粒成片成朵之象皆溫毒蘊久而成也發斑者化斑湯主之發疹者銀花加減湯主之化斑湯石膏一兩知母四錢生甘草三錢犀角二錢元參三錢白粳米一合水八杯煮成三杯日三服璜按斑即東醫所謂猩紅熱也其病於皮膚髮細小無數之深紅色患者每起焮灼及辛刺之感覺末梢部之淋巴腺亦常腫脹此證與麻疹風疹均有分別茲詳列之猩紅熱一喉咽頭皆充血而咽頭充血獨著二頸腺淋巴腺皆腫脹三蕾疹多發於四肢背面四始初發自頸部其後蔓延於他部五經過及於三周六蕾疹集合而蔓延七高熱四十度以上八有合併爛喉等症者麻疹一喉頭充血較咽頭充血著明二頸腺淋巴腺之腫脹甚稀三顏面四肢背面等處無不合發之四始初發於顏面其後蔓延全身五及二周六疹子個個分離七熱度三十度至四十度八合併爛喉等症則甚稀璜按依東醫此説斑疹由皮膚充血則此傳染之毒之發於血分者甚明化斑湯之加犀角元參銀翹加減湯之加元參生地大青葉皆所以清血也二方解熱涼血以治傳染症發斑往往獲效疫症初起寒熱頭痛煩躁譫妄肢冷身熱舌刺唇焦一切火邪表裡俱盛狂躁心煩口乾咽痛大熱乾嘔吐血衄血熱甚發斑不論始終以清瘟敗毒飲主之清瘟敗毒飲生石膏八錢小生地二錢烏犀角二錢真川連一錢粉丹皮二錢梔子一錢五分桔梗一錢五分黃芩一錢五分知母二錢赤芍二錢元參二錢甘草八分連翹二錢鮮竹葉一錢五分璜按瘟邪主煩躁譫妄肢冷身熱舌刺唇焦狂躁吐血表裡俱盛非此等大劑不能治之余師愚疫症一得加減甚詳王士雄加注尤為精細載在溫熱經緯中治熱病疫病者不可不讀本書已列於末卷發疹者用銀翹加減湯主之連翹二錢銀花二錢苦桔梗一錢二分薄荷八分牛蒡子一錢二分竹葉八分生甘草一錢荊芥一錢元參二錢細生地二錢大青葉六分粉丹皮一錢五分神昏譫語者清宮湯主之身體強壯者牛黃丸紫雪丹至寶丹主之方法見溫病條辨濕毒治法濕毒者乃春夏之交地氣發泄人身陰氣素虧不能上濟心火故有此證或咽痛或喉腫不痛但外腫甚則耳聾俗名大頭瘟蝦蟆瘟者普濟消毒飲去升麻柴胡初起再去芩連三四日不退便結者加黃芩二錢枳殼二錢璜按此即東醫所謂流行性耳下腺炎西醫所謂傳染病血蛇症也春夏之交流行頗盛耳下腺焮沖腫起面貌奇異兩頰外聳初起時惡寒戰栗發熱身體倦怠食欲缺乏起嘔吐初則耳下微腫繼則咀嚼開口亦皆困難耳下腺漸次腫脹延至頰部頸項則面呈異狀此證西醫謂最危險者不多見東醫謂經十日至十四日可望痊愈但腫勢開廣則愈期纏綿若腦內欠血素日嗜酒腦內微絲脈管或回穴為血團閉塞則發譫語易致殞命治法輕症用輕瀉藥戒口患處腫痛用花士玲以止之遇略重者用了刀邊一釐七水八錢開化每四點鐘服一滴加水少許甚效遇更重者用金雞納霜四錢顛茄膏五釐和勻為丸十粒每四點鐘一丸甚效倘有譫語或血薄與素嗜酒而致者則以補身之品與麼啡酒顛茄酒等藥亦佳外擦以花士玲八錢加播𣵪酸水五分或三四分和勻雞毛擦之日擦三四次極妙華醫服方主普濟消毒飲加減普濟消毒飲方見溫病條辨喉疫治法陰虛之人易感溫毒如白喉赤喉喉痹喉蛾喉風等症惟有養陰清肺湯最為神妙惟世人只知白喉忌表必喉中生白方敢用此方殊不知赤腫均可用以其功能養真陰清肺熱故也尚有喉痛兼發寒熱世醫謂之風火喉症用防風荊芥山豆根射干等類必致更甚以養陽清肺加連翹銀花竹葉心服之數劑痛熱均除矣養陰清肺湯大生地二錢元參四錢麥冬三錢薄荷一錢炒白芍二錢粉丹皮二錢川貝二錢甘草一錢痛勢重者倍用發熱加連翹銀花各三錢火重者加胖大海一枚竹葉心二錢大便閉結加枳實二錢黃芩一錢五分小便短赤加澤瀉二錢知母二錢璜按喉疫乃急性之傳染病也病情雖有輕重之各別而傳染菌原為一種此菌能令咽喉之嫩膜腐爛發作疼痛戰栗惡寒頭部運動疼痛尤甚按下齶角後部則見一側或兩側之齶下淋巴腺腫脹口腔黏液分泌旺盛患者之聲音每帶鼻聲檢查喉頭腫脹潮紅而有汙穢灰白色之被膜或斑紋陷入聲管氣管頸項諸核俱脹呼吸困難尿含蛋白假膜潰爛則頸項益浮腫呼出臭氣惡穢不堪尤為重候到此時機頃刻氣閉而斃矣治法近世發明之血清注射法其效如神惟過其時期則難見其效血清多注射於乳房下或上腿前面外方之皮下注射血清後須清洗其喉用撒酸五至一水五為灌洗劑吸入劑石灰水蒸餾水各一上混合一次吸入含漱劑鹽剝一水四水制阿片越二單舍二上混合為含漱料高熱撒曹一至三水一單舍一五上每二時服一食匙暑溫治法暑溫者長夏受暑之病偏於熱者也形似傷寒頭痛身痛發熱惡寒右脈洪大而數左脈反小於右傷寒先惡寒而後熱傷暑惡寒不甚並有先發熱而後惡寒者其症口渴面赤汗大出名暑溫白虎湯主之脈芤汗多不止者白虎加人參湯主之方見條辨暑溫證頭痛發熱無汗此傷暑表實也用銀翹祛暑方銀翹祛暑方此方較香薷飲尤為適用銀花三錢連翹二錢薄荷一錢竹葉一錢甘菊花二錢冬桑葉二錢飛滑石三錢生甘草五分苦杏仁一錢生荷葉二錢蔓荊子八分水煎服暑溫發汗暑證已減餘邪不解但頭微脹目昏受暑輕者亦頭脹目昏皆以清絡飲主之方見溫病條辨伏暑者長夏受暑過時而發曰伏暑霜降以前發者稍輕霜降以後發者即重其症頭痛惡寒熱舌白與傷寒同惟面赤煩渴脈濡而數不似傷寒脈緊而緩也治法有三詳後伏暑證舌白口渴無汗者銀翹散去牛蒡加杏仁一錢五分滑石二錢主之璜按此暑熱之由氣分發者故於解表方中加以開泄皮毛之品伏暑證舌赤口渴無汗者銀翹散加生地一錢五分丹皮八分赤芍八分麥冬一錢五分主之璜按此暑熱之由血分而發者故於解表方中加涼血清血之品伏暑證面白口渴有汗或大汗不止者銀翹散去牛蒡荊芥加杏仁一錢二分石膏二錢黃芩一錢主之脈洪大渴甚汗多者仍用白虎法脈虛而芤者仍用人參白虎法溫熱贅言云暑月乘涼飲冷陽氣為陰寒所遏皮膚蒸熱凜凜畏寒頭痛自汗煩渴或腹痛吐瀉陰寒外襲者用香薷飲陰暑內侵者用大順散緣吐瀉肢冷脈伏是脾胃之陽為寒濕所蒙不得伸越故以乾薑肉桂散寒和胃杏仁甘草和氣調脾然廣皮茯苓仍不可少此宗仲景治陰邪之霍亂而用理中之旨也香薷飲方香薷二錢銀花三錢鮮扁豆花三錢厚朴一錢連翹二錢水五杯煮取二杯先服一杯得汗止後服不汗再服大順散方見溫熱經緯璜按香薷飲為傷暑發表之劑表實無汗者宜之大順散為逐寒溫里之劑暑月胃陽不振肢冷吐瀉者宜之然宜於溫暑之證者殊不多見此人泥於夏月伏陰在內之説乃一偏之論也究竟熱病為多暑熱內結大瀉肢冷脈伏宜五苓去白朮加滑石黃耆皮甚效五苓加減方豬苓二錢茯苓二錢澤瀉二錢桂枝一錢滑石三錢黃耆皮二錢璜按肢冷脈伏體溫已下降矣此證大瀉將傾心失其運血之力故脈伏也桂枝茯苓入心運血以黃耆入肺轉運其氣苓澤等味化濕通陽以治其瀉具有手法所以見效然恐力薄西洋醫之用樟腦為皮下注射劑可取用之樟腦注射劑各種熱病虛脫時瀕於危險者均取用之樟腦一依打兒一上一筒為皮下注射劑濕溫治法濕溫證始惡寒後但熱不寒舌白身痛渴不喜飲頭目昏重胸悶不飢午後身熱狀似陰虛脈弦細而濡名曰濕溫汗之則神昏耳聾甚則目瞑不欲言下之則洞泄潤之則病深不解三仁湯主之璜按三仁湯初起不甚合且慮服之燥渴用古歡室濕溫初起方淡豆豉三錢佩蘭草葉二錢飛滑石四錢蒼朮皮七分茯苓皮三錢竹葉一錢五分陳皮一錢五分藿香葉一錢五分甘草四分連翹二錢銀花三錢通草一錢如惡寒無汗者加杏仁三錢濕熱證發熱胸痞肌骨作痛始終無汗者暑邪內閉也此方甚效凡濕溫暑溫用之均驗六一散一兩薄荷四分泡湯調下即汗解濕熱證身熱口渴嘔吐清水或濕熱內留痰火上逆宜加減溫膽湯即溫膽湯加碧玉散二錢沖服溫膽湯見溫熱經緯濕鬱經絡身熱身痛汗多自利胸腹白疹內外合邪辛涼淡滲法薏仁竹葉散主之薏仁竹葉散方薏仁五錢竹葉三錢白蔻仁一錢茯苓塊五錢白通草一錢五分連翹三錢滑石五錢共為細末每服五錢日三服璜按以上所列濕溫各治法大端畢具約其要只在開降濕邪分解伏熱使濕與熱分而病自已俞東扶以臨證指南佳案甚多條分縷析最豁心目茲照録之除氣分之濕用滑石白蔻杏仁半夏厚朴瓜蔞皮為主有熱加竹葉連翹蘆根等全取輕清之品走氣分以除濕若濕熱甚而舌白目黃口渴溺赤用桂枝豬苓澤瀉滑石茯苓皮寒水石生白朮茵陳此從桂芩甘露飲加減濕熱作痞神識如蒙用人參芩連枳實生乾薑生白芍此從瀉心湯加減若脘中阻痛大便不爽用豆豉枳實川連薑汁苓半熱輕則去川連加鬱金橘紅苡仁杏仁此濕傷氣痹治法熱甚則用川連生朮厚朴橘白淡生薑渣酒煨大黃水法丸服此治氣阻不爽治肺宜通法濕傷脾陽腹膨用五苓散二術膏濕熱橫漬脈腠腹滿用小溫中丸以及脘痞便溏之用苓桂朮甘湯吞酸形寒之用苓薑朮桂湯雖皆古人成法而信手拈來無不吻合濕溫身熱神昏用犀角元參連翹心石菖蒲銀花野赤豆皮煎送至寶丹乃清熱通竅芳香逐穢法更奇者濕溫之頭脹耳聾厄逆鼻衄舌色帶白咽喉欲閉謂邪走上竅空虛之所非苦寒直入胃中可治而用連翹牛蒡銀花馬勃射干金汁此俗人夢想不到者也不食不寐腹痛便窒脈遲小澀謂由平素嗜酒少谷濕結傷陽寒濕濁陰鳩聚為痛而用炒黑生附子炒黑川椒生淡乾薑蔥白調入豬膽汁此四味白通湯亦神奇不可思議者也更有嗜酒人胸滿不飢三焦皆閉二便不通用半硫丸又有病中啖厚味者腸胃滯雖下而留濕未解肛門墜痛胃不喜食舌上白腐用平胃散去甘草加人參炮薑炒黑生附此二條不因酒肉認作濕熱竟以苦辛溫藥通陽劫濕尤屬高超至如陽傷萎弱有濕麻痹雖痔血而用薑附茯苓生術舌白身痛足跗浮腫太溪穴水流如注謂濕熱伏於足少陰而用鹿茸淡附子草果茯苓菟絲以溫蒸陽氣均非淺識所能步武濕久脾陽消乏腎真亦憊中年未育子用茯菟蒼朮韭子大茴鹿茸附子胡蘆巴補骨脂仿安腎丸法治病調元化為合璧益有觀止之嘆濕門附此諸案方法斯為全備璜再按暑濕各證西洋醫無此病名而我國此種證甚多認病用藥確有經驗余亦試之有效乃知六氣為病乃中醫最精之學慎勿以為籠統而勿之溫瘧治法溫瘧初起尚在肺經瘧之至淺者舌白渴飲咳嗽頻仍伏暑所致名肺瘧宜速用杏仁湯輕宣肺氣無使邪聚則愈杏仁湯方見溫病條辨此等症用此等方必效溫瘧骨節煩疼或多熱少寒時作嘔吐名曰溫瘧汗多口渴者白虎加桂枝湯汗少者清涼透邪法治之白虎加桂枝湯方見金匱清涼透邪法方蘆根五錢石膏四錢連翹三錢竹葉二錢豆豉二錢緑豆衣三錢璜按此清透汗之方溫熱證初起無汗均適用之暑瘧但熱無寒口渴汗多者竹葉石膏湯或銀翹加梨蔗二漿沃之竹葉石膏湯見傷寒銀翹加梨蔗二漿方銀花二錢連翹三錢知母三錢花粉三餞梨汁蔗漿璜按此葉天士方也通津改熱至平至效暑瘧在氣分者其口必渴苔必白以涼泄清氣治之涼泄清氣方蘆根五錢石膏四錢花粉三錢黃芩一錢山梔一錢瓜蔞一錢竹葉三錢貝母二錢水煎服暑瘧在營分者其舌必絳以清營泄熱法治之清營泄熱方生地三錢元參三錢犀角二錢白薇三錢紫草二錢水煎服時瘧在肺或在血者多夜發涼血散血法合瀉白散治之此方多效赤芍二錢丹皮二錢丹參三錢茅根四錢苦杏三錢條芩一錢枇杷三錢粉草一錢水煎服溫熱成瘧舌白脘悶寒起四末渴喜熱飲名曰濕瘧厚朴草果湯主之厚朴草果湯川厚朴一錢五分杏仁一錢五分草果一錢半夏二錢廣皮一錢茯苓塊三錢水五杯煎取二杯分二次服不論正瘧時瘧試用必效方金雞納霜開水下每服四釐至八釐二點鐘一服或日服一回此方凡熱證瘧疾熱有往來者均適用之奏效甚捷但服此藥有五忌熱發時不宜服脈洪大者不宜服舌苔厚膩者不宜服耳鳴者不宜服熱無往來者不宜服凡服金雞納霜者於發熱時服之則令人嘔吐不止脈變洪大甚至危險耳鳴再服則變聾苔厚膩者服之則令人煩悶甚至長熱不退西人退熱藥別蠟蜜童此為解熱之妙藥凡癆病發熱各種急性熱病如窒扶斯肺炎猩紅熱流行性感冒均可用此藥又為鎮痛藥凡頭痛筋骨痠痛脅間神經痛坐骨神經痛三叉神經痛等均可用此藥用量一日一二回每回二至五處方別蠟蜜童一二上分十二包每兩點鐘服一包能退腸窒扶斯之熱有良效全身症狀能輕減能睡眠安靜意識明瞭中焦篇溫病傳入中焦治法溫病在上焦每宜辛涼輕清之品治之上焦病不解則傳中焦治法便與傷寒無甚差異古人所以謂熱病皆傷寒之類也第傷寒傷人身之陽故喜辛溫甘溫苦熱以救其陽溫病傷人身之陰故喜辛涼甘寒甘鹹以救其陰彼此互勘自了然於心目矣陽明溫病面目俱赤呼吸聲粗但惡熱不惡寒日晡熱益甚至大便閉小便澀舌苔黃再甚則黑有芒刺脈沉數有力甚則胸腹堅滿拒按喜用涼飲脈體反小而實者大承氣湯主之脈浮洪燥甚者白虎湯主之璜按陽明一經以燥為本太陰為中氣陽明為標故無論寒邪溫邪走入燥地便從燥化此乃經氣腑氣使然也熱歸本經則現口燥心煩汗出惡熱渴欲飲冷全是一團燥邪熱氣盤踞胃中兼之胃乃多氣多血之腑邪熱之氣又合胃中之氣二火交煽於中邪熱益熾熱甚則血虧故口燥心煩熱蒸於外故汗出內熱太甚則乞救於外之水而欲為之撲滅故大渴飲冷仲景用白虎湯救之不欲使熱邪歸於胃腑也設若白虎力輕未能撤退其熱胃府為熱燒爍便見張目不眠聲音響亮口臭氣粗身輕惡熱大便閉塞此際邪歸胃腑熱已過盛勢必將腸胃中之津液灼盡腸胃中所存宿谷糟粕中之津液亦必灼盡胃中枯稿陰氣不得上交於腦所以張目不眠胃火旺盛故聲音響亮口臭氣粗身輕惡熱腸胃此際無一毫血液運其糟粕故大便閉塞通身上下不啻一盆烈火若不急為撲滅頃刻將周身血液灼盡臟腑立壞陰津消亡變痙厥而死矣主以大承氣湯乃大瀉其熱以救陰津之良法也白虎湯大承氣湯方見傷寒陽明溫病脈浮而促者減味竹葉石膏湯主之脈促謂數而時止如趨之過急急一蹶然其勢甚急故以辛涼重劑透表竹葉石膏湯主之減味竹葉石膏湯竹葉五錢石膏八錢麥冬六錢甘草三錢水八杯煮三杯一時服一杯璜按脈促古人謂陽盛陰虧氣血痰食化毒使然自漢至今未明病原在於何處此我國醫學之缺點也脈應於心中西學説俱同而脈促則因熱邪上爍於心熱熾則心脈亢張行血過疾故見數象心體被熱銷爍心之運血阻礙故脈停止而促象見本方竹葉以清心熱石膏以降胃熱麥冬以保心氣而續絶傷服之熱退而脈促頓愈其未愈者加生地以滋血液則必愈此生地一味西醫謂與毛地黃功用頗同為強心行血之劑但彼乃毒藥劇藥此為平和滋血之藥功力殊減耳陽明溫病諸候較大承氣證為輕脈不浮小承氣湯微和之或頭汗譫語不大便者亦宜小承氣湯方見傷寒陽明溫病純利稀水無糞者謂之熱結旁流調胃承氣湯主之此方取芒硝入陰以解結熱反以甘草緩芒硝急趨之性使之留中解結不然結不下而水獨行徒使藥性傷人也如下利譫語脈不實者用牛黃丸紫雪丹主之以上諸方俱見溫病條辨陽明溫病無上焦證數日不大便當下之若其人陰虛不可行承氣者增液湯主之服後經十二時仍不大便者合調胃承氣湯微和之增液湯方見溫病條辨陽明溫病下後汗出當復其陰益胃湯主之下後無汗脈浮者餘邪未盡當用銀翹湯主之脈浮洪者白虎湯脈洪而芤者白虎加人參湯下後無汗脈不浮而數者清燥湯方俱見溫病條辨暑溫伏暑邪入胃經脈洪滑不寒惡熱面赤頭暈飲不解渴得水愈嘔胸下按之痛小便短大便閉陽明暑溫水結胸也小陷胸湯加枳殼主之小陷胸湯加枳殼方見溫病條辨暑熱久留舌絳苔少熱搏血分者加味清宮湯主之神識不清熱閉內竅者先與紫雪丹少許再與清宮湯加味清宮湯即於清官湯加知母三錢銀花二錢竹瀝三茶匙衝入璜按溫證神識不清若舌絳者服紫雪清宮多可得愈舌淡紅神氣時明時昧昏迷撩亂起臥不安者多死暑溫伏暑三焦均受舌灰白胸悶泄瀉潮熱嘔惡煩渴汗出溺短者杏仁滑石湯主之方見溫病條辨濕溫兼寒脾胃兩傷既吐且利寒熱身痛或不寒熱但腹中痛名曰霍亂寒多不飲水者理中湯主之熱多欲飲水者五苓散主之方俱見傷寒及溫病條辨璜按霍亂惡症也用此等方藥力甚微不能取效余於薛生白濕熱篇第四條下補出治法乃特效方也此病由點狀菌繁殖於胃腸致起胃腸炎凡飲水惡濁食物不慎皆為此病之原病狀心胸苦悶噁心嘔吐腹中雷鳴繞臍作痛瀉出軟便繼瀉緑水或若泔汁旋覆嘔吐四肢厥冷下腿拘攣口吻奇渴眼眶深陷初染此病者凡米飯米湯均不可沾唇食之則變證尤速其病勢甚篤及來勢劇烈者多不可救不及救壯年反病勢較緩者一周時或二三日可望痊愈盛行期間可豫服防病藥水已患病者宜服阿片提神藥渴飲荍麥湯嘔吐不止可飲濃咖啡瀉甚則注入食鹽水於皮下及靜脈中其他行麼啡及樟腦注射尤為緊要預防霍亂藥水稀鹽酸十瓦上一日數次每次取數滴和開水服極驗注鹽水方食鹽三瓦重雪四瓦餾水一上加攝氏四十度之溫注入皮下蜂窩織中鴉片提神藥鴉片二硝蒼五白糖五一上調和分十包每一時服一包虛脫用樟腦注射法樟腦二依打兒一上十滴注射皮下又樟腦三白糖三上為十包每一時服一包濕鬱中焦脘悶腹脹大便不爽者加減正氣散主之方見溫病條辨璜按此方多快氣化滯之品以之透濕治瀉有效濕溫化熱者加清熱如連翹蔔子黃芩諸類服之亦有效濕熱內蘊善飲傷脾食減泄瀉腹中隱痛胃苓湯加白芍黃連甚效胃苓湯方漂蒼朮一錢川厚朴一錢陳皮一錢炙甘草五分澤瀉一錢茯苓二錢桂枝五分漂白朮一錢五分杭芍二錢豬苓一錢五分黃連一錢生薑二片水二杯煎八分濕飲久羈脾胃不和氣虛挾痰胸膈間漉漉有聲乃痰飲積聚酒濕所傷多有此證外臺茯苓飲主之外臺茯苓飲西潞黨三錢土炒白朮二錢茯苓四錢炙甘草五分陳皮一錢枳實二錢生薑二片水煎服濕熱內蒸致成黃疸外干時令內蘊水穀必以宣通氣分為要失治則為腫脹由黃疸而腫脹者苦辛淡法二金湯主之二金湯方見溫病條辨璜按黃疸為消化器病每兼腫脹非由失治而然也有肝性黃疸及血性黃疸二種原因由輸膽管之黏膜腫脹閉塞膽汁移走於血液中而然眼白睛手足軀體猝然變黃病人四肢疲怠體力衰弱我國以為濕熱證輕者煎劑可愈重者非廣求祕法不效也許叔微本事砂針皂礬方王士雄青殼鴨蛋方陸以湉冷廬醫話內外治各單方均有效驗西醫用人工鹽十六瓦分為二包每日清晨以溫水沖服即青殼鴨蛋方用朴硝之意重曹四瓦茴香油糖二十瓦混合為藥粉分作六包一日三次每服一包亦能有效嗜飲之人濕熱薰蒸面目發黃黃甚則黑心中嘈雜小便赤澀費氏玉露飲主之費氏玉露飲茵陳三錢玉竹三錢石斛三錢花粉二錢半夏一錢廣皮一錢茯苓二錢山梔一錢五分雞距子三錢萆薢二錢薏仁一兩水煎服濕溫內蘊飲食停滯氣血不得運行遂成滯下俗名痢疾初起腹脹痛者易治日久不痛不脹者難治脈小弱者易治脈實大數者難治先痢後瀉者易治先瀉後痢者難治先痢後瘧者易治先瘧後痢者難治酒客積熱及老年積濕者難治總之邪機淺者易治脈躁疾挾熱者難治諺云餓不死的傷寒填不死的痢疾故痢疾日行數十次下者既多腸胃空虛須借飲食以補其虛方不致死也自利不爽腸中拘急欲成痢疾小便短者四苓合芩芍湯主之四苓合芩芍湯見溫病條辨璜按痢疾夾熱類多小便不利用利水之劑則津愈枯而腸愈澀此方吳鞠通以為通膀胱開支河使邪不直注大腸合芩芍宣氣分清積滯預奪其滯下之路以西説考之由大腸黏膜結有桿狀菌而起豈分清小便所得而輕減其勢乎璜每於初起急清其腸使結黏之穢糞下行小便隨以分利故知見病治病非善法也西人於此證先主通利後主收斂與我國醫學大致相同我國驗方以黃芩湯為主方或加歸芍滑腸和血即通利法也加大黃固為下法加元明粉銀花以解腸熱枳殼蔔子檳榔消食寬腸均通利法也輕症愈期約五六日重症愈期須十餘日至二十餘日慢性者終成羸瘦而死若我國久痢治法愈者則甚多耳西國治痢驗方甘汞半瓦乳糖三瓦上勻分四包先服一包隨服萆麻子油二十瓦其後每三時服一包服完為度𠮙譁𠺝每服二分五釐西人以為此症特效藥瘧疾內陷變痢久延時日脾胃氣衰面浮腹膨裡急肛墜中虛留邪加減小柴胡湯主之加減小柴胡湯柴胡二錢黃芩二錢潞黨一錢白芍二錢當歸一錢五分穀芽一錢五分銀花三錢炙甘草一錢水二杯煎八分璜按瘧邪陷下作痢近世服雞納霜治瘧者恆有之以雞納霜能遏熱下行也曾治此症用治痢藥屢試不效後思瘧痢交作古人用小柴胡湯加天花粉治之而效遵用之果愈蓋由瘧變痢仍須治瘧故也下焦篇溫熱傳入下焦治法溫病治不得法傳入下焦少陰腎經津液被劫心中震震舌強神昏或口乾舌燥齒黑唇裂手足心熱或耳聾或汗自出心中不自主者皆因誤用升散熱久耗傷真陰少陰之液無以上供故熱邪不解脈虛大者均宜加減復脈湯主之加減復脈湯方見溫病條辨溫病誤表津液耗散汗大出不止中無所主者救逆湯主之救逆湯方即前復脈湯去麻仁加牡蠣八錢生龍骨三錢煎如復脈法脈虛欲脫者加參二錢溫病服大承氣湯下後大便溏甚十二時三四行脈仍數者不可與復脈湯一甲煎主之一甲煎方生牡蠣二兩水四杯煎取二杯分三次服下焦溫病大便溏瀉即與一甲復脈湯主之即於加減復脈湯內去麻仁加牡蠣一兩熱邪深入下焦脈沉數舌黑齒乾手指蠕動急防痙厥二甲復脈湯主之即於加減復脈湯加生牡蠣五錢生鱉甲八錢下焦溫病熱深厥深脈細促心中淡淡大動甚則心中痛者三甲復脈湯主之即於二甲復脈湯方內加生龜板一兩古歡室女醫曾氏云按復脈湯加減得法醫效最速真有起死回生之功余於癸卯年患春溫延入下焦口渴唇焦舌黑心煩日晡發熱津液枯耗已十分危險諸醫皆擬用小柴胡等方以不對症遲延未服延至下焦自擬服此方後大戰床柱地板為之震動戰後繼之大汗邪因得解後自用龜板鱉甲牡蠣等藥隨症加減而愈愈後自查條辨云津液枯燥服存陰藥液增欲汗邪正努力紛爭則作戰汗戰之得汗則生汗不得出則死所幸雖病十餘日未誤服補劑故戰即得汗而愈此方經驗多人真可傳也璜按熱病後水腫審其脈數或躁疾或弦徑由於礙及心臟腎臟而變水腫者加減復脈湯加冬瓜皮澤瀉生薏仁之屬甚效余試驗屢矣而醫者多不知良可浩嘆少陰溫病真陰欲竭壯火復熾心中煩不得臥者黃連阿膠湯主之方見溫病條辨溫病愈後濕痰流入胃腑嗽痰不咳徹夜不寐者半夏湯主之半夏湯方製半夏四錢秫米一兩水四杯煎取二杯分二次服溫病後虛煩不寐酸棗仁湯以和其陰酸棗仁湯酸棗仁三錢知母二錢茯神二錢川芎一錢炙甘草一錢枳實一錢竹茹一錢五分水煎服璜按此等方治虛煩不寐亦效然據金匱要略非治溫病後之虛煩也西人於溫熱不寐之症每以為腦神經不安注射安腦藥或服安腦寧睡之品惟服之則得寐越日不服仍復不寐非良法也余試效方用蓮子心二十多個青鹽三分開水泡服臨臥再泡一服存貯茶瓶中如未臥隨意服之無不即臥後晚再服可以痊愈蓋交通心腎寧睡之良方也方無安腦之品而可以寧睡嗚呼不寐豈盡腦病耶附録於此以質於世之習西醫者安腦寧睡方斯爾仿那兒四瓦上分四包臨臥服一包用熱湯送之又方臭剝一二瓦上以水一茶杯溶解臨臥作一次服婦女溫病經水適來脈數耳聾乾嘔煩渴辛涼退熱兼清血分竹葉玉女煎主之方見溫病條辨熱病經水適至十餘日不解神氣昏迷脈右長左沉瘀熱在裡也加減桃仁承氣湯主之加減桃仁承氣湯大黃二錢細生地六錢丹皮三錢桃仁二錢澤蘭二錢水煎服溫病愈後面色萎黃舌淡不欲飲水脈遲而弦不食陽氣虛也小建中湯主之小建中湯方白芍六錢桂枝四錢生薑三錢大棗二枚膠飴五錢炙甘草三錢水八杯煮取三杯去渣入膠飴火上煬化溫服三次璜按小建中湯為病後調補之方凡腹痛屬中氣虛者均可用即溫熱病後元氣虛弱取少火生氣之義亦可藉以調補以養陽養陰性味溫和善用之每每左右逢源之妙仲景桂枝湯所以列於傷寒方之首也能從桂枝湯探其奧妙則規矩從心而可得此方之妙義矣溫病愈後或一日至一年潮熱脈數喜飲不食者胃陰虛也五汁飲主之益胃湯亦主之方俱見溫病條辨伏暑濕溫積留支飲懸於脅下而成脅痛或咳或不咳潮熱或寒熱如瘧狀不可誤認柴胡證香附旋覆花湯主之方見條辨璜按此方滌飲止痛以治症輕於咳逆倚息而脅痛者用之多效余試驗屢矣特附識之支飲上擁胸膈直阻肺氣不令下降呼吸難通非用急法通利水道不可葶藶大棗瀉肺湯主之葶藶大棗瀉肺湯方苦葶藶三錢炒香砂細大棗五枚去核水五杯煎取二杯分二次服此方治濕飲腰脅痛不可忍神效葶藶性急瀉肺中之壅塞因其頗剽悍恐傷脾胃故用大棗以護脾胃使不傷他臟一急一緩一苦一甘相輔成功也古歡室云余身經兩次濕溫腰脅痛不止百藥不效此方服下即愈又外子酒濕黃疸每發必先右脅痛且肢冷醫用率溫服少許更甚服此方即愈洵經驗良方也溫病燥熱久羈傷及肝腎之陰上盛下虛或乾咳或夜熱甚則痙厥者三甲復脈湯主之定風珠亦主之更重者專翕大生膏主之方俱見溫病條辨璜按吳鞠通治溫熱久病傷陰以重濁填陰滋養下焦不為無見其用減味復脈湯一以清餘熱一以育陰善後面面圓到有功千古定風珠二方性太黏滯且近腥穢服之往往滯悶胃氣消化不良殊難適用學者治下焦溫病及病後育陰以清餘熱仍當於加減復脈湯求之
