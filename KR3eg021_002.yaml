body:
  text: 卷二時感風寒辨傷寒一書乃治六氣之書也其開章分中風傷寒溫病為三大綱中風傷寒主以麻桂二湯獨於溫病並不出方者以溫熱病因各殊變幻不測未可以數方印定後人耳目也然於溫病誤汗誤下之原文最精最確後有作者敻乎莫尚矣其曰發汗已身灼熱者名曰風溫風溫為病身重多眠睡鼻息必鼾語言難出已將誤汗變為神昏誤汗變為灼熱者一一指出其曰若被下者小便不利直視失溲見誤下重傷其陰已成陰氣將竭之危象其曰劇則如驚癇時瘛瘲者又明明將誤治引動肝風立變痙厥之危病情形開示後學奈何舉世醫者不精參六氣不研究聖法柴葛羌防麻桂隨手浪投以致變證百出死者載途不知自古精傷寒者於寒溫異氣靡不了了西昌喻氏論溫未能跳出傷寒圈子而其言曰溫熱病無風傷衛寒傷營之例原無取於麻桂二方昌邑黃元御讀仲景書直窺閫奧而其論寒溫異氣也曰傷寒中風本無內熱但因風寒外感而發其視溫病之熱自內發者不同而病傳陽明則為熱病入陰臟則為寒其視溫病之表裡皆熱者亦不同由此觀之可見諸凡伏氣無非熱自內發即以修園精仲景書而其注溫病也諄諄重戒曰切不可用辛溫以發汗從知時感風寒截然兩橛仲景尚不以治風寒之法治溫何醫者乃用羌防柴葛曰殺數人而不之悔耶璜竊以為由於時感風寒辨別不清故動手便錯耳請詳言之以維殺運可乎夫風寒之為病也其初起必先惡風惡寒然後頭痛手痛即發熱而惡風寒仍在脈浮而數其脈緊無汗為寒邪其脈緩有汗者為風邪若溫熱秋暑瘟疫雜氣初起微覺凜凜或惡寒雖甚到發熱即但熱而不寒或雖惡寒而必不甚從濕熱發者舌苔必厚膩從營分發者舌色必絳或淺絳從或白無苔或淡紅無苔此風寒時感與外候不同處且傷寒自毛竅入時感疫病自口鼻入由風溫濕溫發者或伏邪在氣或伏邪在血或在太陰或由太陰傳陽明或在厥陰少陰各有不同吳又可云傷寒感而即發瘟疫多感久而後發傷寒感發甚暴瘟疫多淹纏二三日或漸加重或五六日忽然加重傷寒投劑得汗而解瘟疫發散雖汗不解傷寒投劑可使立汗瘟疫汗解俟其內潰汗出自然不可以期此皆閲歷有得之言推之溫熱各病多可如此看法究之溫熱投以辛涼即汗解或不服藥亦有自汗而解者但出表即為順證惟伏邪未退所出之汗只得衛氣漸通熱雖漸減移時復熱矣故傷寒取皮膚濈濈微似有汗者佳溫熱病則汗出如水淋漓多可得愈傷寒病由足太陽入溫熱時感多由手太陰入傷寒病變隨六經而用藥溫熱時感分三焦而施治傷寒初起宜溫散以發表為主溫熱初病宜開降以下行為宜傷寒脈浮緊傷風脈浮緩溫熱時感則脈多浮弦而數由暑邪發者雖浮虛仍有數象若內有伏熱則沉盛於浮表證方愈而裡熱更依經而發其證傳變無定或始終在一經不移診脈審症全仗心細其中夾痰夾症均須詳審溫病無汗宜透汗有汗宜養津誤下宜生津解熱吳鞠通條辨云溫病忌汗汗之不惟不解反生他變蓋病在手經徒傷足太陽無益病由里出表徒發其表亦無益也且汗為心液心陽受傷必有神明內亂譫語發狂之症此語於溫熱治法實能獨出手眼其有功於醫學不少洵足為開手便用九味羌活及柴葛解肌者痛下針砭余則為溫病雖不可發汗而未嘗不可透汗透汗者養津液以為汗出之原也溫病傷陰最速而仍宜藉汗以為出路斯熱始漸退津液始漸流通故養津開肺而表即解若杏仁蘆根香豉薄荷沙參麥冬竹葉連翹緑豆衣荊芥牛子池菊山梔皮之類皆良藥也治溫病切宜刻刻顧其津液一用辛溫升發而津則立涸變且叢生倘其人素體陰氣先傷者小便必不利或用藥傷其真陰小便亦不利治此者仍須清肺養津俟臟真敷布小便自長大忌苓朮澤半等藥倘醫者見病治病誤滲其津則大渴而危矣又熱氣壅過於上胸脘痞悶大便亦多不利非用開降之藥透達汗孔津液不得流通氣機便不下行每見有便祕八九日腹無脹苦纍用清降諸方則熱氣降下大解宣暢或溏泄或下膠糞醬矢者實因伏邪在肺胃不燥實故耳粗工每用大黃妄下不知胸以上熱未盡解而早用大黃則熱愈壅而津愈傷痰愈蒸而胸愈結正氣既因瀉而虛則陰亡津竭而危加以治不如法則熱爍津枯而死矣治法審其兩關重診洪而有力舌苔漸厚或絳而微黑津少口乾漸渴而黏宜急清肝膽脾胃生津解熱若生地二冬黃芩銀花石斛雪水石膏知母山梔等類可也頭尚痛加薄荷小便黃加車前滑石利不傷陰斯為得之若夫汗出過多者裡熱熏蒸損液傷津最速若舌黃而渴或伏邪在肺舌無苔而亦渴可用仲景白虎湯及竹葉石膏湯甘寒養津實降火滋液之妙品熱邪傷津溫瘧有汗舌苔變黑色者連翹花粉石斛生地麥冬參葉梨汁蔗漿荸薺汁皆為生津滌暑之良劑若舌苔黃厚大渴兩關俱盛六脈皆浮唇乾小便短赤大便閉結下症畢具及熱病初起脈極洪實神昏目紅二便俱閉大熱大渴大汗尤亟宜養津而佐以攻下之品白虎加生大黃芒硝貝母石斛二至生地之類舌本乾薹黑加大青板藍根人中黃黃連苔黑生刺加犀羚二汁痰盛加竹瀝膽星務期調其津液養其臟真透汗以通其表裡滑降以速其下行上焦開津液降胃氣和於溫熱治法思過半矣溫熱瘟疫多伏氣溫補燥散俱不相宜王氏醫存謂溫病疫病乃外感內傷兼證是不然溫熱瘟疫由伏氣時感發者最多病因早時感受六淫有所抑遏未即發越久蓄潛釀而為伏熱又不能隨氣血而運化人身鼻氣與空氣相應一旦時行穢濁之氣混雜於空氣中毒菌吸入口鼻便化為熱初起脘悶作嘔即其據也伏邪有在氣在營之分一受空氣中穢濁之氣傷其營則伏熱於血者發矣傷其衛則伏熱於氣者發矣故其證有由營出氣由氣入營之別舌苔白色淡紅或雖重紅而時露一二處白黃色為邪尚在氣分舌淺絳無苔或純絳色或雖有黃白苔而舌色仍絳皆為伏邪在血初病之時以此診舌百不失一也故無論本體強弱其自內鬨於外者皆豢養日久之實熱當其病伏未發猶爐中種火偶經引而勃發則燥火之烈燎矣往昔未必不受外感其伏熱不發者彼時真陰尚能生水潤溉諸經熱被遏抑也今乃感引而發則真陰不足生水熱無所制故治溫治疫終始以養陰生水為第一義而傷陰涸液之品宜嚴禁如茯苓陳皮半夏蒼朮人參黃耆升麻柴胡肉桂乾薑麻黃及一切溫補燥散之品皆能耗盡既涸之津液妄用之始則大煩渴繼則大熱不數日危矣蓋此等藥惟濕溫病及水盛火弱者可間一用今者但余幾微之真陰養之惟恐不及而誤用溫補燥散藥一入口各奏其滲濕涸水之功搜索津液而耗之故其大渴非復胃熱也乃津液干也其大熱非復外感也乃肌肉焚也溫熱須汗至腳溫熱病六脈多浮弦數軟雖不宜辛溫發汗仍當以汗為出路若未汗則未愈也多服清降二便自利其脈不過減少至將汗時脈全浮數病者煩躁不安不時得汗則愈若其病劇常有忽而一手無脈忽而兩手無脈其人煩躁亦不時汗愈若只上半身汗則只半愈仍須按脈對症用清解化痰之藥加入蔥豉務使汗至腳乃痊愈更有神氣昏沉肢冷如冰作戰汗解者用清粥調和元氣為要病愈後以清為補慮伏邪未淨也倘妄用溫補或飲食不節則餘熱得補而復熾矣故溫病時疫始終忌溫補始終忌止汗仍始終宜用養津以透汗論汗人身腐穢之氣賴汗以排泄之此身體自有治病之機能也未病之時皮膚每有蒸氣泄出以手摩挲常能柔嫩此即汗也特至小至微目力不能見耳又或負重或遠行皮膚溫度太過則能出汗汗由熱迫其大較也疫邪溫熱自內達外初起時每多自汗甚至淋漓不止不可以表虛論乃里熱迫汗自出也其無汗者飲以熱茶涼水亦多發汗緣熱茶助身中之勢力故作汗津為熱爍欲汗而不得泄熱勢彌甚一飲涼水則足以助汗之來源熱得清而汗亦解也兼頭痛身痛沙參桑菊為主藥兼煩渴宜清陽明白虎湯竹葉石膏湯為主藥有熱有結破結為主陷胸三承氣之類汗出肢脹神氣不清絶類亡陽審其脈和緩無脫象者通絡滌痰為佳參葉竹葉桑葉川貝菖蒲羚羊膽星鉤藤絲瓜絡橘絡之類若屢經汗下邪已全退脈虛而舌無苔二便清利內無餘熱方可從虛斂汗生脈飲加茯神及二加龍骨湯之類究之時疫溫熱得汗為邪有出路宜用斂汗補虛見此證者絶少宜用此藥者亦絶少戰汗時行熱病不論初起傳變末後俱以戰汗為佳兆以戰則邪正相爭汗則正逐邪出然有透與不透之分凡透者汗必淋漓汗後身涼口不渴舌苔淨二便清胸腹脅無阻滯結痛始為全解之戰否則餘邪未淨而復熱則有再作戰汗而解者有戰汗須三四次而後解者有戰汗一次不能再戰待屢下而退者有不能再作戰汗即為沉困而死者總視其本氣之強弱何如耳凡戰汗之時不可服藥服則戰止而汗不透留邪為患汗下則太過而成虛脫應聽戰汗汗徹再觀脈症施治當戰時或多與熱湯飲之助其作汗戰汗之時脈多停止勿訝待戰汗之後脈自見也大抵戰汗之時脈以浮為佳邪出於表也虛散微濡應有變煎獨參湯待之防其脫也貧者米飲聊代之然必察其戰後邪淨而氣欲脫方可用凡戰汗後神靜者吉昏躁者危氣細者吉氣粗而短者危舌痿不能言者死目眶陷者死目轉運者死戴眼反折者死形體不仁水漿不下者死戰汗雖為佳兆亦有吉凶得戰汗固由治得其宜邪退正復而致不可強也嘗服大發汗藥毫不得汗而飲冷水得汗者又有用下藥得戰汗者涼血活血得戰汗者生津益氣得戰汗者種種不一當知戰汗乃陰陽交和表裡通達自然而然非可強致也續雷少逸雷少逸云溫者溫熱也瘟者瘟疫也其音同其病實不同矣吳又可瘟疫論中謂瘟即溫也鞠通條辨統風溫溫熱溫疫溫毒冬溫為一例兩家皆以溫瘟為一病不知溫熱本四時之常氣瘟疫乃天地之癘氣如春令之春溫風溫夏令之溫病熱病長夏之暑溫夏末秋初之濕溫冬令之冬溫鞠通之書皆已備述至瘟疫之病邪由口鼻而入沿門闔境相同有頭面頸項頰腮並腫者為大頭瘟發塊如瘤遍身流走者為疙瘩瘟胸高脅起嘔血如汁者為瓜瓤瘟喉痛頸大寒熱便祕者為蝦蟆瘟兩腮腫脹憎寒惡熱者為鸕鷀瘟遍身紫塊發出黴瘡者為楊梅瘟小兒邪郁皮膚結成大小青紫斑點為葡萄瘟此皆瘟疫之症與溫病因時之症之藥相去徑庭決不能溫瘟混同立論也少逸此論苦心分明殊為確鑿然其謂溫病之書不能治瘟疫瘟疫之書不能治溫病則言之太過也夫溫為常氣瘟為雜氣二者截然不同而究其病原多從手太陰主治若銀翹散桑菊飲普濟消毒飲皆初起治病之良方也故謂溫瘟與傷寒太陽病之症之治不同則可謂溫病之書不能治瘟疫則未可況讀葉香岩之外感溫熱篇其診舌各法無論溫熱瘟疫俱可準此施治戴麟郊之廣瘟疫論以之診伏氣溫熱辨證大略相同王士雄精於溫病以治溫病大法注釋余師愚疫病篇細及毫芒由此觀之溫熱書何嘗不可以治瘟疫哉傷寒治六氣之書也麻桂青龍等方不可治瘟熱傳至陽明及三陽各病有是病則用是方溫熱傷寒俱可通用矧瘟疫多隨四時常氣而發正宜按氣候調治而佐以解毒搜邪滌穢之品學者誠能精參溫熱瘟疫各書而因心化裁以通其變於治溫大法措之裕如矣元和陸懋修云吳氏書名瘟疫而不知其所論但為溫疫戴氏專論溫熱而不知其書之不可以名瘟疫此直以溫瘟為二證且以戴氏之五兼十夾為主溫熱立論也而按之楊栗山論説謂仲景書言治溫病可刺五十九穴只言溫病未有所謂瘟疫也後人省水加疒為瘟即溫字也省彳加疒為疫即疫字也又如病證之證後人省登加正為證後又省言加疒為症即證字也古人並無瘟字疫字證字症字皆後人之變易耳不可因變易其文遂以瘟溫為兩病不知溫瘟多屬時行之氣西人謂之輕重熱症及有毒熱症是也凡初起惡寒發熱後即不惡寒便謂之溫時行疫癘挾毒而發便謂之瘟其判證處當苦心分明總不若西人之論輕重熱症及有毒熱症為得執簡御煩之法也論戴麟郊五兼十夾戴麟郊廣瘟疫論其辨證分五兼十夾於熱疫大法頗詳備竊以為十夾體會病情精粹語尚多五兼不過隨時令時行之氣而發也夫病既為瘟疫則無論兼寒兼風兼暑兼瘧兼痢治其疫而病自瘳一定不易之法也瘟疫溫熱傷寒病原菌分別極清不可含混特我國尚無顯微鏡試驗方法今且依中學説解之果系兼寒而脈浮數浮弦浮大身痛惡寒無汗於辛涼解毒方中佐以透汗解表若蔥豉薄荷杏仁蘆根橘皮之類自然汗出而解寒邪悉去若兼風而多汗鼻塞鼻鳴嚏噴咳嗽試有如戴氏所云時疫著寒能令病勢增重兼風反令病勢易解以寒邪主凝泣則疫邪內郁郁一分病勢增痼一分風主遊揚則疫邪外疏疏一分病勢解散一分審其兼風而發者桑菊飲治之甚妙若夫兼暑兼瘧兼痢病狀雖殊病情則一夫溫疫溫熱多發於夏秋之間其原由於暑濕若時行若瘧痢其病皆能傳染因其時有其氣故沿門闔境靡不相同西醫之所謂菌即中國所謂時行之氣也其為病多似瘧有陷下作痢者有瘧痢交作者察其原皆由時令發生之毒菌內侵故不瘧則痢非痢則瘧耳或始雖患熱疫比及化瘧則病漸愈並有患熱疫腹痛頻下似痢非痢者此等病西醫前以為染黴毒氣近今醫學日進乃以為寄生蟲並黴菌之所傳染耳若依中法以治時瘧之例清其源以治濕熱之例塞其流精參葉案並熟讀溫熱諸書融會而化裁之於兼暑兼瘧兼痢諸治法思過半矣瘧由蚊嘴寄生蟲螫人而發痢由大腸桿菌而發二者病原菌截然不同然我國每有瘧痢交作者且有瘧邪陷下作痢者用仲景小柴胡湯加銀花天花粉兼解腸熱並滑痢其腸靡不取效蓋瘧痢同一病原者有之此則檢驗黴菌未盡可恃也金雞納霜為治瘧特效藥為其殺菌最有功力也乃有服之而變痢百藥不效必須用小柴胡湯治瘧方法方效則殺菌之藥又未盡可恃也噫病變無窮必拘拘於檢查病原蟲一法謂確由鏡檢之目力所得且鄙視中醫法為影響模糊嗚呼其然豈其然乎附識之以告世之習東西醫者夾痰水飲入於胃經蒸變而稠濁者為痰未經蒸變而清稀者為水痰與水一物也痰能作熱水能作冷時疫屬熱證故夾者更增其熱脈症治法無甚參差但於疫變中加瓜蔞貝母甚則加牛黃夾水者脈必數而夾水在胸膈其脈多緩甚則遲弦此脈夾水之辨也時疫之舌一經傳裡即轉黃轉燥轉黑若有水在胸膈則煩躁譫妄沉昏諸症備具而舌色白潤間有轉黃黑者亦必仍有白苔或滿舌黃黑半邊夾一二條白色或舌尖舌本俱黃中夾一段白色此舌夾水之辨也時疫胸滿心下硬痛手不可按一有水在胸膈心下雖滿痛按之則軟略加揉按則漉漉有聲此症夾水之辨也時疫見夾水脈症雖有表證不宜純用辛涼發散純用辛涼則表不解而轉見沉困有里證不可遽用苦寒早用苦寒必轉加昏憒此水氣鬱遏熱邪陽氣受困宜於清裡藥中加辛燥利氣利水之品以祛水氣逮水氣去郁遏發然後議攻議涼則無不效者矣燥濕則半夏蒼朮利水則木通苓澤利氣則萊蔔草果木香甚至有至須用大戟芫花者在時疫雖屬熱邪往往有投三承氣黃芩白虎而不效偶因溫暖藥收功者遂相訟清熱之非不知熱邪乃其本氣夾雜乃其間氣者也璜按溫熱時疫夾雜痰水舌白脘悶譫妄昏煩此症最多於清熱解疫方中加小陷胸法甚者加萊蔔汁同煎最效蒼朮燥液苓澤泄陰通陽均能助熱添病茲特補而正之夾食時疫夾食者最多而有食填膈上食入腸胃之不同入腸胃則為陽明諸熱證治法備於三承氣湯惟食填胸膈往往有脈沉手足冷者誤認三陰投以溫劑亦無一毫熱渴發見但煩躁倍增甚則一二日即死蓋胸中乃陰陽升降之路食填之則氣閉氣閉則熱鬱於下而無所疏泄誤溫則熱愈鬱於內故外無發熱症熱鬱於下故上無口渴症溫熱以出表為輕入里為重在淺為輕在深為重此證一溫則逼邪入里入深以致速死而不見熱證也如氣色神舌脈辨得為溫熱證遇有脈沉手足冷者即當細詢其胸膈若痞塞悶滿即是夾食再辨其舌苔白厚而微兼淡黃益為食填胸膈上之明驗於治疫藥中加桔枳青皮萊蔔神麯麥芽山楂甚則用吐法以宣之使膈開而腸氣宣達而熱證自見當解表當清裡自無誤治璜按夾食亦有人迎緊盛者於清熱方中重加萊蔔子消食破結亦多取效夾郁時疫夾氣鬱者初起疫症悉同而多脈沉手足冷嘔逆胸滿頗類夾食但夾食為有物為實邪舌苔厚白而微黃胸膈滿痛不可按而亦不移夾氣為無物為虛邪舌苔白薄胸膈滿痛半動而可按宜先宣通其鬱然後解表清裡自無不效若不舒鬱而徒發表則裡氣不能外達而難於徹汗遽用清下則上氣不宣多致痞逆惟於表藥中加蘇梗木香大腹皮香附等類以宣其氣則表易解於清裡藥中加川貝母以舒其鬱則里易和貝母為舒郁要藥但力性緩必用至五錢一兩方能奏效璜按觀夾痰水夾食夾郁等證益知古人診腹之法為治病者一大法門也奈今人診脈問症便即處方此醫風所以日下也敬告醫者切宜博考認病各方法值科學發明時代尤責無可辭倘僅沿訛襲謬因陋就簡將不免受天演之淘汰籲可畏哉夾精血疫邪傳裡之後積血頗多治從攻裡以解炎熱正治之法也若本有內傷停瘀復感時疫初起一二日疫症悉具而脈芤或澀細查其胸腹脅肋四肢多有痛不可按而澀者此胞膜肢體積血發腫之故治法解毒消腫之中兼以行瘀若銀花連翹生地甘菊桃仁紅花歸尾元胡之屬痛較甚者用法以退其腫和腦筋以止其痛則表邪自解炎腫自除若誤認芤澀為陰脈而投溫劑輕者變劇重者危矣璜按內科全書云有黴毒氣之地常感成肝積血證遇有發冷發熱者更可無疑凡瘧症其脾大其肝亦多積血心房門戶有所阻礙則肺內之回管積血必多故纍及肝之回管亦多積血初病則渾身不安四肢腰骨痠痛下午身熱舌苔黃頭痛胃弱不思飲食終日作悶常覺胃肋牽扯重墜悶郁不舒而左睡則肝體無所託靠牽挂不安於右肋骨第五條至第七條扣聽肝部之聲便可分明故無病者其實聲只在肝之四圍不遠若有積血則其聲直至胃部與左脅部亦皆實而不響且醫者應知肝邊較薄聲不實喑所扣實聲處只在肝邊之上可知聲外尚餘肝邊許多則其肝大之狀亦可概見治法用金雞納霜二分半麼啡二釐分四次和勻服如欲再服則用雞納五釐至七釐元明粉之輕瀉藥亦可用並宜用檸檬水以利小便腹外肝部用熱水巾敷揩與松節油擦摩甚佳夾脾虛溫熱時疫挾濕寒者舌苔必白厚面色必萎黃神情必倦怠氣息必虛促於清熱治疫方中須濟以溫運脾陽徒用寒涼及滋潤等物氣逆痰升神昏眼吊大事去矣戴麟郊論脾虛一證不能確指其所以然僅雲表不能作汗里不任攻下或得汗而氣隨汗脫得下而氣隨脫此體氣羸弱之病不盡關於脾虛也脾虛則血中之白球必多面色肢體變黃故仲景曰在太陰者身必發黃因脾病而色現於外也脾主為胃行其津液其白血球則胃之津液所化生熱病日久血質變弱紅血輪壞脾質或變硬或脹大或白血球過多其狀左脅下痛眼白輪微黃不清面黃皮膚身體困倦不支口淡不喜食溫病熱疫至十餘日此病最常有熱瘧脾體變壞此證尤多照中醫治法須運脾胃而佐以利濕開濕之藥如茵陳皮砂仁黃柏澤瀉海金沙木通之類佐於清熱方中熱減者桂枝湯加茵陳滑石亦妙西醫則用鐵酒信石水金雞納霜了葛之屬久服以退血中之白血球為最通行之法竊意此病須以滲濕之藥為主以補血之藥為佐兼用溫運以養血中之熱力熱病後元氣已復者用溫胃藥加入針砂茵陳地鱉元明粉之屬久服無不奏效因特參中西各法以備識者採擇焉按我國方書所謂脾虛皆胃中濕寒之證也以西醫學説考之脾主行血凡血管所餘之血皆蓄泄於脾瘧疾及熱證後之脾多腫即其驗也內經有脾統血之説故凡病之血虛面黃腹脹者古人即謂之太陰證以血虛脾無不虛也西人所論之血薄症及血生白珠症往往由脾與吸核先有積血頓覺身體軟弱血薄作為無力頭暈且痛耳鳴心跳於是血弱而脾亦弱耳若我國所云脾虛多主胃寒吐瀉腹脹而言戴麟郊所言脾虛各症如面色萎黃神情倦怠氣息微促心悸耳鳴與西醫書脾脹大血生白珠之外候若合符節特未知其病原由脾積血致血質因之變壞耳究之脾虛諸症實不外此足見中醫不事剖割而神悟之性亦不可及也中醫以脾兼主消化西醫非之最近醫學乃知剖割死質未全可恃且知脾能生甜肉汁以化食物足見我華自古在昔之神聖醫理為能通天地之變性命之微也夾腎虛時疫夾脾虛者為難治矣夾腎虛者更為難治蓋脾虛不能運化津液血質變壞痿黃困倦尚可佐溫運以醒脾陽腎虛則初起眩暈驚悸腰膝萎軟時或手足逆冷醫者頗難措手況其中又有陽虛陰虛之別時疫必待汗下清而後解腎陽虛者一經汗下則脫絶之症隨見必須時時諦察凡在表見腰痛異常小便頻數膝脛逆冷其人平日非淋濁陽痿即遺泄好內以此診斷百不失一若脈弦徑動芤尤為遺濁淋泄之確據西醫每謂脈潮於心不能據以斷各臟腑之病象而素患淋濁者其關尺竟確有此證佐可見身體中氣化之學不可不講也審其腎陰虛者可用生地知母之屬照顧腎氣熱盛當清者生地白虎湯為佳西醫言腎失功用每有神情昏倦手足搐搦之變若腎不能化血中之雜質多致兩足浮腫竊謂熱病纏綿日久多有此兩候中醫所謂久病陰虧窮必及腎是也治法以牛黃丸紫雪丹安其神以復脈輩消其腫病無不愈若病深發痙汗多齘齒大承氣湯下之如神營血虛而當滋清者清營湯為主屢清屢下而熱更甚舌上燥而無苔或有燥苔愈下而愈燥皆陰虛之症察其陽明無實邪可據以六味地黃湯易生地加知母王太僕所謂寒之不寒責從無水壯水之主以制陽光者此也不應則合生脈飲以滋水之上源似此熱勢燎原杯水難救車薪之火必大作湯液藥味以兩計湯液以鬥計倘頻灌而津不回猶無根之木本已先拔更何法可沃其焦枯耶直斷為不治可耳璜按銅人經云腎有系二條自腎而之膀胱並行而之溲尿處乃下極部分也洋醫云腎乃溺管脈管回管及筋膜互相疊里而成從顯微鏡照之了了可辨則腎為司溺之經與內經言腎為水臟均確鑿不移戴麟郊以小便頻數及淋濁遺泄屬於腎症自是切當但腎虛多腰痠多溺溫熱病之腰痠常因熱濕尤宜剖析也若神情昏倦手足搐搦洋醫以為腎病與內經腎藏志白虎通腎所以智之説義實相通蓋腎精成而腦髓生人之靈機記性在腦作強使巧莫大於是此腎所以藏智也腎虛則神情昏倦精衰則智衰也腎為水臟陰液虛則腎虛肝風內動則搐搦吳鞠通於溫熱下焦篇云以復脈輩復其精其神昏瘛瘲者大劑濃濁填陰塞隙旨哉言矣夾亡血疫證亡血有三其一未病之先素亡血而陰虛一受疫則熱邪乘虛煎熬亡陰最易解表清裡用藥必須步步照顧營血普濟消毒飲之用元參清營湯之用丹參生地皆能清熱和血而不使熱傷陰分此等證切勿多用升藥一升而吐衄交作者比比生平見之屢矣其一當受病之時忽然吐衄女子崩漏甚主血暈昏厥勢甚危急亦熱瘧常有也病家但知血之可不駭往往不知受疫醫家亦忽其客邪惟汲汲於止血清涼滋補多致危殆不知血由熱逼惟當治熱邪解而血自止此症不遽見於疫在表時而見於發熱數日之後人猶易知惟疫鬱於陰經而暴見此症者難識以其症外無頭痛發熱之可據耳但見微惡寒而大作嘔急當視其氣色神脈舌苔若舌有白苔氣息有一二疫象即是邪毒服豬膽汁止血最妙或用丹參丹皮生芍生藕生萊蔔汁茅根汁滑石之屬嘔加藿香脹加青皮但治疫毒則血自已脫血太甚氣欲絶者加入人參固中氣候疫症傳變歸經然後按經治之此疫血兼證之最危者十中僅救一二之證也其三疫邪大張煩熱燥渴而見亡血證溫熱疫瘟之常候也犀角地黃合白虎湯主之千金吐血百治百瘥十治十瘥千金不傳方亦好璜按素有亡血者陰氣本虧一感溫熱邪氣之鴟張必甚清熱之下最宜刻刻育陰清營湯甚妙如因感溫熱而吐衄生刮竹茹湯一二兩煎服或生用萊蔔汁和蜜服無不奏效此餘生平屢試屢驗之法也夾哮喘哮喘乃肺家素有痰火一受疫邪其濕熱之氣從其類而入肺發為哮喘遇此當察其色神脈舌苔有疫但治疫其哮喘當自除於治疫藥中加貝母瓜蔞淡豉桑皮疫邪哮喘並解法更精密璜按喘無善症在方書中幾成為口頭禪哮喘更為頑痰病發數次以後甚難根除溫熱而夾哮喘熱邪引動其哮惟清熱滌痰頻頻服之方可望愈此條不過言其方治如此效否非敢必也夾心胃病時疫有兼心胃痛者於其痛時察其氣色神脈舌苔若有一毫溫熱但治溫熱然平時因寒而發此則惟治其熱蓋疫邪客於膜原傳於太陰而發心胃之痼疾於當用金鈴子散丹參鬱金橘核蔥根生芍降香之類使其透發於表而痛自己若誤認平常心胃痛用桂附薑萸必致危殆璜按此乃胃痛也我國每以為心胃原因未明溫熱胃痛但治其熱熱退痛已固屬正論然更有一種邪氣欲出而不得出因之而胃痛者用通絡搜邪之品使之由里出表表熱汗出痛即立止余於秋暑流行病中每見之夾疝疫邪夾疝其腎囊少腹引痛全是疝症當照辨氣色神脈舌苔法辨之一有疫邪不必治疝但治疫則疝自消若依常治疝法用吳萸桂附茴香諸燥品輕者變囊癰重者變為厄逆噦厥昏沉而莫救矣璜按疝症最忌發炎在感冒溫熱時較之他症治法尤須慎重感疫時方夾疝者治疫而疝愈倘系久病須審其化熱與否不宜冒昧素本患疝而後感溫熱者徒治其熱疝豈能愈乎況蠟疝必非服藥可消但須治溫熱不必兼顧也若用吳茱萸等藥是自求禍矣溫熱死候內經刺熱論云太陽之脈色榮顴骨榮未夭曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱病內連腎璜按西醫嘉約翰云熱病熱度甚高歷久無汗並大小便閉則危險不知危險不專在無汗也即汗出亦有死症內經刺熱論及評熱病論色脈互勘指出種種死候此蓋古聖人達性命之微通死生之故始能言之非西醫所知也醫門棒喝注解未及嘉言根據色脈之超妙茲照録之嘉言云凡人有病其色必徵於面而熱病尤彰今久邪內伏其春發溫必始太陽經脈紅赤熱色先見兩顴如以採飾熱之先徵也榮飾之色只顴骨一處不交他處病之淺者也古經榮未夭曰今且得汗待時而已少需聽其自解此真訣也大凡溫病自內出經氣先傷雖汗多未解按此等處醫者最宜體認所云不比傷寒之一汗即解也故云今且得汗待時而已至於與厥陰脈爭見者死太陽榮顴骨少陰榮頰前厥陰榮頰後少陰榮兩頤謂太陽厥陰陰陽同時並交榮飾此才名為爭見若只面呈一部豈爭見乎爭見赤紫滯晦傳經勢重已為主死青黑克賊十死不救矣蓋太陽水而生厥陰木則發榮滋長光華畢達固有善無惡也厥陰木而孕太陽水則子藏母腹勾萌盡達亦默庇其根也今外邪入而真藏逼見於面夫是以死耳其熱病內連腎身內百司庶職惟腎獨為政府為厥陰母水熱垂危求救於腎水腎水足供尚可以母子兩全腎水源流並竭不母子俱困乎可見神去則藏敗藏敗則爭見黧黑豈脈色不由根心也哉刺熱論云少陽之脈色榮頰前熱病也榮未夭曰令且得汗待時而已與少陰脈爭見者死嘉言云右頰前赤色未交他處待汗自已若兩頤黑色與少陽赤色爭見則死也少陰經敗甚必入腎腎藏發露泉水之竭矣無陰以守之矣少陽相火少陰真火上下交焚刻頃俱為灰燼誠劫災也傳經勢重間有回天之手至於腎內枯稿無救頰頤紫黑已見惡痕縷縷不數此獨陽無陰如大火聚安得紫府丹臺授以太陰神水乎評熱病論篇黃帝問曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯對曰病名陰陽交交者死也帝曰願聞其説岐伯曰人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁甚者死今脈不與汗相應此不勝其病也其死明矣狂言者失志失志者死今見三死不見一生雖愈必死也章虛谷曰陰陽之氣本來相交而相生者今因邪勢瀰漫外感陽分之邪與內發陰分之邪交合為一而本元正氣絶矣故病名陰陽交交者死非陰陽正氣之相交也又曰汗生於穀穀生於精者謂由本元精氣化水穀以生津液發而為汗邪隨汗泄則邪卻而精勝也精氣勝則當能食以化水穀是邪已泄則不復熱矣乃復熱者邪氣未去也其所出之汗精氣走泄也故汗出而輒復熱是精卻而邪勝也所以不能食精無俾也俾者倚借之謂其病雖留連其壽可立待而傾也古論云汗出而脈躁盛者死正謂其精卻而邪不去也若邪去而精氣存脈即靜矣今脈與汗不相應則精氣不勝邪氣也其死明矣且狂言是失志失志者死一也汗出復熱精卻邪勝二也汗與脈不相應三也今見三死症不見一生症雖似愈必死也璜按王士雄謂溫病誤作傷寒治妄發其汗多有此候真乃閲歷之言玉版論要曰溫病虛其死吳鞠通曰病溫之人精血虛甚則無陰以勝溫熱故死溫病發於三陰脈微足冷者難治溫病大熱脈反細小手足逆冷者死溫病初起大熱目昏譫語脈小足冷五六日脈反躁急嘔吐昏沉失血痙搐舌本焦黑脈促結代沉小者皆死溫病汗後身熱脈反盛者死熱病篇曰熱病三日而氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足者吳鞠通曰人近躁邪在上焦故取之諸陽以泄其陽邪陽氣通則汗隨之實其陰以補其不足者陽盛則陰衰瀉陽即陰安其位瀉其有餘即所以補其不足也又曰實其陰以補其不足此一句實治溫熱吃緊大綱蓋熱病未有不耗陰者其耗之未盡則生盡則陽無所留戀必脫而死也熱病七八日脈微小溲血口中乾一日半而死脈代者一日死熱病七八日脈不躁或躁不散數後三日中有汗三日不汗四日死熱病已得汗脈尚躁喘且復熱喘甚者死熱病不知痛處耳聾不能自收持口乾陽熱甚陰頗有汗者熱在髓死不治沈月南曰髓者主陰之精骨之充也邪入最深乃為髓熱腎氣敗絶故至死也熱病汗不出大觀發赤噦者死沈曰汗不出陰無力也觀赤謂之戴陽面戴陽陰不足也噦者邪犯胃府胃虛甚也本原虧極難免死矣熱病泄而腹滿者死沈曰邪傷太陰脾氣敗也故死熱病目不明熱不已者死沈曰目不明臟腑之精氣竭也熱不已表裡之陰氣竭也故主死璜按此亦熱衝於腦之象汪謝城據難經謂陰脫而熱猶不已故死見解亦超熱病嘔下血者死沈曰汗不出陽盛陰虧而閉也再嘔下血邪深血分陰傷尤甚故死璜按汗不出熱無出路甚至加重此西醫所忌也嘔而下血小腸炎重熱症多有之每成死候讀西説自知熱病舌本爛熱不已者死沈曰心肝脾腎之脈皆繫於舌本舌本爛加之熱不已者三陰陰絶也故死按此證服育陰解熱之品熱退可生璜曾治而愈之熱病咳而衄汗出不至足者死沈曰咳而衄邪在肺經動陰血也汗不至足尤為真陰虧竭故死熱病熱而痙者死腰折瘛瘲齒噤齘也沈曰痙風強病也凡脊背反張曰腰折肢體抽搐曰瘛瘲牙關不閉曰噤切齒曰齘皆痙病也此以熱極生風大傷陰血而然既熱且痙乃為死症璜按此證遵金匱痙症門用大承氣湯下之取效捷於桴鼓真起死回生之方也屢試屢驗熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生吳鞠通曰汗後脈躁陰虛之極故曰死然能以甘涼藥沃之得法亦有得生者熱病者脈尚躁盛而不得汗者此陽脈之極也死脈盛躁得汗靜者生吳鞠通曰脈躁無汗陽盛之極陽盛而至於極陰無容留之地故亦曰死雖然較前陰陽俱靜有差此證猶可大劑急急救陰而有活者即已得汗而陽脈躁盛邪強正弱正尚能與邪爭若留得一分津液便有一分生理貴在留之得法耳至陰陽俱靜邪氣深入下焦陰分正無捍邪之意直聽邪之所為不死何待璜按我國醫學於溫熱死症分別詳明醫者於此於輕重緩急之間自有把握而近世西醫就熱度表及察心力盛衰以辨死症亦可為診斷之助查西醫云熱度之高達四十二度以上暫時即足致死或三十九度至四十度糾纏不解本屬如何終歸於死其死候大概由心力之衰弱最居多數而以傳染菌之作用者衰弱尤甚此心力衰弱有變在頃刻者證名虛脫此等症非溫熱固有之症大多數由傳染病或中毒或吐血下血或瀉痢體溫急下劇性神經障害每每見之在輕症只見手足末梢部冷厥劇症則皮膚蒼白容顏衰萎身體冷厥神氣昏沉脈形細小呼吸似無五官冥然罔覺中醫每以為陽脫不知此乃心臟大衰血行無力之徵也熱證所以虛脫而死正為此心力衰弱之故危重之傳染症其初期有體溫亢進不甚而亦死者此蓋由傳染毒菌之妨害而非因熱以致死也
