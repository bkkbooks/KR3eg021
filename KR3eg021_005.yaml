body:
  text: 卷五葉香岩幼科三時伏氣外感篇注解驚風新説考正附春溫一病由冬令收藏未固昔人以冬寒內伏藏於少陽以春木內應肝膽也寒邪深伏已經化熱昔賢以黃芩湯為主方苦寒直清裡熱熱伏於陰苦味堅陰乃正治也知溫邪忌散不與外感門同法若因外感先受引動在裡伏邪必先辛涼以解新邪繼進苦寒以清裡熱況熱乃無形之氣時醫多用消滯攻治有形胃汗先涸陰液劫盡者多矣周澄之曰伏邪因新邪引動而發者最多或因風熱或因風寒或因飲食或因勞倦但新舊兩邪各有輕重不同如新邪輕一二日後已自無迹自可一意清理伏邪如新邪重斷宜急祛兩邪相併便難措手常見外寒激動伏熱遷延日久熱邪充滿膻中淫溢腠理而寒邪迸入經絡脂膜雖遍身大熱日日出汗寒自不動治宜扶助正氣兼用行血通絡之品乃能發疹而愈此法世無知者璜按熱病將發邪氣鬱蒸於皮膚無不惡寒者熱已開泄則寒去而熱獨留然必隨氣候之雜病而發故曰新邪引動伏邪東醫以此病為潛伏只十四日期者似未諦當章虛谷曰或云人身受邪無不即病未有久伏而發者其説似甚有理淺陋者莫不遵信為然不知其悖經義又從而和之夫人身內臟腑外營衛於中十二經十五絡六百五十七穴細微幽奧曲折難明今以一郡一邑之地匪類伏匿猶且不能覺察況人身經穴之淵邃隱微而邪氣如煙之漸熏水之漸積故如內經諸痛諸積皆由初感外邪伏而不覺以致漸侵入內所成者也安可必謂其隨感即病而伏邪者乎又如人之痘毒其未發時全然不覺何以又能伏耶由是言之則素問所言冬傷寒春病溫非讕語矣風溫者春日受風其氣已溫經謂春病在頭治在上焦肺位最高邪必先傷此手太陰氣分先病失治則入手厥陰心包絡血分亦傷蓋足經順傳如太陽傳陽明人皆知之肺病失治逆傳心包絡人多不知者俗醫見身熱咳喘不知肺病在上之旨妄投荊防柴葛加入枳朴杏蘇卜子楂麥廣皮之屬輒云解肌消食有見痰喘便用大黃礞石滾痰丸大便數行上熱愈結幼稚谷少胃薄表裡苦辛化燥胃汁已傷復用大黃大苦沉降丸藥致脾胃陽和傷極陡變驚癇莫救者多矣自注風溫肺病治在上焦夫春溫忌汗初病投劑宜用辛涼若雜入消導發散不但與肺病無涉劫盡胃汁肺乏津液上供頭目清竅徒為熱氣熏蒸鼻乾如煤目暝或上竄無淚或熱深肢厥狂躁溺澀胸高氣促皆是肺氣不宣化之徵斯時若以肺藥稍加一味清降使藥力不致直趨腸中而上痹可開諸竅自爽無如市醫僉云結胸皆由連蔞柴枳苦寒直降致閉塞愈甚告斃者多又此證初因發熱喘嗽首用辛涼清肅上焦如薄荷連翹牛蒡象貝桑葉沙參梔皮薑皮花粉若色蒼熱盛煩渴用石膏竹葉辛寒清散痧疹亦當宗此若日數漸多邪不得降芩連涼膈亦可用至熱邪逆傳膻中神昏目瞑鼻竅無涕洟諸竅欲閉其勢危急必用至寶丹或牛黃清心丸病減後餘熱只甘寒清養胃陰足矣璜按風溫誤用辛溫必傷血分誤用下法必成結胸王氏醫案諸法俱在非熟讀不悟也此證胸高氣促鼻乾如煤西洋醫用開水蒸水煙於空中以潤肺竅用胡麻麥面或飯粒布包煮熱尉胸膈以運降其痰每每取效周澄之曰首用清涼清肅上焦須是認定風溫肺氣不勝其散以致喘嗽若稍涉風寒咳聲緊悶便不可用誤用即閉邪成癆怯春日暴暖忽冷先受溫邪繼為冷束咳嗽痰喘最多辛解涼溫只用一劑大忌絶谷若甚者宜晝夜豎抱勿倒三四日夫輕為咳重為喘喘急則鼻掀胸挺自注春溫皆冬季伏邪詳於大方諸書幼科亦有伏邪始從大方然暴感為多如頭痛惡寒發熱喘促鼻塞聲重脈浮無汗原可表散春令溫舒辛溫宜少用陽經表藥最忌混亂至若身熱咳喘有痰之證只宜肺藥清解瀉白散加前胡牛蒡薄荷之屬消食藥只宜一二味若二便俱通者消食少用須辨表裡上下何者為急施治又春季溫暖風溫極多溫變熱最速若發散風寒消食劫傷津液變證尤速王士雄曰沈堯封云溫亦火之氣也蓋火之微者曰溫火之甚者曰熱三時皆有惟暑為天上之氣獨甚於夏令耳璜按神昏目瞑急救用紫雪丹牛黃清心丸效驗良多徐靈胎所謂金石通靈之品也初起咳嗽喘急通用薄荷連翹象貝牛蒡花粉桔梗沙參木通枳殼橘紅表熱不清用黃芩連翹桑皮花粉地骨皮川貝知母山梔備用方黃芩湯蔥豉湯涼膈散清心涼膈散葦莖湯瀉白散葶藶大棗湯白虎湯至寶丹牛黃清心丸竹葉石膏湯俞氏清燥救肺湯裡熱不清朝上涼晚暮熱即當清解血分久則滋清養陰若熱陷神昏痰升喘促急用牛黃丸至寶丹之屬風溫乃肺先受邪遂逆傳心包治在上焦不與清胃攻下同法幼科不知初投發散消食不應改用柴芩瓜蔞枳實黃連再下奪不應多致危殆皆因不明手經之故耳若寒痰阻閉亦有喘急氣高不可與前法用三白吐之或妙香丸夏由熱病然夏至以前時令未為大熱經以先夏至病溫後夏至病暑溫邪前已申明暑熱一證醫者易眩夏暑發自陽明古人以白虎湯為主方後賢劉河間創議回出諸家謂溫熱時邪當分三焦投藥以苦辛寒為主若拘六經分證仍是傷寒治法致誤多矣蓋傷寒外受之寒必先從汗解辛溫散邪是已口鼻吸入之寒即為中寒陰病治當溫里分三陰見症施治若夫暑病專方甚少皆因前人略於暑詳於寒耳考古如金匱暑暍痙之因而潔古以動靜分中暑中熱各具至理茲不概述論幼科病暑熱夾雜別病有諸而時下不外發散清導加入香薷一味或六一散一服考本草香薷辛溫發汗能泄宿水夏熱氣閉無汗渴飲停水香薷必佐杏仁以杏仁苦降泄氣大順散取義若此長夏濕令暑必兼濕暑傷氣分濕亦傷氣汗則耗氣傷肺胃汁大受劫爍變病由此甚多發泄司令里真自虛張鳳逵云暑病首用辛涼繼用甘寒再用酸泄酸斂不必用下可稱要言不煩然幼科因暑熱蔓延變生他病亦摘其概周澄之曰口鼻吸入之寒其重者為中寒其輕者不得為中寒而總屬陰病治宜溫里乃不易之理已詳注前節先生真先得我心者至於溫暑起手即用辛涼甘寒直須認定不夾風寒方可若因風寒久閉內氣化熱便當別議內化熱而外寒已開者或從燥熱或從濕熱隨證治之外寒仍閉者其內必非真熱明是衛陽內陷治宜鼓舞正氣衛通寒解而熱自消散章虛谷曰暑必兼濕狀如外感風寒忌用柴葛羌防如肌表熱無汗辛涼輕劑無誤香薷辛溫氣升熱服易吐佐苦降如杏仁黃連黃芩則不吐宣通上焦加杏仁連翹薄荷竹葉暑邪深入伏熱煩渴白虎湯六一散暑病頭脹如蒙皆熱盛上熾白虎竹葉酒濕食滯者加辛溫通里璜按暑必挾濕以濕為重濁之邪暑乃薰蒸之氣也熱處濕中濕熱相爭阻於氣分治不中的其邪無處發泄則走入營分矣上焦不解上蒙清竅則耳聾無聞漫延中下則胸腹板悶二便不利便成濕溫重證治之之法仍當於氣分營分求之受熱厥逆夏令受熱昏迷若驚此為暑厥即熱氣閉塞孔竅所致其邪入絡與中絡同法用牛黃丸至寶丹芳香利竅可效徐靈胎云妙法王士雄云紫雪丹亦可酌用璜按葉氏謂邪入絡與中絡同法中絡在我國謂之中風西醫謂之腦出血此云熱閉孔竅即西醫謂之熱入延髓神經芳香利竅即安腦劑也神蘇以後用清涼血分如連翹心竹葉心元參細生地鮮生地二冬之屬璜按羚羊鉤藤甘菊菖蒲桑枝荷葉之類可隨宜加入初起大忌風藥王士雄曰火邪得風藥而更熾璜按服風藥往往神昏發痙一誤再誤頃刻立斃余每遇此證凡用風藥變為昏痙者用牛黃紫雪之屬佐以大劑清解愈者甚多倘初起能隨氣分營分調治從無變昏痙者西醫每以昏痙為毒菌入於延髓神經然依中法不誤治者發昏痙有之不發昏痙亦有之輕症用辛溫風藥不過熱較重仍未發昏痙多用數劑從未有不發昏痙者豈風藥能引毒菌以入神經耶此理殊不可解大約風藥能燥營便能引熱上衝腦髓此則可斷言耳初病暑熱傷氣竹葉石膏湯或清肺輕劑大凡熱深厥深四肢逆冷但看面垢齒燥二便不通或瀉不爽者為是大忌誤認傷寒也魏柳洲曰火極如水乃物極必反之候凡患此為燥熱溫補所殺者多矣哀哉蓋內真寒外假熱諸家當論之矣內真熱而外假寒論及者罕也王士雄曰道光甲辰六月連日酷熱異常如此死者道路相接余以神犀丹紫雪二方救之極效周澄之曰熱性散越何致閉塞此必乘風飲冷所迫觀起手用芳香通竅可知矣若真因暑汗太過肺氣不積津液內傷燥火燔灼以致昏厥尚可用此速其散脫耶附驚風新論涼風二字喻氏闢前人謂鑿空妄談方中行謂即痙病吳鞠通因之而作解兒難舉世宗之莫不以驚風為謬説而不知其仍本內經驚風即痙痙即驚風命名之差耳夫驚者言其燥擾也風者言其強直也素問著至教篇曰三陽積並則為驚其病起如疾風礔礪陽氣滂溢九竅皆塞內經曰諸暴強直皆屬於風由二者觀之驚風言症痙亦言證一而二二而一者也今試以新學説互證之驚風即腦膜炎每隨四時各熱證而起多發於一歲至七八歲之年齡大人熱證亦有昏暈但小兒變痙每在初候大人變痙每在末期此則其有差異之點也小兒之驚風常於新生齒時期或因跌打震蕩腦髓或近傍炎症之波及或腦部有充血之傾向皆能發此證若成人非傳染病盛行時代少有發痙攣性者故此病惟小兒最居多數小兒之將發痙也全身違和食思不振夜臥難安時時啼泣發熱三十九度乃至四十度或更騰於四十度以上於俄頃間遂即發痙或有將發熱而即發痙者其為狀也頻頻驚愕唇爪失色瞳孔散大眼瞼下垂現昏睡狀有時眼開直視弄舌齘齒人事全然不省或起腸炎則有青色便之下痢凡罹腦膜炎之小兒頭骨囟門有闊大腫起之傾向亦發嘔氣嘔吐腦膜炎之初起其經過為急性有一發即行治愈者有纍發而後漸愈者有移為慢性或至發癡呆之狀者凡腦髓已受壓迫腦神經之官能衰憊則罹於結核性之腦膜病而至不可治此外更有小兒腸胃積聚生蟲每見食思不振夜臥不安妄言可怕之動物兼發身熱咳嗽等症及驚風之各現象此即中醫史濱山所謂蟲積衝心之證宜用山道年以殺其蟲再以瀉藥下之萬勿誤認為驚風致夭兒命熱疳幼兒斷乳納食值夏月脾胃主氣易於肚膨泄瀉足心熱形體日瘦或煩渴喜食漸成五疳積聚當審體之強弱病之新久有餘者疏胃清熱食人糞變白或不化健脾佐消導清熱若濕熱內郁蟲積腹痛導滯驅蟲微下之緩調用肥兒丸之屬璜按西説有云小兒在夏勿斷乳者甚為確論然小兒夏月吐瀉甚多且見危險亦不僅由於斷乳當隨氣候及病人之寒熱虛實施治口疳夏季秋熱小兒泄瀉或初愈未愈滿口皆生疳蝕嘗有阻寒咽喉致危者此皆在裡濕盛生熱熱氣薰灼津液不生濕熱偏傷氣分治在上焦或佐淡滲世俗常刮西瓜翠衣治疳取其清揚滲利也脹夏季濕熱鬱蒸脾胃氣弱水穀之氣不運濕著內蘊為熱漸至浮腫腹脹小水不利治之非法水濕久漬逆行犯肺必致咳嗽喘促甚則坐不得臥俯不得抑危期速矣大凡喘必生脹脹必生喘方書以先喘後脹治在肺先脹後喘治在脾亦定論也金匱有風水皮水石水正水黃汗以分表裡之治河間有三焦分消子和有磨積逐水皆有奧義學者不可不潛心體認難以概述閲近代世俗論水濕腫脹之證以內經開鬼門取汗為表治分利小便潔淨府為里治經旨病能篇謂諸濕腫滿皆屬於脾以健脾燥濕為穩治治之不效技窮束手矣不知凡病皆本乎陰陽通表利小便乃宣經氣利腑氣是陽病治法暖水藏溫脾胃補土以驅水是陰病治法治肺痹以輕開上治脾必佐溫通若表裡陰陽乖違臟真日漓陰陽不運亦必作脹治以通陽乃可奏績如局方禹餘糧丸甚至三焦交阻必用分消腸胃窒塞必用下奪然不得與傷寒實熱同例擅投硝黃枳朴擾動陰血若太陰脾臟飲濕阻氣溫之補之不應欲用下法少少甘遂為丸可也其治實證選用方法備採周澄之曰此節水濕久漬逆行犯肺一段最宜細參此當辛散淡滲並用近世見其喘促每用辛涼清肅以致危殆陳修園亦謂久咳則火上升豫細察病者多是久咳則水氣逆射推原其理由肺氣不能順降水道不能通調也故久咳聲悶坐不能臥者必用五苓小青龍法乃效璜按脹胃病也喘促肺病也水腫我國舊學每以謂濕熱蒸於脾胃或以為脾腎濕寒病情影響模糊層見錯出殊難索解不知此乃內腎壞之病醫者日用而不知耳觀腎氣丸真武湯從腎元分利著手以利水濕每每見效則腫脹之由內腎壞中醫已能洞見本原特由熱化者多有未合則尤當分別施治也查內腎壞之症初起惡寒周身痛頭痛作悶吐甚又有見臌脹者亦有血內含尿質者及成症則小便不利全身腫或有一二處積水極多而腫甚者皮乾脹而不柔和色白血內含尿質且心外衣心房內衣肺本體肺胞膜腹統膜氣管內皮等處皆見發炎之患狀兼起身熱其腎部疼痛痛亦有時而輕小便極短而閉色黑內攙以血濁且重內涵尿底有蛋白以顯微鏡察之則有血內之紅珠及微絲溺管之內衣隨時不同當留心察之又有一起即全身水腫數點鐘即腫至不能識其面目胸膛皆積水肺腫及喉亦腫則危險脈緊有力胃全無口極渴大便結或別處兼起發炎或血內含尿質則為致死之原因據西醫此説則我國所謂水濕逆行犯肺而致喘脹者則心外衣肺胞膜腹統膜之病也由內腎壞之水腫牽纍而及故凡此證而致小便日少蛋白與膏日多腫甚皮燥心房積脹氣緊大便改常身熱不退均不可輕言易治治之之法宜開汗源法以熱水令沸以管運熱氣至病人身邊令其出汗此即我國開鬼門之法也消除身腫之法則舍灰葡酸散毛地黃可用消腫兼滑大腸宜用渣笠散每朝或隔朝服之腫成臌脹則布道非運或衣𡅏爹功效更偉此則我國潔淨府之法也脹證備用方葶藶大棗湯瀉白散大順散牡蠣澤瀉散五苓散越婢湯甘遂半夏湯控涎丹五子五皮湯子和桂苓湯禹功丸茯苓防己湯中滿分消湯小青龍丸木防己湯吐瀉吐瀉一證幼兒脾胃受傷陡變驚癇最多若是不正穢氣觸入或口食生冷套用正氣散六和湯五積散之類正氣受傷肢冷厄忒嘔吐自利即用錢氏益黃散有痰用星附六君子湯理中湯等倘熱氣深伏煩渴引飲嘔逆者連香飲黃連竹茹橘皮半夏湯熱閉神昏用至寶丹寒閉用來復丹稚年夏月食瓜果水寒之濕著於脾胃令人泄瀉其寒濕積聚未能遽化熱氣必用辛溫香竄之氣古方中消瓜果之積以丁香肉桂或用麝香今七香餅治瀉亦祖此意其平胃散胃苓湯亦可用璜按小兒吐瀉江筆花醫鏡分別暑濕寒熱施治簡便易從其吐瀉日久變成抽風俗名慢脾風者王清任可保立蘇湯尤為靈驗余試效屢矣王清任云夫抽風一證今人治之不效者非今人錯治乃古方誤人古人不只論病立方誤人立病名曰抽風風之字尤足誤人此證多半由傷風溫病或痘疹吐瀉等證病久而抽則名曰慢驚風慢驚風三字相連立名更為可笑不但文義不通亦未細察病源若真是風風之中人必由皮膚入經絡亦必由表入里之證可查既查無外感之表證古人何得著書立方總言是風其所以言風者因見其病發作之時項背反張兩目天吊口噤不開口流涎沫咽喉痰聲昏沉不省人事以為中風無疑殊不知項背反張四肢抽搐手足握固乃氣虛不固肢體也兩目天吊口噤不開乃氣虛不能上升也口流涎沫乃氣虛不固津液也咽喉往來痰聲非痰也乃氣虛不歸原也如不明此理試看年高人久病壽終時或項強聲重或露睛天吊或牙緊流涎或痰聲拽鋸或冷汗淋漓一派氣脫之證明明顯露以抽風之兩目天吊口噤流涎痰聲拽鋸互相參看則抽風之證氣虛無疑元氣既虛必不能達於血管血管無氣必停留而瘀以一氣虛血瘀之證反用散風清火之方安得不錯服散風藥無風服之則散氣服清火藥無火服之則血凝再服攻伐克消之方氣血散亡豈能望生溯本窮原非死於醫乃死於著書者之手每見業小兒科閲歷多者絶不誤人因抽風古方不效見抽風則棄而不治亦有高手看小兒現在之症知將來必抽風雖無方調治亦必告知病家此病恐將來抽風何以知其將來必抽風凡將欲抽風之前必先見抽風之症如見頂門下陷昏睡露睛口中搖舌不能啼哭哭無眼淚鼻孔煽動咽喉痰聲頭低不抬口噤無聲四肢冰冷口吐白沫胸如高碗喘急氣促面色青白汗出如水不能裹乳大便緑色腹內空鳴下泄上嗽肌肉跳動便是抽風之兆前二十症不必全見但見一二症則知將來必抽其中有可治者有不可治者並所用之方皆列於後若露睛天吊不食不哭痰鳴氣喘病雖沉重乃可治之證若天庭灰色腎子上縮或脈微細或脈全無外形雖輕乃不治之證再接此篇力闢驚風不無過激而辨證處方俱有精義可保立蘇湯此方治小兒因傷風瘟疫或痘疹吐瀉等證病久氣虛四肢抽搐項背後反兩目天吊口流涎沫昏沉不省人事皆效生黃耆一兩五錢黨參三錢甘草二錢白朮二錢當歸二錢白芍二錢炒棗仁三錢山萸一錢枸杞子二錢故紙一錢桃核一個連皮打碎水煎服此方分兩指四歲小兒而言若兩歲分兩可以減半若一歲分兩可用三分之一若兩三個月分兩可用四分之一又不必拘於付數余治此證一日之間常有用兩三付者服至不抽必告知病家不可因不抽遂不服藥必多服數付氣足方妥再按小兒嘔瀉西人謂之胃腸發炎症凡生牙斷乳時最易有此夏秋酷暑及雨水綿綿亦常有之其證有緩而急急者突起嘔瀉緩者先則夜間多哭不眠發熱發冷後乃嘔瀉交作始瀉糞渣內含不化之乳旋即瀉水或青或黃稍有糞氣或毫無氣味胃內皮傷損病人極形頽弱飲食戲具皆不歡樂口極渴大嗜湯水而必不可多與可用薏米煎水加牛奶皮或多或少飲之止瀉可用鉍淡養七分加播匿酸一釐七和勻分四服每兩點鐘一服用粥水調下嘔多瀉少者則加路米極佳此藥可止嘔更可安胃與小腸內皮惟不宜多服一方加路米一釐和白糖末少許分六份每用一份放小兒舌上每半點鐘一服或一點鐘一服止嘔為度瘧瘧之為病因暑而發者居多方書雖有痰食寒熱瘴癘之互異幼稚之瘧多因脾胃受病然氣怯神昏初病驚癇厥逆為多在夏秋之時斷不可認為驚癇大凡瘧症須分十二經與咳症相等若幼科庸俗但以小柴胡去參或香薷葛根之屬不知柴胡劫肝陰葛根竭胃汁致變屢矣幼稚純陽暑為熱氣症必熱多煩渴邪自肺受者桂枝白虎湯二進必愈其冷食不運有足太陰脾病見症初用正氣或用辛溫如草果生薑半夏之屬方書謂草果治太陰獨勝之寒知母治陽明獨勝之熱瘧久色奪唇白汗多餒弱必用四獸飲陰虛內熱必用鱉甲首烏知母便漸溏者忌用久瘧營傷寒勝加桂薑擬初中末瘧門用藥於下初病暑風濕熱瘧藥脘痞悶枳殼桔梗杏仁厚朴瓜蔞山梔香豉頭痛宜辛涼散劑連翹薄荷赤芍羚羊角蔓荊子滑石淡滲清上重則用石膏口渴用花粉煩渴用竹葉石膏湯熱甚用黃芩黃連山梔璜按上列各藥以治時瘧大端略具然以近世新學説考之則金雞納信石水為治此症之百試百效藥惟舌苔厚耳鳴脈洪大熱熾時期則不宜服耳考瘧之為病我國醫家瑣分門類致診病反惑於多岐殊屬夢夢自西國微生物學發明以來始知該症出於蚊身之寄生蟲經數次研究完全明備歐洲醫學大家翕然從之查此蟲在蚊身初生時先作細黑點點內滿孕種子旋膨脹破點孵化而生狀類芝麻充積蚊身最善攢聚於蚊之涎核間漸由核管而入喙筒故此蚊螫入便進血分人身血質遂為所敗壞故瘧疾一二回面色無不黃淡即血薄之確據也此蟲一入人身每施種種之作用一敗壞血球能將赤血球中所有之養氣變為一種黑色物質名赤血球既壞養氣既變故病瘧人皮色青白體溫較低也二此蟲入血後其孵化時放出二種毒質名倘與外感之養氣化合便能生熱瘧之化熱實系乎是三此蟲不特敗壞赤血球更能蝕赤血球之質而占居之每一赤血球中其數甚夥孳生率頗速計瘧作時每發熱一次能育二兆五千億個其甚者或不止此數夏季身熱屬濕羌防辛溫宜忌宜用木防己蠶沙暑熱邪傷初在氣分日多不解漸入血分反渴不多飲唇舌絳赤苓連膏知不應必用血藥量佐清氣熱一味足矣輕則用青蒿丹皮犀角竹葉心元參鮮細生地木通淡竹葉若熱久痞結瀉心湯選用夏月熱久入血最多蓄血一證徐云閲歷之言譫譫昏狂看法以小便清長大便必黑為是桃核承氣湯為要藥瘧多用烏梅以酸泄木安土之意用常山草果乃劫其太陰之寒以常山極走使兩邪不相併之謂用人參生薑白露薑飲一以固元一以散邪取通神明去穢之義王士雄曰無寒痰者常山不可浪用又曰參薑必邪衰而正氣已虛者可用璜按參薑早用則熱熾甚至傷血久瘧有虛象者用之即愈效如桴鼓瘧疾西醫以為有寄生蟲不解此方何以屢效方知補正祛邪亦有至理總之久瘧氣餒凡壯膽氣皆可止瘧未必真有瘧鬼又瘧疾既久深入血分或結瘧母鱉甲煎丸設用煎方活血通絡足矣徐忠可云幼兒未進穀食者患瘧久不止用冰糖濃湯余試果驗璜按中醫所謂瘧母即西醫所謂脾腫也鱉甲煎丸難效用信石鐵末金雞納三藥研細末為丸每服少許久服必愈周澄之曰人身之中血隨氣行氣寒則血凝氣熱則血駛瘧疾迭見大寒大熱血氣忽凝忽駛脈絡中必有推蕩不盡之瘀積久而成瘧母矣故凡患寒熱證者其發必落血敗故也病後調理必兼活血方能復元璜按此説最為正解蓋瘧母因寄生體打壞血液注入於肺而成葉氏以為須活血通絡周氏以為血敗必兼活血中醫西醫所見略同余治此證用補胃藥佐以行血破積軟堅亦有愈者方用六君子湯加三稜莪朮夜明砂肉桂當歸桃仁膽礬為丸服之痢痢疾一證古稱滯下蓋里有滯濁而後下也但滯在氣滯在血冷傷熱傷而滯非一今人以滯為食但以消食並令禁忌飲食而已夫瘧痢皆起夏秋都因濕邪鬱蒸以致脾胃水穀不運濕熱灼氣血為黏膩先痛後痢痢後不爽若偶食瓜果水寒即病未必即變為熱先宜辛溫疏利之劑若膿血幾十行疼痛後重初用宣通驅熱加芩連大黃必加甘草以緩之非如傷寒糞堅須用芒硝咸以耎堅直走破泄至陰此不過苦能勝濕寒以逐熱足可卻病古云行血則便膿愈導氣則後重除行血涼血如丹皮桃仁延胡黑楂歸尾紅花之屬導氣如木香檳榔青皮枳朴橘皮之屬世俗通套不過如此蓋瘧傷於經猶可延挨痢關乎臟誤治必危診之大法先明體質強弱肌色蒼嫩更詢起居致病因由初病體堅質實前法可遵久病氣餒神衰雖有腹痛後重亦宜詳審不可概以攻積清奪施治噤口不納水穀下痢都因熱升濁攻必用大苦如芩連石蓮清熱人參輔胃益氣熱氣一開即能進食藥宜頻頻進二三日小兒熱病最多者以體屬純陽六氣著人氣血皆化為熱也飲食不化蘊蒸於裡亦從熱化矣然有解表已復熱攻裡已復熱利小便愈後復熱養陰滋清熱亦不除者張季明謂元氣無所歸著陽浮則倏熱矣六神湯主之錫璜案痢疾內經謂之腸癖蓋腸病非臟病也此證若由瘧疾流行時併發則均系外感時痢須從外感法治之方效此余所閲歷而得者余嘗治數人患瘧服西醫金雞納霜瘧退而痢作用治痢法不效後用小柴胡湯一二劑遂愈考東醫以痢疾為傳染性大腸疾患蓋確切之論也痢疾有與瘧並作者有與應時輕重熱症及復發之熱症而作者輕者無熱或微熱重者熱甚身衰而面形悽苦倘瀉血太多或大腸穿破則至於死倘症在盛行更值醫不應手則死者尤多至氣虛下陷糞色已腐瀉血慘淡無色或小便停閉均屬難治秋燥秋深初涼稚年發熱咳嗽證似春月春溫證但溫乃漸熱之稱涼即漸冷之意春月為病猶是冬令固密之餘秋令感傷恰值夏月發泄之後其體質之虛實不同但溫自上受燥自上傷理亦相等均是肺氣受病世人誤認暴感風寒混投三陽發散津液燥甚喘急告危若果寒涼外束身熱痰嗽只宜蔥豉湯或蘇梗前胡杏仁枳橘之屬僅一二劑亦可更有粗工亦知熱病與瀉白散加芩連之屬不知愈苦助燥必增他變當以辛涼甘潤之方氣燥自平而愈慎勿苦燥劫爍胃汁秋燥一證氣分先受治肺為急若延綿數十日之久病必入血分又非輕浮肺藥可治須審體質證端古謂治病當活潑潑地如珠走盤耳璜按燥乃感陽明燥金之化也此證必有咳嗽聲甚重濁甚則咯血在西醫謂之流行性肺病或名曰疫咳從一歲至七歲之間為多大人亦有患之但大人染燥病分內因外因二種因乎外者天氣肅而燥勝或風熱致傷氣分則津液不騰宜甘潤以滋肺胃佐以氣味辛通因乎血者精血奪而燥生或服餌偏助陽火則化源日涸宜柔膩以養腎肝尤資血肉填補葉氏以上燥治氣下燥治血二語括之尤為諦當在小兒則多由外因而起葉氏主用疏解以清氣分日久則須兼潤血語語精實此證與春溫治法大略相似第春溫宜辛涼平劑秋燥宜甘涼少佐辛通為有異耳璜治春溫秋燥概主中法從未曾參以西法以其取效輕捷也
